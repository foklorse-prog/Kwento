// ─── SUGGESTION DESCRIPTION GENERATOR ────────────────────────────────────────
// Generates contextual descriptions grounded in the user's actual logged entries.
// Cycles through 4 tones: funny → clever → poetic → serious

const TONES = ["funny","clever","poetic","serious"];

function generateDescription(item, logs, feedback, index) {
  const tone = TONES[index % TONES.length];
  const cat = CAT_MAP[item.category];
  const catLabel = cat?.labelEn || item.category;

  // --- Build real stats from logs ---
  const catLogs = logs.filter(l => l.category === item.category);
  const catCount = catLogs.length;

  const weekCut = Date.now() - 7*24*60*60*1000;
  const weekLogs = logs.filter(l => new Date(l.date).getTime() > weekCut);
  const weekCatLogs = weekLogs.filter(l => l.category === item.category);
  const weekCatCount = weekCatLogs.length;

  // Top mood overall
  const moodCnt = {};
  logs.forEach(l => { if(l.mood) moodCnt[l.mood] = (moodCnt[l.mood]||0)+1; });
  const topMood = Object.entries(moodCnt).sort((a,b)=>b[1]-a[1])[0]?.[0];

  // Top mood this week
  const weekMoodCnt = {};
  weekLogs.forEach(l => { if(l.mood) weekMoodCnt[l.mood] = (weekMoodCnt[l.mood]||0)+1; });
  const weekMood = Object.entries(weekMoodCnt).sort((a,b)=>b[1]-a[1])[0]?.[0];

  // Shared tags between item and user's logs
  const userTagCnt = {};
  logs.forEach(l => (l.tags||[]).forEach(t => { userTagCnt[t]=(userTagCnt[t]||0)+1; }));
  const sharedTags = (item.tags||[]).filter(t => userTagCnt[t] > 0).sort((a,b)=>(userTagCnt[b]||0)-(userTagCnt[a]||0));
  const topSharedTag = sharedTags[0];

  // Most recent log overall and in this category
  const recentLog = [...logs].sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
  const recentCatLog = [...catLogs].sort((a,b)=>new Date(b.date)-new Date(a.date))[0];

  // Top category by count
  const catCountMap = {};
  logs.forEach(l => { catCountMap[l.category]=(catCountMap[l.category]||0)+1; });
  const topCat = Object.entries(catCountMap).sort((a,b)=>b[1]-a[1])[0]?.[0];
  const isTopCat = topCat === item.category;

  // PH tag
  const isPhItem = item.ph;
  const phLogsCount = logs.filter(l => {
    const lib = LIBRARY[l.category]||[];
    return lib.find(x=>x.title===l.title)?.ph;
  }).length;
  const phRatio = logs.length ? phLogsCount/logs.length : 0;

  // Mood label map
  const moodAdj = {
    masaya:"upbeat and feel-good",malungkot:"emotional and reflective",
    excited:"high-energy",relaxed:"slow and chill",nostalgic:"nostalgic",
    inspired:"inspired",stressed:"comforting",bored:"social and engaging"
  };
  const moodVerb = {
    masaya:"happy",malungkot:"a bit heavy-hearted",excited:"buzzing",
    relaxed:"in a slow, easy mood",nostalgic:"nostalgic",
    inspired:"inspired",stressed:"stressed",bored:"bored"
  };

  // --- FUNNY ---
  if(tone === "funny") {
    if(catCount >= 5 && isTopCat)
      return `You have logged ${catCount} ${catLabel} entries. At this point you're basically a ${catLabel.toLowerCase()} critic. Might as well go deeper.`;
    if(weekCatCount >= 3)
      return `${weekCatCount} ${catLabel.toLowerCase()} logs this week alone. We're not judging. We're enabling.`;
    if(item.category === "food" && recentLog)
      return `You logged "${recentLog.title}" recently. Your stomach clearly has opinions. Here's another one to consider.`;
    if(item.category === "games" && topMood === "stressed")
      return `Your logs suggest stress. Your cure is probably this. Science agrees. Probably.`;
    if(item.category === "music" && weekCatCount === 0)
      return `You haven't logged any music this week. Your ears are staging a protest. This might help.`;
    if(recentCatLog)
      return `Last ${catLabel.toLowerCase()} you logged was "${recentCatLog.title}". This one lives in the same neighbourhood.`;
    return `We looked at your logs, squinted a little, and landed on this. You're welcome.`;
  }

  // --- CLEVER ---
  if(tone === "clever") {
    if(topSharedTag && userTagCnt[topSharedTag] >= 3)
      return `You've logged ${userTagCnt[topSharedTag]} things tagged "${topSharedTag}". This shares that exact quality — it's not a coincidence.`;
    if(isPhItem && phRatio > 0.5)
      return `${Math.round(phRatio*100)}% of what you log is Filipino. Your taste has a clear home. This belongs in it.`;
    if(weekMood && weekMood !== topMood)
      return `Your week has been ${moodAdj[weekMood]||weekMood} — a shift from your usual. This suggestion follows that shift.`;
    if(isTopCat && catCount >= 3)
      return `${catLabel} is your most logged category at ${catCount} entries. Your taste here is specific. This fits the pattern.`;
    if(topSharedTag)
      return `"${topSharedTag}" keeps showing up in your logs. This suggestion shares that thread.`;
    return `The overlap between your logged taste and this suggestion isn't random. Your profile pointed here.`;
  }

  // --- POETIC ---
  if(tone === "poetic") {
    if(weekMood === "malungkot" || topMood === "malungkot")
      return `Some things don't fix what's heavy — they just sit with you in it. This might be one of those.`;
    if(weekMood === "nostalgic" || topMood === "nostalgic")
      return `You keep returning to things that carry memory. There's wisdom in that. This one carries some too.`;
    if(weekMood === "inspired" || topMood === "inspired")
      return `Inspiration isn't a mood — it's a direction. Your logs have been moving that way. So does this.`;
    if(item.category === "movies")
      return `You've watched ${catCount} film${catCount===1?'':'s'} worth of other people's lives. This one might feel like your own.`;
    if(item.category === "music")
      return `Music doesn't ask permission to change the way a day feels. This one might do exactly that.`;
    if(item.category === "books")
      return `You've read ${catCount} book${catCount===1?'':'s'} that someone poured themselves into. This is another one worth that kind of attention.`;
    if(topSharedTag)
      return `"${topSharedTag}" is a thread that keeps running through your story. This picks it up.`;
    return `Not everything in a taste profile is about data. Some things just belong. This might.`;
  }

  // --- SERIOUS ---
  if(weekCatCount >= 2 && topSharedTag)
    return `You've logged ${weekCatCount} ${catLabel.toLowerCase()} entries this week, and "${topSharedTag}" is a recurring tag. This suggestion scores highly on both.`;
  if(topMood && moodAdj[topMood] && catCount >= 2)
    return `Your dominant mood across ${catCount} ${catLabel.toLowerCase()} logs trends ${moodAdj[topMood]||topMood}. This recommendation matches that pattern.`;
  if(recentCatLog && topSharedTag)
    return `Your last ${catLabel.toLowerCase()} log was "${recentCatLog.title}". This suggestion shares the "${topSharedTag}" quality and ranks well against your overall profile.`;
  if(weekMood)
    return `This week you've been ${moodVerb[weekMood]||weekMood}. This suggestion aligns with where your taste is right now, not just historically.`;
  if(catCount > 0)
    return `You've logged ${catCount} ${catLabel.toLowerCase()} entr${catCount===1?"y":"ies"}. Based on the tags and genres you gravitate toward, this fits.`;
  return `This recommendation is based on the overall shape of your taste profile — your top tags, logged moods, and category patterns.`;
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function buildTagScore(logs, feedback) {
  const tc = {};
  logs.forEach(l => {
    const w = feedback[l.title]==="up" ? 3 : 1;
    (l.tags||[]).forEach(t => { tc[t]=(tc[t]||0)+w; });
    if(l.mood && MOOD_TAGS[l.mood]) MOOD_TAGS[l.mood].forEach(t => { tc[t]=(tc[t]||0)+2; });
  });
  return tc;
}

function buildSuggestionQueue(logs, feedback) {
  const tc = buildTagScore(logs, feedback);
  const cats = ["movies","music","books","food","games","activities"];
  const catPools = {};
  cats.forEach(cat => {
    const items = (LIBRARY[cat]||[]).filter(i => feedback[i.title]!=="down");
    catPools[cat] = items.map(i => ({
      ...i, category: cat,
      score: (i.tags||[]).reduce((s,t)=>s+(tc[t]||0),0) * (i.ph?1.6:1.0) + (feedback[i.title]==="up"?8:0)
    })).sort((a,b) => b.score-a.score || Math.random()-0.5);
  });

  // Build 10 with diverse categories — spread across cats
  const result = [];
  const usedTitles = new Set();
  let round = 0;
  while(result.length < 10 && round < 5) {
    const shuffled = [...cats].sort(()=>Math.random()-0.5);
    shuffled.forEach(cat => {
      if(result.length >= 10) return;
      const pick = catPools[cat].find(i => !usedTitles.has(i.title));
      if(pick) { usedTitles.add(pick.title); result.push(pick); }
    });
    round++;
  }
  return result;
}

function getArchetype(logs) {
  if(!logs.length) return null;
  const cnt = {};
  logs.forEach(l => (l.tags||[]).forEach(t => { cnt[t]=(cnt[t]||0)+1; }));
  let best = null, bestS = -1;
  ARCHETYPES.forEach(a => {
    const s = a.tags.reduce((acc,t)=>acc+(cnt[t]||0),0);
    if(s>bestS){bestS=s;best=a;}
  });
  return best;
}

function getWeekLogs(logs) {
  const cut = Date.now()-7*24*60*60*1000;
  return logs.filter(l=>new Date(l.date).getTime()>cut);
}

function formatDate(iso) {
  try{return new Date(iso).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});}catch{return iso;}
}

function todayKey() { return new Date().toISOString().split("T")[0]; }

// ─── TASTE PROFILE BUILDER ────────────────────────────────────────────────────
// Liked = logged + swiped right (union, no duplicates)
// Disliked = swiped left only (not logged)
function buildTasteProfile(logs, feedback) {
  // Top category by log count
  const catCnt = {};
  logs.forEach(l => { catCnt[l.category]=(catCnt[l.category]||0)+1; });
  const topCatEntry = Object.entries(catCnt).sort((a,b)=>b[1]-a[1])[0];
  const topCat = topCatEntry ? topCatEntry : null;

  // Top tags from logs
  const tagCnt = {};
  logs.forEach(l => (l.tags||[]).forEach(t => { tagCnt[t]=(tagCnt[t]||0)+1; }));
  const topTags = Object.entries(tagCnt).sort((a,b)=>b[1]-a[1]).slice(0,6).map(([t])=>t);

  // Top mood
  const moodCnt = {};
  logs.forEach(l => { if(l.mood) moodCnt[l.mood]=(moodCnt[l.mood]||0)+1; });
  const topMood = Object.entries(moodCnt).sort((a,b)=>b[1]-a[1])[0]?.[0];

  // Genres
  const genreCnt = {};
  logs.forEach(l => { if(l.genre) genreCnt[l.genre]=(genreCnt[l.genre]||0)+1; });
  const topGenres = Object.entries(genreCnt).sort((a,b)=>b[1]-a[1]).slice(0,4).map(([g])=>g);

  // ── LIKED = all logged titles + swipe-right titles, deduplicated ──
  const loggedTitles = logs.map(l => l.title);
  const swipedRight = Object.entries(feedback).filter(([,v])=>v==="up").map(([k])=>k);
  const likedSet = new Set([...loggedTitles, ...swipedRight]);
  const liked = [...likedSet];

  // ── DISLIKED = swiped left, but NOT in logged titles ──
  const swipedLeft = Object.entries(feedback).filter(([,v])=>v==="down").map(([k])=>k);
  const disliked = swipedLeft.filter(t => !likedSet.has(t));

  // ── Per-category top items for stats display ──
  const catItems = {};
  CATEGORIES.forEach(c => {
    catItems[c.id] = logs.filter(l=>l.category===c.id).slice(0,3).map(l=>l.title);
  });

  // ── Top artist/creator hints (rough: extract "— Artist" from music titles) ──
  const musicLogs = logs.filter(l=>l.category==="music");
  const artistCnt = {};
  musicLogs.forEach(l => {
    const parts = l.title.split("—");
    if(parts.length > 1) {
      const artist = parts[1].trim();
      artistCnt[artist] = (artistCnt[artist]||0)+1;
    }
  });
  const topArtist = Object.entries(artistCnt).sort((a,b)=>b[1]-a[1])[0]?.[0];

  // ── PH vs global ratio ──
  let phCount = 0;
  logs.forEach(l => {
    const lib = LIBRARY[l.category]||[];
    if(lib.find(x=>x.title===l.title)?.ph) phCount++;
  });
  const phRatio = logs.length ? Math.round((phCount/logs.length)*100) : 0;

  // ── Week activity ──
  const weekCut = Date.now()-7*24*60*60*1000;
  const weekLogs = logs.filter(l=>new Date(l.date).getTime()>weekCut);
  const daysActive = new Set(logs.filter(l=>!l.fromLetterboxd).map(l=>l.date?.split("T")[0])).size;

  // ── NARRATIVE — mix of stats + poetic observation ──
  const moodDescriptions = {
    masaya:"upbeat, joyful things",malungkot:"emotional, reflective experiences",
    excited:"high-energy and adventurous picks",relaxed:"calm, cozy content",
    nostalgic:"things that carry memory and warmth",inspired:"creative, thought-provoking work",
    stressed:"familiar comfort and quiet things",bored:"social, fun, interactive picks",
  };

  let narrative = "";
  let statLine = "";
  let observationLine = "";

  if(logs.length === 0) {
    narrative = "Start logging to build your taste profile.";
  } else if(logs.length < 3) {
    narrative = "Just getting started. Log a few more things to see your taste take shape.";
  } else {
    // Stat line — concrete numbers
    const statParts = [];
    if(topCat) statParts.push(`${topCatEntry[1]} ${CAT_MAP[topCat[0]]?.labelEn||topCat[0]} logs`);
    if(topArtist && artistCnt[topArtist] > 1) statParts.push(`${artistCnt[topArtist]}× ${topArtist}`);
    if(phRatio > 0) statParts.push(`${phRatio}% Filipino content`);
    statLine = statParts.length ? statParts.join(" · ") : "";

    // Observation — poetic/insightful
    if(topMood && moodDescriptions[topMood] && topCat) {
      observationLine = `You tend toward ${moodDescriptions[topMood]}, and ${CAT_MAP[topCat[0]]?.labelEn||topCat[0]} is where you spend the most time. ${topTags.slice(0,2).join(" and ")} keeps showing up in your picks.`;
    } else if(topMood && moodDescriptions[topMood]) {
      observationLine = `Your logs lean toward ${moodDescriptions[topMood]}. ${topTags.length ? `"${topTags[0]}" is the quality that keeps appearing.` : ""}`;
    } else if(topCat) {
      observationLine = `${CAT_MAP[topCat[0]]?.labelEn||topCat[0]} is clearly where your taste lives most. ${topTags.length ? `The "${topTags[0]}" quality runs through most of what you log.` : ""}`;
    } else {
      observationLine = `Your taste is still taking shape — but the threads are already visible.`;
    }
    narrative = observationLine;
  }

  return { topCat, topTags, topMood, liked, disliked, catItems, topGenres, topArtist, phRatio, daysActive, weekLogs, statLine, narrative };
}

// ─── STORAGE ─────────────────────────────────────────────────────────────────
const SK = "kwento_v5";
function loadData(){
  try{
    const r=localStorage.getItem(SK);
    if(r){
      const parsed=JSON.parse(r);
      // Primary key exists but onboarded got lost — try backup
      if(!parsed.onboarded){
        const bk=localStorage.getItem(SK+"_bk");
        if(bk){const bp=JSON.parse(bk);if(bp.onboarded)return bp;}
      }
      // Scrub old "Letterboxd rating: X★" notes left from earlier import version
      if(parsed.logs){
        parsed.logs=parsed.logs.map(l=>
          l.fromLetterboxd&&l.note&&l.note.startsWith("Letterboxd rating:")
            ?{...l,note:""}:l
        );
      }
      return parsed;
    }
    // Primary key missing — try backup before anything else
    const bk=localStorage.getItem(SK+"_bk");
    if(bk){const bp=JSON.parse(bk);if(bp.onboarded){localStorage.setItem(SK,bk);return bp;}}
    // Migrate from v4 if it exists
    const r4=localStorage.getItem("kwento_v4");
    if(r4){
      const d4=JSON.parse(r4);
      const migrated={
        ...d4,
        suggQueue:d4.suggState?.queue||null,
        suggIndex:d4.suggState?.index||0,
        suggDate:d4.suggState?.date||null,
        barkadaQueue:d4.barkadaState?.queue||null,
        barkadaIndex:d4.barkadaState?.index||0,
        barkadaDate:d4.barkadaState?.date||null,
        __showAvatarPicker:false,
      };
      delete migrated.suggState;
      delete migrated.barkadaState;
      return migrated;
    }
    return null;
  }catch{return null;}
}
function saveData(d){
  try{
    const s=JSON.stringify(d);
    localStorage.setItem(SK,s);
    // Write backup whenever user is onboarded — survives accidental primary key wipe
    if(d.onboarded) localStorage.setItem(SK+"_bk",s);
  }catch{}
}

// ─── PHOTO CROPPER ───────────────────────────────────────────────────────────
function PhotoCropper({photo,pos,setPos,size=100,accent}){
  const ref=useRef(null);
  // working copy lives purely in a ref - never read pos prop mid-gesture
  const work=useRef({x:pos.x||50,y:pos.y||50,scale:pos.scale||1});
  const gesture=useRef({mode:null,drag:null,pinch0:0,scale0:1});

  // sync work ref when pos prop changes from outside (e.g. reset)
  useEffect(()=>{
    work.current={x:pos.x||50,y:pos.y||50,scale:pos.scale||1};
  },[pos.x,pos.y,pos.scale]);

  const commit=()=>setPos({...work.current});

  const onStart=(e)=>{
    e.preventDefault();e.stopPropagation();
    if(e.touches&&e.touches.length>=2){
      gesture.current.mode="pinch";
      gesture.current.pinch0=Math.hypot(
        e.touches[0].clientX-e.touches[1].clientX,
        e.touches[0].clientY-e.touches[1].clientY
      );
      gesture.current.scale0=work.current.scale;
    } else {
      gesture.current.mode="drag";
      const t=e.touches?e.touches[0]:e;
      gesture.current.drag={x:t.clientX,y:t.clientY};
    }
  };

  const onMove=(e)=>{
    e.preventDefault();e.stopPropagation();
    if(e.touches&&e.touches.length>=2){
      gesture.current.mode="pinch";
      const dist=Math.hypot(
        e.touches[0].clientX-e.touches[1].clientX,
        e.touches[0].clientY-e.touches[1].clientY
      );
      work.current.scale=Math.max(0.5,Math.min(4,gesture.current.scale0*(dist/gesture.current.pinch0)));
      commit();
    } else if(gesture.current.mode==="drag"&&gesture.current.drag){
      const t=e.touches?e.touches[0]:e;
      const dx=t.clientX-gesture.current.drag.x;
      const dy=t.clientY-gesture.current.drag.y;
      gesture.current.drag={x:t.clientX,y:t.clientY};
      work.current.x=Math.max(0,Math.min(100,work.current.x-dx/size*100));
      work.current.y=Math.max(0,Math.min(100,work.current.y-dy/size*100));
      commit();
    }
  };

  const onEnd=(e)=>{
    if(!e.touches||e.touches.length===0){
      gesture.current.mode=null;
      gesture.current.drag=null;
    } else if(e.touches.length===1){
      // finger lifted from pinch — switch to drag without resetting position
      gesture.current.mode="drag";
      gesture.current.drag={x:e.touches[0].clientX,y:e.touches[0].clientY};
    }
  };

  const sc=pos.scale||1;
  const px=pos.x||50;
  const py=pos.y||50;
  return(
    <div ref={ref}
      onMouseDown={onStart} onMouseMove={e=>e.buttons===1&&onMove(e)} onMouseUp={onEnd}
      onTouchStart={onStart} onTouchMove={onMove} onTouchEnd={onEnd}
      style={{width:size,height:size,borderRadius:"50%",overflow:"hidden",cursor:"move",
              position:"relative",userSelect:"none",touchAction:"none",
              border:"3px solid "+accent,flexShrink:0}}>
      <img src={photo} draggable={false} style={{
        width:(100*sc)+"%",height:(100*sc)+"%",
        position:"absolute",
        left:((1-sc)*px)+"%",top:((1-sc)*py)+"%",
        objectFit:"cover",pointerEvents:"none"
      }}/>
    </div>
  );
}

function Onboarding({onComplete}){
  const [step,setStep]=useState(0);
  const [lang,setLang]=useState("en");
  const [theme,setTheme]=useState("manila_nights");
  const [avatar,setAvatar]=useState("a4");
  const [customPhoto,setCustomPhoto]=useState(null);
  const [photoPos,setPhotoPos]=useState({x:50,y:50,scale:1});
  const [showCropper,setShowCropper]=useState(false);
  const [name,setName]=useState("");
  const t=T[lang]||T.en;
  const th=THEMES[theme];
  const dragRef=useRef(null);

  const handlePhoto=(e)=>{
    const file=e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{setCustomPhoto(ev.target.result);setAvatar("custom");setPhotoPos({x:50,y:50});};
    reader.readAsDataURL(file);
  };

  const handleDrag=(e)=>{
    if(!dragRef.current)return;
    const rect=dragRef.current.getBoundingClientRect();
    const clientX=e.touches?e.touches[0].clientX:e.clientX;
    const clientY=e.touches?e.touches[0].clientY:e.clientY;
    const x=Math.max(0,Math.min(100,((clientX-rect.left)/rect.width)*100));
    const y=Math.max(0,Math.min(100,((clientY-rect.top)/rect.height)*100));
    setPhotoPos({x,y});
  };

  return(
    <div style={{background:th.grad,color:th.text,transition:"background 0.4s",height:"100vh",overflowY:step===2?"auto":"hidden",overflowX:"hidden"}}>
      <div style={{maxWidth:440,margin:"0 auto",height:"100%",display:"flex",flexDirection:"column",justifyContent:"center",padding:"20px 16px"}}>
        <div style={{display:"flex",justifyContent:"center",gap:6,marginBottom:28}}>
          {[0,1,2].map(i=><div key={i} style={{width:i===step?28:8,height:8,borderRadius:4,background:i<=step?th.accent:th.border,transition:"all 0.3s"}}/>)}

// ─── TIMELINE PAGE ────────────────────────────────────────────────────────────
function TimelinePage({data,onOpenLog,onDelete,onEdit}){
  const th=THEMES[data.theme];
  const t=T[data.language]||T.en;
  const lang=data.language;
  const [filterCat,setFilterCat]=useState("all");
  const [weeksShown,setWeeksShown]=useState(1);

  const weekStart=new Date();weekStart.setDate(weekStart.getDate()-weekStart.getDay());weekStart.setHours(0,0,0,0);
  const sorted=[...data.logs].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const thisWeek=sorted.filter(l=>new Date(l.date)>=weekStart);
  const older=sorted.filter(l=>new Date(l.date)<weekStart);

  const applyFilter=logs=>filterCat==="all"?logs:logs.filter(l=>l.category===filterCat);
  const filteredWeek=applyFilter(thisWeek);
  const filteredOlder=applyFilter(older);

  // Slice older into weekly pages
  const getWeekBucket=(log,weeksAgo)=>{
    const ws=new Date(weekStart);ws.setDate(ws.getDate()-weeksAgo*7);
    const we=new Date(weekStart);we.setDate(we.getDate()-(weeksAgo-1)*7);
    const d=new Date(log.date);return d>=ws&&d<we;
  };
  const visibleOlder=filteredOlder.filter(l=>{
    const diffMs=weekStart-new Date(l.date);
    const weeksAgo=Math.ceil(diffMs/(7*24*60*60*1000));
    return weeksAgo<=weeksShown;
  });
  const hasMore=filteredOlder.length>visibleOlder.length;

  const makeGroups=logs=>{
    const g={};
    logs.forEach(l=>{const d=l.date?.split("T")[0]||"Unknown";if(!g[d])g[d]=[];g[d].push(l);});
    return g;
  };
  const weekGroups=makeGroups(filteredWeek);
  const olderGroups=makeGroups(visibleOlder);

  const renderEntry=(log,i)=>{
    const meta=CAT_MAP[log.category];
    return(<div key={i} style={{padding:"14px 16px",borderRadius:14,marginBottom:8,background:th.card,border:`1px solid ${th.border}`,display:"flex",gap:12,alignItems:"flex-start"}}>

        {log.note&&<div style={{marginTop:8,padding:"8px 12px",borderRadius:10,background:th.bg,border:`1px solid ${th.border}`,fontSize:13,color:th.sub,lineHeight:1.5,fontStyle:"italic"}}>"{log.note}"</div>}

// ─── SINGLE SUGGESTION CARD ───────────────────────────────────────────────────
// No metadata (tags/genre/category) shown. Swipe left = skip, right = like.
function SingleCard({item,description,index,total,onLeft,onRight,th,isBarkada}){
  const [drag,setDrag]=useState(0);
  const [animOut,setAnimOut]=useState(null);
  const startX=useRef(null);
  const cat=CAT_MAP[item.category];
  const GREEN="#22c55e",RED="#ef4444";
  const accentColor=isBarkada?th.accent2:th.accent;

  const hs=e=>{ if(animOut)return; startX.current=(e.touches?e.touches[0]:e).clientX; };
  const hm=e=>{ if(animOut||startX.current===null)return; setDrag((e.touches?e.touches[0]:e).clientX-startX.current); };
  const he=()=>{
    if(animOut)return;
    if(drag>60){setAnimOut("right");setTimeout(()=>onRight(item),220);}
    else if(drag<-60){setAnimOut("left");setTimeout(()=>onLeft(item),220);}
    else setDrag(0);
    startX.current=null;
  };
  const tapLeft=()=>{ if(animOut)return; setAnimOut("left"); setTimeout(()=>onLeft(item),220); };
  const tapRight=()=>{ if(animOut)return; setAnimOut("right"); setTimeout(()=>onRight(item),220); };

  const tx=animOut==="left"?-500:animOut==="right"?500:drag;
  const rot=animOut==="left"?-12:animOut==="right"?12:drag*0.03;

  return(
    <div>
      {/* Progress bar */}
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
        <div style={{flex:1,height:3,borderRadius:2,background:"var(--border)",overflow:"hidden"}}>
          <div style={{height:"100%",borderRadius:2,background:accentColor,width:`${Math.round(((index+1)/total)*100)}%`,transition:"width 0.3s ease"}}/>
        </div>
        <span style={{fontSize:11,color:"var(--sub)",fontWeight:600,flexShrink:0}}>{index+1} / {total}</span>
      </div>

      <div
        onMouseDown={hs} onMouseMove={hm} onMouseUp={he} onMouseLeave={he}
        onTouchStart={hs} onTouchMove={hm} onTouchEnd={he}
        style={{transform:`translateX(${tx}px) rotate(${rot}deg)`,transition:animOut?"transform 0.22s ease-in":(drag===0?"transform 0.18s":"none"),userSelect:"none",cursor:animOut?"default":"grab",touchAction:"pan-y"}}>

        <div style={{borderRadius:22,overflow:"hidden",background:"var(--card)",border:`1px solid var(--border)`,boxShadow:"0 6px 24px rgba(0,0,0,0.1)",position:"relative"}}>
          {drag>18&&<div style={{position:"absolute",inset:0,background:GREEN+"20",borderRadius:22,zIndex:2,pointerEvents:"none",display:"flex",alignItems:"center",justifyContent:"flex-end",padding:"0 28px"}}><span style={{fontSize:36,opacity:Math.min(drag/70,1)}}>❤️</span></div>}
          {drag<-18&&<div style={{position:"absolute",inset:0,background:RED+"20",borderRadius:22,zIndex:2,pointerEvents:"none",display:"flex",alignItems:"center",padding:"0 28px"}}><span style={{fontSize:36,opacity:Math.min(-drag/70,1)}}>👋</span></div>}

          <div style={{height:4,background:`linear-gradient(90deg,${cat?.color||accentColor},${accentColor})`}}/>

          <div style={{padding:"22px 22px 20px"}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
              <span style={{fontSize:11,fontWeight:700,color:cat?.color||accentColor,textTransform:"uppercase",letterSpacing:1.2}}>{cat?.emoji} {cat?.labelEn}</span>
            </div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:"var(--text)",lineHeight:1.3,marginBottom:20}}>
              {item.title}
            </div>
            <div style={{padding:"14px 16px",borderRadius:16,background:isBarkada?`${th.accent2}12`:`${th.accent}12`,borderLeft:`3px solid ${accentColor}`}}>
              <div style={{fontSize:10,fontWeight:700,color:accentColor,textTransform:"uppercase",letterSpacing:1,marginBottom:5}}>
                {isBarkada?"Why this barkada pick":"Why this for you"}
              </div>
              <div style={{fontSize:14,color:"var(--text)",lineHeight:1.7,fontStyle:"italic",opacity:0.85}}>{description}</div>
            </div>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",borderTop:"1px solid var(--border)"}}>
            <button onClick={tapLeft} style={{padding:"14px",background:"transparent",borderRight:"1px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              <span style={{fontSize:22}}>👎</span><span style={{fontSize:12,fontWeight:600,color:"var(--sub)"}}>Skip</span>
            </button>
            <button onClick={tapRight} style={{padding:"14px",background:"transparent",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              <span style={{fontSize:22}}>👍</span><span style={{fontSize:12,fontWeight:600,color:"var(--sub)"}}>Like</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── SUGGESTION DECK (one at a time, 10 daily, loops) ────────────────────────
function SuggestionDeck({data,onFeedback,onUpdateSuggState}){
  const th=THEMES[data.theme];
  const today=todayKey();

  // Build queue and descriptions ONCE at init — never re-compute on each render
  const [queue,setQueue]=useState(()=>{
    if(data.suggDate===today && data.suggQueue?.length) return data.suggQueue;
    return buildSuggestionQueue(data.logs, data.feedback);
  });
  const [descriptions]=useState(()=>{
    const q=data.suggDate===today&&data.suggQueue?.length?data.suggQueue:buildSuggestionQueue(data.logs,data.feedback);
    return q.map((item,i)=>generateDescription(item,data.logs,data.feedback,i));
  });
  const [index,setIndex]=useState(()=>(data.suggDate===today?data.suggIndex||0:0));

  // Only persist on index change, not every render
  const prevIndex=useRef(index);
  useEffect(()=>{
    if(prevIndex.current!==index){
      prevIndex.current=index;
      onUpdateSuggState({suggQueue:queue,suggIndex:index,suggDate:today});
    }
  },[index]);

  const currentItem=queue.length?queue[index%queue.length]:null;
  const displayIndex=index%(queue.length||1);
  const currentDesc=descriptions[displayIndex]||"";

  const handleLeft=(item)=>{onFeedback(item.title,"down");setIndex(i=>i+1);};
  const handleRight=(item)=>{onFeedback(item.title,"up");setIndex(i=>i+1);};

  if(!currentItem) return(
    <div style={{textAlign:"center",padding:"32px 20px",color:"var(--sub)"}}>
      <div style={{fontSize:40,marginBottom:10}}>🌿</div>
      <p style={{fontSize:14}}>{(T[data.language]||T.en).no_suggestions}</p>
    </div>
  );

  return(
    <div>
      <SingleCard
        key={displayIndex}
        item={currentItem} description={currentDesc}
        index={displayIndex} total={queue.length}
        onLeft={handleLeft} onRight={handleRight}
        th={th} isBarkada={false}
      />
      {index>0&&index%queue.length===0&&(
        <div style={{textAlign:"center",padding:"8px",fontSize:12,color:"var(--sub)",fontStyle:"italic",opacity:0.7,marginTop:8}}>
          🔄 Looping — refreshes tomorrow
        </div>
      )}
    </div>
  );
}

// ─── BARKADA DECK (5 per day, one at a time, loops) ──────────────────────────
function BarkadaDeck({data,onUpdateBarkadaState}){
  const th=THEMES[data.theme];
  const today=todayKey();
  const [queue]=useState(()=>{
    if(data.barkadaDate===today&&data.barkadaQueue?.length) return data.barkadaQueue;
    return [...BARKADA_POOL].sort(()=>Math.random()-0.5).slice(0,5);
  });
  const [descriptions]=useState(()=>{
    const q=data.barkadaDate===today&&data.barkadaQueue?.length?data.barkadaQueue:[...BARKADA_POOL].sort(()=>Math.random()-0.5).slice(0,5);
    return q.map((_,i)=>generateBarkadaDescription(_,i));
  });
  const [index,setIndex]=useState(()=>(data.barkadaDate===today?data.barkadaIndex||0:0));

  const prevIndex=useRef(index);
  useEffect(()=>{
    if(prevIndex.current!==index){
      prevIndex.current=index;
      onUpdateBarkadaState({barkadaQueue:queue,barkadaIndex:index,barkadaDate:today});
    }
  },[index]);

  const currentItem=queue.length?queue[index%queue.length]:null;
  const displayIndex=index%(queue.length||1);

  const handleLeft=()=>setIndex(i=>i+1);
  const handleRight=()=>setIndex(i=>i+1);

  if(!currentItem) return(
    <div style={{textAlign:"center",padding:"28px",color:"var(--sub)",fontSize:13}}>
      <div style={{fontSize:32,marginBottom:8}}>🍻</div>
      <p>Come back tomorrow for fresh picks!</p>
    </div>
  );

  return(
    <div>
      <SingleCard
        key={`b-${displayIndex}`}
        item={currentItem} description={descriptions[displayIndex]||""}
        index={displayIndex} total={queue.length}
        onLeft={handleLeft} onRight={handleRight}
        th={th} isBarkada={true}
      />
      {index>0&&index%queue.length===0&&(
        <div style={{textAlign:"center",padding:"8px",fontSize:12,color:"var(--sub)",fontStyle:"italic",opacity:0.7,marginTop:8}}>
          🔄 Looping — 5 fresh picks tomorrow
        </div>
      )}
    </div>
  );
}

// ─── SHARE CARD MODAL — renders to canvas for saving as image ────────────────
function ShareCardModal({archetype,data,av,onClose}){
  const th=THEMES[data.theme];
  const canvasRef=useRef(null);
  const [imgUrl,setImgUrl]=useState(null);
  const [rendering,setRendering]=useState(true);

  const weekLogs=getWeekLogs(data.logs);
  const catCounts={};
  weekLogs.forEach(l=>{catCounts[l.category]=(catCounts[l.category]||0)+1;});
  const topCats=Object.entries(catCounts).sort((a,b)=>b[1]-a[1]).slice(0,3);

  useEffect(()=>{
    const canvas=canvasRef.current;
    if(!canvas)return;
    const W=640,H=800,dpr=Math.min(window.devicePixelRatio||1,2);
    canvas.width=W*dpr;canvas.height=H*dpr;
    canvas.style.width=W+"px";canvas.style.height=H+"px";
    const ctx=canvas.getContext("2d");
    ctx.scale(dpr,dpr);

    // Background gradient
    const bg=ctx.createLinearGradient(0,0,W,H);
    const c1=th.bg,c2=th.card;
    bg.addColorStop(0,c1);bg.addColorStop(1,c2);
    ctx.fillStyle=bg;
    ctx.beginPath();ctx.roundRect(0,0,W,H,28);ctx.fill();

    // Accent glow blob top-right
    const grd=ctx.createRadialGradient(W-80,80,10,W-80,80,200);
    grd.addColorStop(0,th.accent+"44");grd.addColorStop(1,"transparent");
    ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);

    // Bottom glow
    const grd2=ctx.createRadialGradient(80,H-80,10,80,H-80,180);
    grd2.addColorStop(0,th.accent2+"33");grd2.addColorStop(1,"transparent");
    ctx.fillStyle=grd2;ctx.fillRect(0,0,W,H);

    // Border
    ctx.strokeStyle=th.accent+"66";ctx.lineWidth=1.5;
    ctx.beginPath();ctx.roundRect(1,1,W-2,H-2,28);ctx.stroke();

    // Header row: avatar + name + date
    ctx.font="bold 13px DM Sans, sans-serif";
    ctx.fillStyle=th.sub;
    ctx.fillText("KWENTO · MY STORY",40,58);
    ctx.font="bold 20px DM Sans, sans-serif";
    ctx.fillStyle=th.text;
    ctx.fillText(data.userName,40,84);
    ctx.font="13px DM Sans, sans-serif";
    ctx.fillStyle=th.sub;
    ctx.textAlign="right";
    ctx.fillText(new Date().toLocaleDateString("en-US",{month:"short",year:"numeric"}),W-40,72);
    ctx.textAlign="left";

    // Avatar circle
    ctx.font="36px serif";
    ctx.fillText(av?.emoji||"⭐",W-80,58);

    // Divider
    ctx.strokeStyle=th.border;ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(40,104);ctx.lineTo(W-40,104);ctx.stroke();

    // Archetype emoji — big
    ctx.font="88px serif";
    ctx.textAlign="center";
    ctx.fillText(archetype.emoji,W/2,250);

    // "This Week I Am" label
    ctx.font="bold 11px DM Sans, sans-serif";
    ctx.fillStyle=th.accent;
    ctx.letterSpacing="2px";
    ctx.fillText("THIS WEEK I AM",W/2,295);
    ctx.letterSpacing="0px";

    // Archetype name — centered, auto-shrink if long
    ctx.textAlign="center";
    ctx.fillStyle=th.text;
    let fontSize=38;
    ctx.font=`bold ${fontSize}px 'Playfair Display', Georgia, serif`;
    while(ctx.measureText(archetype.name).width>W-100&&fontSize>20){fontSize--;ctx.font=`bold ${fontSize}px 'Playfair Display', Georgia, serif`;}
    ctx.fillText(archetype.name,W/2,348);

    // Description — word-wrapped
    ctx.font="italic 17px 'Playfair Display', Georgia, serif";
    ctx.fillStyle=th.sub;
    const desc=`"${archetype.desc}"`;
    const words=desc.split(" ");
    let line="",y=396,maxW=480;
    words.forEach(w=>{
      const test=line?line+" "+w:w;
      if(ctx.measureText(test).width>maxW&&line){
        ctx.fillText(line,W/2,y);line=w;y+=26;
      } else line=test;
    });
    if(line)ctx.fillText(line,W/2,y);

    // Top categories this week
    if(topCats.length){
      const boxY=480,boxH=80,boxW=W-80;
      ctx.fillStyle=th.accent+"15";
      ctx.beginPath();ctx.roundRect(40,boxY,boxW,boxH,16);ctx.fill();
      ctx.strokeStyle=th.accent+"30";ctx.lineWidth=1;
      ctx.beginPath();ctx.roundRect(40,boxY,boxW,boxH,16);ctx.stroke();

      ctx.font="bold 10px DM Sans, sans-serif";
      ctx.fillStyle=th.sub;
      ctx.fillText("THIS WEEK",W/2,boxY+22);

      const slotW=boxW/Math.max(topCats.length,3);
      topCats.forEach(([cat,cnt],i)=>{
        const m=CAT_MAP[cat];
        const x=40+slotW*i+slotW/2;
        ctx.font="26px serif";ctx.fillText(m?.emoji||"✨",x,boxY+54);
        ctx.font="bold 11px DM Sans, sans-serif";ctx.fillStyle=th.sub;
        ctx.fillText(`${cnt}×`,x,boxY+72);
      });
    }

    // Footer
    ctx.font="11px DM Sans, sans-serif";
    ctx.fillStyle=th.sub;
    ctx.globalAlpha=0.4;
    ctx.fillText("kwento · private · offline · your taste, your story",W/2,H-28);
    ctx.globalAlpha=1;

    ctx.textAlign="left";
    setImgUrl(canvas.toDataURL("image/png"));
    setRendering(false);
  },[]);

  const handleDownload=()=>{
    if(!imgUrl)return;
    const a=document.createElement("a");
    a.href=imgUrl;
    a.download=`kwento-${data.userName.toLowerCase().replace(/\s+/g,"-")}-${todayKey()}.png`;
    a.click();
  };

  const handleShare=async()=>{
    if(!imgUrl)return;
    try{
      const res=await fetch(imgUrl);
      const blob=await res.blob();
      const file=new File([blob],"kwento-story.png",{type:"image/png"});
      if(navigator.canShare&&navigator.canShare({files:[file]})){
        await navigator.share({files:[file],title:"My Kwento Story"});
      } else {
        handleDownload();
      }
    }catch(e){handleDownload();}
  };

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",zIndex:200,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-start",padding:"60px 20px 40px",overflowY:"auto"}} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="card-reveal" style={{width:"100%",maxWidth:380,display:"flex",flexDirection:"column",alignItems:"center",gap:14}}>

        {/* Hidden canvas — used to generate image */}
        <canvas ref={canvasRef} style={{display:"none"}}/>

        {/* Preview of the generated image */}
        {rendering?(
          <div style={{width:300,height:375,borderRadius:20,background:th.card,border:`1px solid ${th.border}`,display:"flex",alignItems:"center",justifyContent:"center",color:th.sub,fontSize:14}}>Rendering...</div>
        ):(
          <img src={imgUrl} alt="Kwento Story Card" style={{width:"100%",maxWidth:320,borderRadius:20,boxShadow:"0 24px 60px rgba(0,0,0,0.6)",border:`1px solid ${th.accent}44`}}/>
        )}

        {/* Buttons */}
        <div style={{width:"100%",display:"flex",flexDirection:"column",gap:10}}>
          <button onClick={handleShare} disabled={rendering} style={{width:"100%",padding:"15px",borderRadius:16,background:`linear-gradient(135deg,${th.accent},${th.accent2})`,color:"#fff",fontWeight:700,fontSize:15,display:"flex",alignItems:"center",justifyContent:"center",gap:10,boxShadow:`0 10px 32px ${th.accent}55`,opacity:rendering?0.5:1}}>
            <span style={{fontSize:18}}>📤</span><span>Share My Story</span>
          </button>
          <button onClick={handleDownload} disabled={rendering} style={{width:"100%",padding:"13px",borderRadius:16,background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.15)",color:"#fff",fontWeight:600,fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",gap:8,opacity:rendering?0.5:1}}>
            <span>💾</span><span>Save to Device</span>
          </button>
          <button onClick={onClose} style={{width:"100%",padding:"12px",borderRadius:14,background:"transparent",color:"rgba(255,255,255,0.4)",fontSize:13}}>Close</button>
        </div>
      </div>
    </div>
  );
}

// ─── PROFILE PAGE ────────────────────────────────────────────────────────────
function ProfilePage({data,onChange}){
  const th=THEMES[data.theme];
  const t=T[data.language]||T.en;
  const lang=data.language;
  const [editName,setEditName]=useState(false);
  const [nameVal,setNameVal]=useState(data.userName);
  const [showCropper,setShowCropper]=useState(false);
  const [cropPos,setCropPos]=useState(data.photoPos||{x:50,y:50,scale:1});
  // local pending state for avatar picker — only saves on Done
  const [pickerOpen,setPickerOpen]=useState(false);
  const [pendingAvatar,setPendingAvatar]=useState(data.avatar);
  const [pendingPhoto,setPendingPhoto]=useState(data.customPhoto||null);
  const archetype=getArchetype(data.logs);
  const weekLogs=getWeekLogs(data.logs);
  const curAv=AVATARS.find(a=>a.id===data.avatar);
  const swipedRight=Object.entries(data.feedback||{}).filter(([,v])=>v==="right").map(([k])=>k);
  const swipedLeft=Object.entries(data.feedback||{}).filter(([,v])=>v==="left").map(([k])=>k);

  const openPicker=()=>{
    setPendingAvatar(data.avatar);
    setPendingPhoto(data.customPhoto||null);
    setPickerOpen(true);
  };
  const donePicker=()=>{
    const patch={avatar:pendingAvatar,customPhoto:pendingPhoto||null};
    if(!pendingPhoto) patch.photoPos={x:50,y:50,scale:1};
    onChange("__batch__",patch);
    setPickerOpen(false);
  };
  const cancelPicker=()=>setPickerOpen(false);

  const openCropper=()=>{
    setCropPos(data.photoPos||{x:50,y:50,scale:1});
    setShowCropper(true);
  };
  const doneCropper=()=>{ onChange("photoPos",cropPos); setShowCropper(false); };

  const sc=data.photoPos?.scale||1;
  const px=data.photoPos?.x||50;
  const py=data.photoPos?.y||50;

  return(
    <div className="fade-in" style={{padding:"20px 20px 100px",position:"relative",zIndex:2,height:"calc(100vh - 68px)",overflowY:"auto",WebkitOverflowScrolling:"touch"}}>
      {showCropper&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.95)",zIndex:500,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:32}}>
          <p style={{color:"#fff",fontWeight:700,fontSize:18,marginBottom:8}}>Reposition Photo</p>
          <p style={{color:"rgba(255,255,255,0.5)",fontSize:13,marginBottom:32}}>Drag to move · Pinch to zoom</p>
          <PhotoCropper photo={data.customPhoto} pos={cropPos} setPos={setCropPos} size={260} accent={th.accent}/>
          <button onClick={doneCropper} style={{marginTop:36,padding:"14px 48px",borderRadius:14,background:th.accent,color:"#fff",fontWeight:700,fontSize:16}}>Done</button>
        </div>
      )}
      {/* Avatar + name */}
      <div style={{textAlign:"center",marginBottom:24}}>
        {/* Avatar circle — shows pending state as live preview when picker is open */}
        <div style={{width:88,height:88,borderRadius:"50%",fontSize:50,background:th.accent+"22",border:"2px solid "+th.accent+"44",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 12px",cursor:"pointer",position:"relative",overflow:"hidden"}}
          onClick={openPicker}>
          {(pickerOpen?pendingPhoto:data.customPhoto)
            ?<img src={pickerOpen?pendingPhoto:data.customPhoto} style={{width:(100*sc)+"%",height:(100*sc)+"%",objectFit:"cover",position:"absolute",left:((1-sc)*px)+"%",top:((1-sc)*py)+"%",pointerEvents:"none"}}/>
            :(pickerOpen?AVATARS.find(a=>a.id===pendingAvatar)?.emoji:curAv?.emoji)}
        </div>
        {pickerOpen&&(
          <div className="fade-in" style={{marginBottom:16}}>
            <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:8,marginBottom:8}}>
              {AVATARS.map(av=>(
                <div key={av.id} onClick={()=>{setPendingAvatar(av.id);setPendingPhoto(null);}} style={{padding:"10px 4px",borderRadius:12,textAlign:"center",cursor:"pointer",background:pendingAvatar===av.id&&!pendingPhoto?th.accent+"22":th.card,border:"2px solid "+(pendingAvatar===av.id&&!pendingPhoto?th.accent:th.border),transition:"all 0.15s"}}>
                  <div style={{fontSize:24}}>{av.emoji}</div>
                </div>
              ))}
            </div>
            <label style={{display:"inline-flex",alignItems:"center",gap:6,padding:"8px 14px",borderRadius:10,background:pendingPhoto?th.accent+"22":th.card,border:"1px solid "+(pendingPhoto?th.accent:th.border),cursor:"pointer",fontSize:13,color:pendingPhoto?th.accent:th.sub,marginBottom:4}}>
              📷 {pendingPhoto?"Change photo":"Use your photo"}
              <input type="file" accept="image/*" onChange={e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{setPendingPhoto(ev.target.result);setPendingAvatar("custom");};r.readAsDataURL(f);}} style={{display:"none"}}/>
            </label>
            {pendingPhoto&&<><br/><button onClick={()=>{donePicker();openCropper();}} style={{fontSize:12,color:th.accent,textDecoration:"underline",marginBottom:4}}>Reposition photo</button><br/></>}
            <br/>
            <div style={{display:"flex",gap:12,justifyContent:"center",marginTop:8}}>
              <button onClick={cancelPicker} style={{fontSize:13,color:th.sub,padding:"6px 16px",borderRadius:10,border:"1px solid "+th.border}}>Cancel</button>
              <button onClick={donePicker} style={{fontSize:13,color:"#fff",fontWeight:700,padding:"6px 20px",borderRadius:10,background:th.accent}}>Done</button>
            </div>
          </div>
        )}
        {editName?(
          <div style={{display:"flex",gap:8,justifyContent:"center",alignItems:"center",marginBottom:6}}>
            <input value={nameVal} onChange={e=>setNameVal(e.target.value)} style={{padding:"8px 14px",borderRadius:10,fontSize:16,color:th.text,background:th.card,border:"1px solid "+th.border,textAlign:"center"}}/>
            <button onClick={()=>{onChange("userName",nameVal);setEditName(false);}} style={{padding:"8px 14px",borderRadius:10,background:th.accent,color:"#fff",fontWeight:600,fontSize:13}}>Save</button>
            <button onClick={()=>setEditName(false)} style={{fontSize:20,color:th.sub}}>×</button>
          </div>
        ):(
          <h1 onClick={()=>setEditName(true)} style={{fontFamily:"'Playfair Display',serif",fontSize:24,color:th.text,marginBottom:4,cursor:"pointer"}}>{data.userName}</h1>
        )}
        <p style={{color:th.sub,fontSize:13}}>{t.welcome_back} 🌟</p>
      </div>

      {/* Archetype */}
      {archetype&&(
        <div style={{borderRadius:18,padding:"18px",marginBottom:16,background:th.accent+"15",border:`1px solid ${th.accent}44`}}>
          <div style={{fontSize:10,color:th.accent,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>{t.archetype}</div>
          <div style={{display:"flex",gap:14,alignItems:"center"}}>
            <span style={{fontSize:36}}>{archetype.emoji}</span>
            <div>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:17,color:th.text,marginBottom:4}}>{lang==="fil"?archetype.nameFil:archetype.name}</div>
              <div style={{fontSize:12,color:th.sub,lineHeight:1.5}}>{lang==="fil"?archetype.descFil:archetype.desc}</div>
            </div>
          </div>
        </div>
      )}

      {/* Stats */}
      <div style={{marginBottom:16}}>
        <h2 style={{fontSize:13,fontWeight:700,color:th.sub,textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>{t.your_stats}</h2>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {[
            ["📝",t.total_logs,data.logs.length],
            ["🗓",t.days_active,new Set(data.logs.filter(l=>!l.fromLetterboxd).map(l=>l.date?.split("T")[0])).size],
            ["✨",t.this_week,weekLogs.length],
            ["👍",lang==="fil"?"Na-like":"Liked",swipedRight.length],
          ].map(([emoji,label,val],i)=>(
            <div key={i} style={{padding:"14px 12px",borderRadius:14,background:th.card,border:`1px solid ${th.border}`,textAlign:"center"}}>

              <div style={{fontSize:11,color:th.sub,marginTop:2}}>{label}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Liked */}
      {swipedRight.length>0&&(
        <div style={{borderRadius:18,padding:"18px",marginBottom:16,background:th.card,border:`1px solid ${th.border}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:12}}>
            <h2 style={{fontSize:13,fontWeight:700,color:th.sub,textTransform:"uppercase",letterSpacing:1}}>👍 Liked</h2>
            <span style={{fontSize:11,color:th.sub}}>{swipedRight.length} total</span>

          <div style={{display:"flex",flexDirection:"column",gap:6}}>

              return(
                <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",borderRadius:10,background:th.bg,border:`1px solid ${th.border}`}}>

          </div>

      {/* Not for you */}
      {swipedLeft.length>0&&(
        <div style={{borderRadius:18,padding:"18px",marginBottom:16,background:th.card,border:`1px solid ${th.border}`}}>
          <h2 style={{fontSize:13,fontWeight:700,color:th.sub,textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>👎 Not for You</h2>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {[...new Set(swipedLeft)].slice(0,6).map((title,i)=>{
              let cat=null;
              Object.entries(LIBRARY).forEach(([cid,items])=>{if(items.find(x=>x.title===title))cat=CAT_MAP[cid];});
              return(
                <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",borderRadius:10,background:th.bg,opacity:0.7}}>

      {data.logs.length<2&&(
        <div style={{textAlign:"center",padding:"24px",color:th.sub,fontSize:13}}>

function SettingsPage({data,onChange,onReset,onImport}){

    if(!suggText.trim())return;

    setMsg(lang==="fil"?"Salamat sa iyong mungkahi! 🙏":"Thanks for the suggestion! 🙏");setSuggText("");setTimeout(()=>setMsg(""),3000);

    <div className="fade-in" style={{padding:"20px 20px 100px",position:"relative",zIndex:2,height:"calc(100vh - 68px)",overflowY:"auto",WebkitOverflowScrolling:"touch"}}>

        <p style={{fontSize:13,color:th.sub,lineHeight:1.5}}>{t.support_desc}</p>
        <div style={{marginTop:10,fontSize:12,color:th.accent,fontWeight:500}}>{t.no_ads}</div>

          {["🎨 Artist","💻 Developer","📚 Library Contributor"].map((role,i)=>(
            <div key={i} style={{padding:"6px 14px",borderRadius:20,fontSize:12,fontWeight:600,background:th.accent+"22",color:th.accent,border:`1px solid ${th.accent}44`}}>{role}</div>
          ))}
        </div>
      </div>

      {/* Suggest */}
      <div style={{borderRadius:18,padding:"18px",marginBottom:16,background:th.card,border:`1px solid ${th.border}`}}>
        <div style={{fontSize:22,marginBottom:6}}>💬</div>
        <h3 style={{fontWeight:700,color:th.text,marginBottom:5}}>{t.suggest_feature}</h3>
        <textarea value={suggText} onChange={e=>setSuggText(e.target.value)} placeholder={lang==="fil"?"I-type ang iyong mungkahi...":"Type your suggestion..."} style={{width:"100%",background:th.bg,border:`1px solid ${th.border}`,borderRadius:10,padding:"10px 12px",fontSize:13,color:th.text,minHeight:68,resize:"none",lineHeight:1.5,marginBottom:10,marginTop:8}}/>
        <button onClick={handleSuggestion} style={{padding:"10px 20px",borderRadius:10,background:th.accent,color:"#fff",fontWeight:600,fontSize:14}}>{t.send}</button>
        {msg&&<div style={{marginTop:10,fontSize:13,color:msg.includes("🌌")?"#ef4444":th.accent,fontWeight:500}}>{msg}</div>}
      </div>

      {/* Export / Import */}
      <div style={{borderRadius:18,padding:"18px",marginBottom:16,background:th.card,border:`1px solid ${th.border}`}}>
        <div style={{fontSize:22,marginBottom:6}}>💾</div>
        <h3 style={{fontWeight:700,color:th.text,marginBottom:4}}>{lang==="fil"?"I-backup ang iyong data":"Back up your data"}</h3>
        <p style={{fontSize:12,color:th.sub,marginBottom:14,lineHeight:1.5}}>{lang==="fil"?"I-export ang lahat ng iyong entries at settings bilang isang file. I-import ito kahit kailan para maibalik ang lahat.":"Export all your entries and settings as a file. Import it any time — even on a fresh install — to restore everything."}</p>
        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
          <button onClick={()=>{
            const exportData={...data,__exportedAt:new Date().toISOString(),__version:"kwento_v5"};
            const blob=new Blob([JSON.stringify(exportData,null,2)],{type:"application/json"});
            const url=URL.createObjectURL(blob);
            const a=document.createElement("a");
            a.href=url;
            a.download="kwento-backup-"+new Date().toISOString().split("T")[0]+".json";
            a.click();
            URL.revokeObjectURL(url);
          }} style={{padding:"10px 18px",borderRadius:10,background:th.accent,color:"#fff",fontWeight:600,fontSize:13}}>
            {lang==="fil"?"⬇️ I-export":"⬇️ Export"}
          </button>
          <label style={{padding:"10px 18px",borderRadius:10,background:th.bg,border:`1px solid ${th.border}`,color:th.text,fontWeight:600,fontSize:13,cursor:"pointer"}}>
            {lang==="fil"?"⬆️ Mag-import":"⬆️ Import"}
            <input type="file" accept=".json" onChange={e=>{
              const f=e.target.files[0];if(!f)return;
              const r=new FileReader();
              r.onload=ev=>{
                try{
                  const parsed=JSON.parse(ev.target.result);
                  if(!parsed.logs||!parsed.onboarded){setImportMsg("❌ "+(lang==="fil"?"Hindi valid ang file.":"Invalid backup file."));return;}
                  // Strip export metadata before importing
                  delete parsed.__exportedAt;
                  delete parsed.__version;
                  onImport(parsed);
                  setImportMsg("✅ "+(lang==="fil"?"Naibalik na ang iyong data!":"Data restored successfully!"));
                }catch{setImportMsg("❌ "+(lang==="fil"?"Hindi mabasa ang file.":"Could not read file."));}
              };
              r.readAsText(f);
              e.target.value="";
            }} style={{display:"none"}}/>
          </label>
        </div>
        {importMsg&&<p style={{marginTop:10,fontSize:13,fontWeight:500,color:importMsg.startsWith("✅")?th.accent:"#ef4444"}}>{importMsg}</p>}
      </div>

      {/* Letterboxd Import */}
      <div style={{borderRadius:18,padding:"18px",marginBottom:16,background:th.card,border:`1px solid ${th.border}`}}>
        <div style={{fontSize:22,marginBottom:6}}>🎬</div>
        <h3 style={{fontWeight:700,color:th.text,marginBottom:4}}>Letterboxd</h3>
        <p style={{fontSize:12,color:th.sub,marginBottom:4,lineHeight:1.5}}>
          {lang==="fil"
            ?"I-import ang iyong film diary mula sa Letterboxd. Pumunta sa Letterboxd → Settings → Import & Export → Export your data. I-unzip ang file at i-upload ang diary.csv dito."
            :"Import your film diary from Letterboxd. Go to Letterboxd → Settings → Import & Export → Export your data. Unzip the file and upload diary.csv here."}
        </p>
        <p style={{fontSize:11,color:th.sub,marginBottom:14,lineHeight:1.5,opacity:0.75}}>
          {lang==="fil"?"Ang mga duplicate na entry ay awtomatikong malalaktawan.":"Duplicate entries are skipped automatically."}
        </p>
        <label style={{display:"inline-flex",alignItems:"center",gap:6,padding:"10px 18px",borderRadius:10,background:th.accent,color:"#fff",fontWeight:600,fontSize:13,cursor:"pointer"}}>
          📥 {lang==="fil"?"I-import ang diary.csv":"Import diary.csv"}
          <input type="file" accept=".csv" onChange={e=>{
            const f=e.target.files[0]; if(!f)return;
            const reader=new FileReader();
            reader.onload=ev=>{
              try{
                const text=ev.target.result;
                const lines=text.trim().split("\n");
                const headers=lines[0].split(",").map(h=>h.trim().replace(/^"|"$/g,"").toLowerCase());
                // Map Letterboxd diary.csv columns — flexible header matching
                const col=name=>headers.indexOf(name);
                const nameIdx=col("name");
                const yearIdx=col("year");
                const ratingIdx=col("rating");
                const watchedIdx=col("watched date");
                const rewatchIdx=col("rewatch");
                const tagIdx=col("tags");
                if(nameIdx===-1){setLbMsg("❌ "+(lang==="fil"?"Hindi ito diary.csv ng Letterboxd.":"This doesn't look like a Letterboxd diary.csv."));return;}
                // Parse CSV rows respecting quoted commas
                const parseRow=row=>{
                  const cols=[]; let cur=""; let inQ=false;
                  for(let i=0;i<row.length;i++){
                    const ch=row[i];
                    if(ch==='"'){inQ=!inQ;}
                    else if(ch===","&&!inQ){cols.push(cur.trim());cur="";}
                    else cur+=ch;
                  }
                  cols.push(cur.trim());
                  return cols;
                };
                const existingTitles=new Set((data.logs||[]).filter(l=>l.category==="movies").map(l=>l.title.toLowerCase().trim()));
                const newEntries=[];
                for(let i=1;i<lines.length;i++){
                  if(!lines[i].trim())continue;
                  const cols=parseRow(lines[i]);
                  const title=(cols[nameIdx]||"").replace(/^"|"$/g,"").trim();
                  if(!title)continue;
                  if(existingTitles.has(title.toLowerCase()))continue;
                  const year=(cols[yearIdx]||"").replace(/^"|"$/g,"").trim();
                  const ratingRaw=parseFloat((cols[ratingIdx]||"").replace(/^"|"$/g,""));
                  const watchedDate=(cols[watchedIdx]||"").replace(/^"|"$/g,"").trim();
                  const rewatch=((cols[rewatchIdx]||"").replace(/^"|"$/g,"").toLowerCase()==="yes");
                  const tagsRaw=(tagIdx>=0?(cols[tagIdx]||""):"").replace(/^"|"$/g,"").trim();
                  const tags=tagsRaw?tagsRaw.split(",").map(t=>t.trim()).filter(Boolean):[];
                  if(year)tags.push(year);
                  if(rewatch)tags.push("rewatch");
                  // Convert Letterboxd 0.5–5 rating to our 1–10 scale
                  const rating=!isNaN(ratingRaw)?Math.round(ratingRaw*2):null;
                  const date=watchedDate?new Date(watchedDate+"T12:00:00").toISOString():new Date().toISOString();
                  newEntries.push({
                    id:Date.now()+i,
                    title,
                    category:"movies",
                    tags,
                    genre:"Film",
                    note:"",
                    mood:null,
                    date,
                    customDate:watchedDate||null,
                    fromLetterboxd:true,
                    lbRating:!isNaN(ratingRaw)?ratingRaw:null,
                  });
                  existingTitles.add(title.toLowerCase());
                }
                if(!newEntries.length){
                  setLbMsg("⚠️ "+(lang==="fil"?"Walang bagong entry na nai-import. Baka lahat ay nandoon na.":"No new entries to import — looks like everything's already logged."));
                  return;
                }
                onChange("logs",[...(data.logs||[]),...newEntries]);
                setLbMsg("✅ "+newEntries.length+(lang==="fil"?" na film ang na-import mula sa Letterboxd!":" films imported from Letterboxd!"));
              }catch(err){setLbMsg("❌ "+(lang==="fil"?"Hindi mabasa ang file.":"Could not read the file. Make sure it's diary.csv."));}
            };
            reader.readAsText(f);
            e.target.value="";
          }} style={{display:"none"}}/>
        </label>
        {lbMsg&&<p style={{marginTop:10,fontSize:13,fontWeight:500,color:lbMsg.startsWith("✅")?th.accent:lbMsg.startsWith("⚠️")?"#f59e0b":"#ef4444"}}>{lbMsg}</p>}
      </div>

      {/* Reset */}
      <div style={{marginBottom:24}}>
        {!confirmReset?(
          <button onClick={()=>setConfirmReset(true)} style={{color:"#ef4444",fontSize:13,border:"1px solid #ef444444",padding:"10px 20px",borderRadius:10}}>{t.reset_data}</button>
        ):(
          <div style={{padding:16,borderRadius:12,background:"#ef444422",border:"1px solid #ef4444"}}>
            <p style={{color:"#ef4444",fontSize:14,marginBottom:12}}>⚠️ {t.confirm_reset}</p>
            <div style={{display:"flex",gap:10}}>
              <button onClick={onReset} style={{background:"#ef4444",color:"#fff",padding:"8px 16px",borderRadius:8,fontWeight:700}}>{t.yes_reset}</button>
              <button onClick={()=>setConfirmReset(false)} style={{color:th.text,border:`1px solid ${th.border}`,padding:"8px 16px",borderRadius:8}}>{t.cancel}</button>
            </div>
          </div>
        )}
      </div>

      <div style={{textAlign:"center",color:th.sub,fontSize:11,paddingBottom:8}}>{t.made_with} · v5</div>
    </div>
  );
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
function App(){
  const [data,setData]=useState(()=>loadData()||defaultData());
  const [tab,setTab]=useState("home");
  const [showLog,setShowLog]=useState(false);
  const [editEntry,setEditEntry]=useState(null);
  const [logCat,setLogCat]=useState(null);

  useEffect(()=>saveData(data),[data]);
  // Autosave every 5 minutes as safety net
  useEffect(()=>{
    const id=setInterval(()=>saveData(data),5*60*1000);
    return()=>clearInterval(id);
  },[data]);

  const update=patch=>setData(d=>({...d,...patch}));
  const handleOnboard=({language,theme,userName,avatar,customPhoto,photoPos})=>update({onboarded:true,language,theme,userName,avatar,customPhoto:customPhoto||null,photoPos:photoPos||{x:50,y:50,scale:1}});
  const handleLog=entry=>{
    if(editEntry) update({logs:data.logs.map(l=>l.id===entry.id?entry:l)});
    else update({logs:[entry,...data.logs]});
    setEditEntry(null);
  };
  const handleDelete=id=>update({logs:data.logs.filter(l=>l.id!==id)});
  const handleEdit=entry=>{setEditEntry(entry);setShowLog(true);};
  const handleFeedback=(title,val)=>update({feedback:{...data.feedback,[title]:val}});
  const handleSeedSave=item=>{
    const exists=(data.tasteSeed||[]).find(x=>x.title===item.title);
    if(!exists)update({tasteSeed:[...(data.tasteSeed||[]),item]});
  };
  const handleSetting=(key,val)=>{
    if(key==="__showAvatarPicker") setData(d=>({...d,__showAvatarPicker:val}));
    else if(key==="__batch__") update({...val,__showAvatarPicker:false});
    else update({[key]:val,__showAvatarPicker:false});
  };
  const handleReset=()=>{
    const fresh=defaultData();
    fresh.onboarded=true;fresh.theme=data.theme;fresh.language=data.language;
    fresh.userName=data.userName;fresh.avatar=data.avatar;
    setData(fresh);
  };
  const handleUpdateSuggState=patch=>setData(d=>({...d,...patch}));
  const handleUpdateBarkadaState=patch=>setData(d=>({...d,...patch}));

  const th=THEMES[data.theme];

  return(
    <>
      <style>{CSS}</style>
      <div style={{background:th.grad,color:th.text,height:"100vh","--bg":th.bg,"--card":th.card,"--accent":th.accent,"--accent2":th.accent2,"--text":th.text,"--sub":th.sub,"--border":th.border,overflow:"hidden"}}>
        <div style={{maxWidth:500,margin:"0 auto",height:"100%",position:"relative"}}>
          {!data.onboarded?(
            <Onboarding onComplete={handleOnboard}/>
          ):(
            <>
              {tab==="home"&&<HomePage data={data} onOpenLog={(cat)=>{setEditEntry(null);setShowLog(true);setLogCat(cat||null);}}/>}
              {tab==="timeline"&&<TimelinePage data={data} onOpenLog={()=>{setEditEntry(null);setShowLog(true);setLogCat(null);}} onDelete={handleDelete} onEdit={handleEdit}/>}
              {tab==="mystory"&&<MyStoryPage data={data} onFeedback={handleFeedback} onUpdateSuggState={handleUpdateSuggState} onUpdateBarkadaState={handleUpdateBarkadaState}/>}
              {tab==="profile"&&<ProfilePage data={data} onChange={handleSetting}/>}
              {tab==="settings"&&<SettingsPage data={data} onChange={handleSetting} onReset={handleReset} onImport={d=>{setData({...d,__showAvatarPicker:false});}}/>}
              <TabBar tab={tab} setTab={setTab} data={data}/>
              {showLog&&<LogModal data={data} onClose={()=>{setShowLog(false);setEditEntry(null);setLogCat(null);}} onSave={handleLog} editEntry={editEntry} initialCat={logCat}/>}
              <ThemeAnimations theme={data.theme}/>
            </>
          )}
        </div>
      </div>
    </>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
