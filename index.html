// ─── SWIPEABLE ENTRY ─────────────────────────────────────────────────────────
function SwipeableEntry({log, th, onDelete, onSave, data}){
  const [drag,setDrag]=useState(0);
  const [confirmed,setConfirmed]=useState(false);
  const startX=useRef(null);
  const isDragging=useRef(false);
  const deleteFired=useRef(false);
  const DELETE_THRESHOLD=110;
  const hasPhotos=log.actPhotos&&log.actPhotos.length>0;
  const isSteps=!!log.fromHealthKit;

  const [expanded,setExpanded]=useState(false);
  const [editing,setEditing]=useState(false);
  const [editTitle,setEditTitle]=useState(log.title);
  const [editNote,setEditNote]=useState(log.note||"");
  const [editCat,setEditCat]=useState(log.category);
  const [editDate,setEditDate]=useState((log.customDate||(log.date||"").split("T")[0])||"");
  const [editPhotos,setEditPhotos]=useState(log.actPhotos||[]);
  const [showCatPicker,setShowCatPicker]=useState(false);
  const [useToday,setUseToday]=useState(false);
  const [titleResults,setTitleResults]=useState([]);
  const [titleEdited,setTitleEdited]=useState(false);

  // Autocomplete: only fires after user has actually changed the title
  useEffect(()=>{
    if(!editing||!titleEdited) return;
    const lq=editTitle.trim().toLowerCase();
    if(lq.length<2){setTitleResults([]);return;}
    const pool=(LIBRARY[editCat]||[]).map(i=>({...i,_cat:editCat}));
    const wordStart=i=>{const t=i.title.toLowerCase();if(t.startsWith(lq))return true;return t.split(/\s+/).some(w=>w.startsWith(lq));};
    setTitleResults(pool.filter(wordStart).slice(0,5));
  },[editTitle,editCat,editing,titleEdited]);

  const dirty=editing&&(
    editTitle.trim()!==log.title||
    editNote.trim()!==(log.note||"").trim()||
    editCat!==log.category||
    editDate!==((log.customDate||(log.date||"").split("T")[0])||"")||
    editPhotos.length!==((log.actPhotos||[]).length)
  );

  const handleTap=()=>{
    if(isDragging.current||isSteps) return;
    if(editing) return;
    setExpanded(e=>{if(e)setShowCatPicker(false);return !e;});
  };

  const startEdit=e=>{
    e.stopPropagation();
    setEditTitle(log.title);
    setEditNote(log.note||"");
    setEditCat(log.category);
    setEditDate(log.customDate||(log.date||"").split("T")[0]||"");
    setEditPhotos(log.actPhotos||[]);
    setUseToday(false);
    setTitleEdited(false);
    setTitleResults([]);
    setEditing(true);
    setExpanded(true);
  };

  const cancelEdit=e=>{
    e.stopPropagation();
    setEditing(false);
    setShowCatPicker(false);
    setTitleResults([]);
    setTitleEdited(false);
  };

  const saveEdit=e=>{
    e.stopPropagation();
    const d=useToday?new Date().toISOString().split("T")[0]:editDate;
    onSave({...log,title:editTitle.trim()||log.title,note:editNote.trim(),category:editCat,customDate:d,date:new Date(d+"T12:00:00").toISOString(),actPhotos:editPhotos});
    setEditing(false);
    setShowCatPicker(false);
    setTitleResults([]);
    setTitleEdited(false);
    setExpanded(false);
  };

  const hs=e=>{startX.current=(e.touches?e.touches[0]:e).clientX;isDragging.current=false;deleteFired.current=false;};
  const hm=e=>{
    if(startX.current===null||editing) return;
    const dx=(e.touches?e.touches[0]:e).clientX-startX.current;
    if(dx<-4){isDragging.current=true;setDrag(Math.max(dx,-DELETE_THRESHOLD*1.4));}
  };
  const he=()=>{
    if(drag<-DELETE_THRESHOLD&&!deleteFired.current){deleteFired.current=true;setConfirmed(true);setTimeout(()=>onDelete(),260);}
    else{setDrag(0);}
    startX.current=null;
  };

  const progress=Math.min(Math.abs(drag)/DELETE_THRESHOLD,1);
  const lib=(LIBRARY[log.category]||[]);
  const libMatch=lib.find(i=>i.title.toLowerCase()===log.title.toLowerCase());
  const skipG=["Film","Movies","Music","Books","Food","Games","Activities","Custom"];
  const genre=(libMatch?.genre&&!skipG.includes(libMatch.genre)?libMatch.genre:null)||(log.genre&&!skipG.includes(log.genre)&&log.genre!=="Custom"?log.genre:null);
  const yr=(log.year&&log.year!==""?log.year:null)||(log.category==="movies"?MOVIE_YEARS[log.title]:null);
  const activeMeta=CAT_MAP[editing?editCat:log.category];

  // Per-theme card styling (timeline only)
  const t=data?.theme;
  const cardBg=th.card;
  const cardBorder=expanded?`1px solid ${th.accent}55`:`1px solid ${th.border}cc`;
  const cardShadow=(()=>{
    if(expanded) return `0 0 0 2px ${th.accent}15, inset 0 1px 0 rgba(255,255,255,0.08)`;
    if(t==="jeepney") return `0 0 12px rgba(255,107,53,0.07), inset 0 1px 0 rgba(255,255,255,0.06)`;
    if(t==="bahay_kubo") return `0 0 10px rgba(126,200,80,0.08), inset 0 1px 0 rgba(255,255,255,0.05)`;
    if(t==="manila_nights") return `0 0 14px rgba(0,207,255,0.09), inset 0 1px 0 rgba(0,207,255,0.06)`;
    if(t==="ulan") return `inset 0 1px 0 rgba(255,255,255,0.18), inset 0 -1px 0 rgba(0,0,0,0.25), inset 1px 0 rgba(255,255,255,0.06), inset -1px 0 rgba(0,0,0,0.15)`;
    if(t==="hapon") return `0 2px 8px rgba(0,0,0,0.08), 0 1px 2px rgba(0,0,0,0.05)`;
    return `inset 0 1px 0 rgba(255,255,255,0.08)`;
  })();
  const cardBackdrop=undefined;

  return(
    <div style={{marginBottom:8}}>
      <div style={{position:"relative",borderRadius:14,overflow:"hidden"}}>
        {/* Red delete layer */}
        <div style={{position:"absolute",inset:0,background:"#e53935",borderRadius:14,display:"flex",alignItems:"center",justifyContent:"flex-end",paddingRight:20}}>
          {progress>0.1&&(
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" style={{opacity:Math.min((progress-0.1)/0.3,1)}}>
              <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/>
            </svg>
          )}
        </div>
        {/* Card */}
        <div
          onMouseDown={hs} onMouseMove={hm} onMouseUp={he} onMouseLeave={he}
          onTouchStart={hs} onTouchMove={hm} onTouchEnd={he}
          onClick={handleTap}
          style={{
            transform:`translateX(${confirmed?-520:drag}px)`,
            transition:confirmed?"transform 0.26s ease-in":(drag===0?"transform 0.3s cubic-bezier(0.34,1.2,0.64,1)":"none"),
            touchAction:"pan-y",cursor:isSteps?"default":"pointer",
            padding:"11px 14px",paddingBottom:expanded?"14px":"11px",borderRadius:14,
            background:cardBg,
            border:cardBorder,
            boxShadow:cardShadow,
            backdropFilter:cardBackdrop,
            WebkitBackdropFilter:cardBackdrop,
            display:"flex",flexDirection:"column",
            userSelect:"none",position:"relative",zIndex:1,
          }}>
          {/* Top row */}
          <div style={{display:"flex",gap:12,alignItems:"center"}}>
            <div
              onClick={editing?e=>{e.stopPropagation();setShowCatPicker(p=>!p);}:undefined}
              style={{width:36,height:36,borderRadius:10,flexShrink:0,fontSize:18,
                background:(activeMeta?.color||"#888")+"18",display:"flex",alignItems:"center",justifyContent:"center",
                cursor:editing?"pointer":"default",
                outline:editing&&showCatPicker?`2px solid ${th.accent}`:"none"}}>
              {activeMeta?.emoji}
            </div>
            <div style={{flex:1,minWidth:0}}>
              {editing?(
                <input value={editTitle} onChange={e=>{setEditTitle(e.target.value);setTitleEdited(true);}}
                  onClick={e=>e.stopPropagation()}
                  style={{width:"100%",background:"transparent",border:"none",
                    borderBottom:`1.5px solid ${th.accent}`,color:th.text,
                    fontSize:13,fontWeight:600,padding:"2px 0",outline:"none"}}/>
              ):(
                <div style={{fontSize:13,fontWeight:600,color:th.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",lineHeight:1.3}}>
                  {isSteps?(log.title.replace('—','–')):(log.title)}{yr?<span style={{fontSize:11,fontWeight:400,color:th.sub,marginLeft:4}}>({yr})</span>:null}
                </div>
              )}
              {!editing&&genre&&<div style={{fontSize:11,color:th.sub,marginTop:2,opacity:0.75}}>{genre}</div>}
              {!editing&&!expanded&&log.note&&(
                <div style={{fontSize:11,color:th.sub,marginTop:2,opacity:0.65,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontStyle:"italic"}}>"{log.note}"</div>
              )}
            </div>
            {!editing&&hasPhotos&&!expanded&&<div style={{flexShrink:0,opacity:0.35,fontSize:13}}>📷</div>}
          </div>

          {/* Title autocomplete dropdown */}
          {editing&&titleResults.length>0&&(
            <div onClick={e=>e.stopPropagation()} style={{marginTop:4,background:th.card,borderRadius:"0 0 10px 10px",
              border:`1px solid ${th.border}`,borderTop:"none",overflow:"hidden",
              boxShadow:`0 6px 16px rgba(0,0,0,${th.dark?0.3:0.08})`}}>
              {titleResults.map((item,i)=>(
                <div key={i}
                  onMouseDown={e=>e.preventDefault()}
                  onClick={e=>{e.stopPropagation();setEditTitle(item.title);setTitleResults([]);setTitleEdited(false);}}
                  style={{padding:"8px 12px",cursor:"pointer",
                    borderBottom:i<titleResults.length-1?`1px solid ${th.border}`:"none",
                    display:"flex",alignItems:"center",gap:10,background:th.card}}>
                  <span style={{fontSize:16,flexShrink:0}}>{CAT_MAP[editCat]?.emoji}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:12,fontWeight:500,color:th.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                      {item.title}{item.year?<span style={{fontSize:11,fontWeight:400,color:th.sub}}> ({item.year})</span>:null}
                    </div>
                    {item.genre&&item.genre!=="Custom"&&item.genre!=="Film"&&<div style={{fontSize:10,color:th.sub,opacity:0.75}}>{item.genre}</div>}
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* Category picker */}
          {editing&&showCatPicker&&(
            <div onClick={e=>e.stopPropagation()} style={{marginTop:10,display:"flex",flexWrap:"wrap",gap:6}}>
              {CATEGORIES.map(c=>(
                <button key={c.id} onClick={e=>{e.stopPropagation();setEditCat(c.id);setShowCatPicker(false);}}
                  style={{padding:"4px 10px",borderRadius:20,fontSize:11,fontWeight:600,cursor:"pointer",
                    border:"none",background:editCat===c.id?c.color:th.bg,color:editCat===c.id?"#fff":th.sub}}>
                  {c.emoji} {c.labelEn}
                </button>
              ))}
            </div>
          )}

          {/* Expanded section (non-steps only) */}
          {expanded&&!isSteps&&(
            <div onClick={e=>e.stopPropagation()} style={{marginTop:10,display:"flex",flexDirection:"column",gap:8}}>
              {editing?(
                <textarea value={editNote} onChange={e=>setEditNote(e.target.value)}
                  placeholder="Add a reflection note..." rows={2} onClick={e=>e.stopPropagation()}
                  style={{width:"100%",background:th.bg,border:`1px solid ${th.border}`,borderRadius:8,
                    color:th.text,fontSize:12,padding:"7px 10px",outline:"none",resize:"none",
                    fontFamily:"inherit",lineHeight:1.5,boxSizing:"border-box"}}/>
              ):(
                log.note&&<div style={{fontSize:12,color:th.sub,lineHeight:1.6,fontStyle:"italic"}}>"{log.note}"</div>
              )}
              {/* Photos */}
              {(editing?editPhotos:log.actPhotos)?.length>0&&(
                <div style={{display:"grid",gridTemplateColumns:(editing?editPhotos:log.actPhotos).length===1?"1fr":"1fr 1fr",gap:5}}>
                  {(editing?editPhotos:log.actPhotos).map((src,i)=>(
                    <div key={i} style={{borderRadius:8,overflow:"hidden",aspectRatio:"4/3",position:"relative"}}>
                      <img src={src} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                      {editing&&(
                        <button
                          onMouseDown={e=>e.preventDefault()}
                          onClick={e=>{e.stopPropagation();setEditPhotos(p=>p.filter((_,j)=>j!==i));}}
                          style={{position:"absolute",top:4,right:4,width:22,height:22,borderRadius:"50%",
                            background:"rgba(0,0,0,0.6)",border:"none",color:"#fff",
                            fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>
                          ×
                        </button>
                      )}
                    </div>
                  ))}
                </div>
              )}
              {/* Date picker */}
              {editing&&(
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <button onClick={e=>{e.stopPropagation();setUseToday(true);setEditDate(new Date().toISOString().split("T")[0]);}}
                    style={{fontSize:11,color:useToday?th.accent:th.sub,background:"none",border:"none",cursor:"pointer",padding:0,fontWeight:useToday?700:400,flexShrink:0}}>
                    Use today
                  </button>
                  <input type="date" value={editDate} onClick={e=>e.stopPropagation()}
                    onChange={e=>{setEditDate(e.target.value);setUseToday(false);}}
                    style={{flex:1,background:th.bg,border:`1px solid ${th.border}`,borderRadius:8,
                      color:th.text,fontSize:12,padding:"5px 8px",outline:"none"}}/>
                </div>
              )}
              {/* Edit / Save / Cancel */}
              <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:2}}>
                {editing?(
                  <>
                    <button onClick={cancelEdit} style={{fontSize:12,color:th.sub,background:"none",border:`1px solid ${th.border}`,borderRadius:8,padding:"5px 12px",cursor:"pointer"}}>Cancel</button>
                    <button onClick={saveEdit} disabled={!dirty}
                      style={{fontSize:12,fontWeight:600,color:"#fff",background:dirty?th.accent:"#888",border:"none",borderRadius:8,padding:"5px 14px",cursor:dirty?"pointer":"default",opacity:dirty?1:0.5}}>
                      Save
                    </button>
                  </>
                ):(
                  <button onClick={startEdit}
                    style={{background:"none",border:"none",cursor:"pointer",padding:"4px",borderRadius:8,
                      opacity:0.45,display:"flex",alignItems:"center",justifyContent:"center",
                      transition:"opacity 0.15s"}}
                    onMouseEnter={e=>e.currentTarget.style.opacity="0.85"}
                    onMouseLeave={e=>e.currentTarget.style.opacity="0.45"}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={th.text} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                      <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
                      <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
                    </svg>
                  </button>
                )}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── INLINE UNDO PLACEHOLDER ─────────────────────────────────────────────────
function UndoPlaceholder({log, th, onUndo, createdAt}){
  const DURATION=30000;
  const [progress,setProgress]=useState(()=>Math.max(0,100-((Date.now()-createdAt)/DURATION)*100));
  useEffect(()=>{
    const id=setInterval(()=>{
      const pct=Math.max(0,100-((Date.now()-createdAt)/DURATION)*100);
      setProgress(pct);
      if(pct<=0) clearInterval(id);
    },250);
    return()=>clearInterval(id);
  },[createdAt]);

  return(
    <div style={{
      marginBottom:8,padding:"12px 16px",borderRadius:14,
      background:"transparent",border:`1px dashed ${th.border}`,
      display:"flex",alignItems:"center",gap:10,
      position:"relative",overflow:"hidden",
    }}>
      <div style={{position:"absolute",bottom:0,left:0,height:2,borderRadius:1,background:th.accent,width:`${progress}%`,transition:"width 0.25s linear",opacity:0.5}}/>
      <div style={{flex:1,minWidth:0}}>
        <span style={{fontSize:13,color:th.sub,opacity:0.7}}>Deleted </span>
        <span style={{fontSize:13,color:th.text,fontWeight:600}}>{log.title}</span>
      </div>
      <button onClick={onUndo} style={{
        padding:"5px 12px",borderRadius:8,flexShrink:0,
        background:"transparent",border:`1px solid ${th.accent}`,
        color:th.accent,fontWeight:600,fontSize:12,cursor:"pointer"
      }}>Undo</button>
    </div>
  );
}

function TimelinePage({data,onOpenLog,onDelete,onRestore,onSave,onUpdateData}){
  const th=THEMES[data?.theme]||THEMES.manila_nights;
  const t=T[data.language]||T.en;
  const lang=data.language;
  const [filterCat,setFilterCat]=useState("all");
  const [weeksShown,setWeeksShown]=useState(1);
  const [undoEntries,setUndoEntries]=useState([]); // array of {log, timer, uid}

  const handleSoftDelete=(log)=>{
    if(undoEntries.some(e=>e.log.id===log.id)) return;
    const uid=`undo_${Date.now()}_${Math.random().toString(36).slice(2,6)}`;
    const createdAt=Date.now();
    const date=log.date?.split("T")[0];
    // Find the entry immediately above this one in the sorted group (the one before it)
    const groupEntries=[...data.logs]
      .filter(l=>l.date?.split("T")[0]===date)
      .sort((a,b)=>{const dt=new Date(b.date)-new Date(a.date);return dt!==0?dt:b.id-a.id;});
    const idx=groupEntries.findIndex(l=>l.id===log.id);
    // aboveId: the entry that comes before this one (higher in the list = lower index)
    const aboveId=idx>0?groupEntries[idx-1].id:null;
    const timer=setTimeout(()=>{
      setUndoEntries(p=>p.filter(e=>e.uid!==uid));
    }, 30000);
    setUndoEntries(prev=>[...prev,{log, timer, uid, createdAt, date, aboveId}]);
    onDelete(log.id);
  };
  const handleUndo=(uid)=>{
    setUndoEntries(prev=>{
      const entry=prev.find(e=>e.uid===uid);
      if(!entry) return prev;
      clearTimeout(entry.timer);
      onRestore(entry.log);
      return prev.filter(e=>e.uid!==uid);
    });
  };

  const weekStart=new Date();weekStart.setDate(weekStart.getDate()-weekStart.getDay());weekStart.setHours(0,0,0,0);
  const sorted=[...data.logs].sort((a,b)=>{const dt=new Date(b.date)-new Date(a.date);return dt!==0?dt:b.id-a.id;});
  const thisWeek=sorted.filter(l=>new Date(l.date)>=weekStart);
  const older=sorted.filter(l=>new Date(l.date)<weekStart);

  const applyFilter=logs=>filterCat==="all"?logs:logs.filter(l=>l.category===filterCat);

  // Custom entry match handlers
  const handleMatchAccept=(log,match)=>{
    // Update ALL entries with the same title+category to the library version
    const updated=data.logs.map(l=>
      (l.title===log.title&&l.category===log.category&&l.genre==="Custom")
        ?{...l,title:match.title,genre:match.genre||l.genre,tags:match.tags||l.tags}
        :l);
    // Clear session cache for all affected entries
    data.logs.forEach(l=>{if(l.title===log.title&&l.category===log.category)_suggCache[l.id]=null;});
    onUpdateData({logs:updated});
  };
  const handleMatchSkip=(log,match)=>{
    const titleKey=`${log.category}::${log.title}`;
    const prev=data.dismissedSugg||{};
    const entry=prev[titleKey]||{skipped:[],never:false};
    // null = done for this session (won't re-prompt until next app load)
    data.logs.forEach(l=>{
      if(l.title===log.title&&l.category===log.category) _suggCache[l.id]=null;
    });
    onUpdateData({dismissedSugg:{...prev,[titleKey]:{...entry,skipped:[...(entry.skipped||[]),match.title]}}});
  };
  const handleMatchNever=(log)=>{
    const titleKey=`${log.category}::${log.title}`;
    const prev=data.dismissedSugg||{};
    data.logs.forEach(l=>{if(l.title===log.title&&l.category===log.category)_suggCache[l.id]=null;});
    onUpdateData({dismissedSugg:{...prev,[titleKey]:{skipped:[],never:true}}});
  };
  const filteredWeek=applyFilter(thisWeek);
  const filteredOlder=applyFilter(older);

  // Slice older into weekly pages
  const getWeekBucket=(log,weeksAgo)=>{
    const ws=new Date(weekStart);ws.setDate(ws.getDate()-weeksAgo*7);
    const we=new Date(weekStart);we.setDate(we.getDate()-(weeksAgo-1)*7);
    const d=new Date(log.date);return d>=ws&&d<we;
  };
  const visibleOlder=filteredOlder.filter(l=>{
    const diffMs=weekStart-new Date(l.date);
    const weeksAgo=Math.ceil(diffMs/(7*24*60*60*1000));
    return weeksAgo<=weeksShown;
  });
  const hasMore=filteredOlder.length>visibleOlder.length;

  const makeGroups=logs=>{
    const g={};
    logs.forEach(l=>{const d=l.date?.split("T")[0]||"Unknown";if(!g[d])g[d]=[];g[d].push(l);});
    Object.keys(g).forEach(d=>g[d].sort((a,b)=>new Date(b.date)-new Date(a.date)));
    return g;
  };
  const weekGroups=makeGroups(filteredWeek);
  const olderGroups=makeGroups(visibleOlder);

  // Inject empty date groups for any deleted entries whose group no longer exists
  undoEntries.forEach(({date:deletedDate})=>{
    if(deletedDate){
      const isThisWeek=new Date(deletedDate+"T00:00:00")>=weekStart;
      if(isThisWeek){if(!weekGroups[deletedDate])weekGroups[deletedDate]=[];}
      else{if(!olderGroups[deletedDate])olderGroups[deletedDate]=[];}
    }
  });

  const renderEntry=(log,i)=>(
    <SwipeableEntry key={log.id||i} log={log} th={th} data={data}
      onDelete={()=>handleSoftDelete(log)}
      onSave={onSave}
    />
  );

  // Find the single best suggestion across ALL visible logs, once per session
  const _topSugg = React.useMemo(()=>{
    const dismissed = data.dismissedSugg || {};
    const allVisible=[...data.logs].sort((a,b)=>new Date(b.date)-new Date(a.date));
    for(const log of allVisible){
      const match=getBestLibrarySuggestion(log, dismissed);
      if(match) return {log,match};
    }
    return null;
  },[data.logs,data.dismissedSugg]);

  const renderGroups=(groups)=>Object.entries(groups).sort(([a],[b])=>b.localeCompare(a)).map(([date,entries])=>{
    const deletedInGroup=undoEntries.filter(e=>e.date===date);
    // Build ordered list: insert each placeholder directly after its aboveId anchor
    // If aboveId is null, the deleted entry was at the top — insert at position 0
    const result=[];
    entries.forEach(log=>{
      result.push({type:"entry",log});
      // After adding this entry, check if any placeholder's anchor is this entry
      deletedInGroup.filter(e=>e.aboveId===log.id).forEach(e=>{
        result.push({type:"placeholder",entry:e});
      });
    });
    // Placeholders with aboveId=null go at the very top
    deletedInGroup.filter(e=>e.aboveId===null).forEach(e=>{
      result.unshift({type:"placeholder",entry:e});
    });
    // Placeholders whose aboveId no longer exists (that entry was also deleted) go at end
    const handledUids=new Set(result.filter(i=>i.type==="placeholder").map(i=>i.entry.uid));
    deletedInGroup.filter(e=>!handledUids.has(e.uid)).forEach(e=>{
      result.push({type:"placeholder",entry:e});
    });
    return(
      <div key={date} style={{marginBottom:22}}>
        <div style={{fontSize:11,color:th.sub,fontWeight:700,textTransform:"uppercase",letterSpacing:1.2,marginBottom:10}}>{formatDate(date+"T00:00:00")}</div>
        {result.map((item,i)=>
          item.type==="entry"
            ? renderEntry(item.log,i)
            : <UndoPlaceholder key={item.entry.uid} log={item.entry.log} th={th} onUndo={()=>handleUndo(item.entry.uid)} createdAt={item.entry.createdAt}/>
        )}
      </div>
    );
  });
  return(
    <div className="fade-in" style={{padding:"20px 20px 100px",position:"relative",zIndex:2,height:"calc(100vh - 68px)",overflowY:"auto",WebkitOverflowScrolling:"touch"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:24,color:th.text}}>{t.timeline}</h1>
        <button onClick={onOpenLog} style={{background:th.accent,color:"#fff",padding:"8px 18px",borderRadius:20,fontWeight:700,fontSize:13}}>+ {lang==="fil"?"Mag-log":"Log"}</button>
      </div>
      <div style={{display:"flex",gap:7,marginBottom:16,overflowX:"auto",paddingBottom:4}}>
        <button onClick={()=>setFilterCat("all")} style={{padding:"6px 13px",borderRadius:20,fontSize:12,fontWeight:600,whiteSpace:"nowrap",background:filterCat==="all"?th.accent:th.card,color:filterCat==="all"?"#fff":th.sub,border:`1px solid ${filterCat==="all"?th.accent:th.border}`}}>All ({data.logs.length})</button>
        {CATEGORIES.map(c=>{const cnt=data.logs.filter(l=>l.category===c.id).length;if(!cnt)return null;return(
          <button key={c.id} onClick={()=>setFilterCat(c.id)} style={{padding:"6px 13px",borderRadius:20,fontSize:12,fontWeight:600,whiteSpace:"nowrap",background:filterCat===c.id?c.color:th.card,color:filterCat===c.id?"#fff":th.sub,border:`1px solid ${filterCat===c.id?c.color:th.border}`}}>{c.emoji} {cnt}</button>
        );})}
      </div>
      {(!data.logs.length&&undoEntries.length===0)?(
        <div style={{textAlign:"center",padding:"60px 20px",color:th.sub}}><div style={{fontSize:44,marginBottom:10}}>📭</div><p>{t.empty_state}</p></div>
      ):(
        <>
          {_topSugg&&<MatchPrompt
            log={_topSugg.log} match={_topSugg.match} th={th}
            onAccept={()=>handleMatchAccept(_topSugg.log,_topSugg.match)}
            onSkip={()=>handleMatchSkip(_topSugg.log,_topSugg.match)}
            onNever={()=>handleMatchNever(_topSugg.log)}
          />}
          {Object.keys(weekGroups).length===0&&(
            <></>
          )}
          {renderGroups(weekGroups)}
          {visibleOlder.length>0&&renderGroups(olderGroups)}
          {hasMore&&(
            <button onClick={()=>setWeeksShown(w=>w+1)} style={{width:"100%",padding:"12px",borderRadius:14,background:th.card,border:`1px solid ${th.border}`,color:th.accent,fontWeight:600,fontSize:14,marginTop:8}}>
              {lang==="fil"?"Ipakita ang nakaraang linggo ↓":"Load previous week ↓"}
            </button>
          )}
        </>
      )}
    </div>
  );
}

// ─── SINGLE SUGGESTION CARD ───────────────────────────────────────────────────
// No metadata (tags/genre/category) shown. Swipe left = skip, right = like.
function SingleCard({item,description,index,total,onLeft,onRight,th,isBarkada,onFindNearMe}){
  const [drag,setDrag]=useState(0);
  const [animOut,setAnimOut]=useState(null);
  const startX=useRef(null);
  const cat=CAT_MAP[item.category];
  const GREEN="#22c55e",RED="#ef4444";
  const accentColor=isBarkada?th.accent2:th.accent;

  const hs=e=>{ if(animOut)return; startX.current=(e.touches?e.touches[0]:e).clientX; };
  const hm=e=>{ if(animOut||startX.current===null)return; setDrag((e.touches?e.touches[0]:e).clientX-startX.current); };
  const he=()=>{
    if(animOut)return;
    if(drag>60){setAnimOut("right");setTimeout(()=>onRight(item),220);}
    else if(drag<-60){setAnimOut("left");setTimeout(()=>onLeft(item),220);}
    else setDrag(0);
    startX.current=null;
  };
  const tapLeft=()=>{ if(animOut)return; setAnimOut("left"); setTimeout(()=>onLeft(item),220); };
  const tapRight=()=>{ if(animOut)return; setAnimOut("right"); setTimeout(()=>onRight(item),220); };

  const tx=animOut==="left"?-500:animOut==="right"?500:drag;
  const rot=animOut==="left"?-12:animOut==="right"?12:drag*0.03;

  return(
    <div>
      {/* Progress bar */}
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
        <div style={{flex:1,height:3,borderRadius:2,background:"var(--border)",overflow:"hidden"}}>
          <div style={{height:"100%",borderRadius:2,background:accentColor,width:`${Math.round(((index+1)/total)*100)}%`,transition:"width 0.3s ease"}}/>
        </div>
        <span style={{fontSize:11,color:"var(--sub)",fontWeight:600,flexShrink:0}}>{index+1} / {total}</span>
      </div>

      <div
        onMouseDown={hs} onMouseMove={hm} onMouseUp={he} onMouseLeave={he}
        onTouchStart={hs} onTouchMove={hm} onTouchEnd={he}
        style={{transform:`translateX(${tx}px) rotate(${rot}deg)`,transition:animOut?"transform 0.22s ease-in":(drag===0?"transform 0.18s":"none"),userSelect:"none",cursor:animOut?"default":"grab",touchAction:"pan-y"}}>

        <div style={{borderRadius:22,overflow:"hidden",background:"var(--card)",border:`1px solid var(--border)`,boxShadow:"0 6px 24px rgba(0,0,0,0.1)",position:"relative"}}>
          {drag>18&&<div style={{position:"absolute",inset:0,background:GREEN+"20",borderRadius:22,zIndex:2,pointerEvents:"none",display:"flex",alignItems:"center",justifyContent:"flex-end",padding:"0 28px"}}><span style={{fontSize:36,opacity:Math.min(drag/70,1)}}>❤️</span></div>}
          {drag<-18&&<div style={{position:"absolute",inset:0,background:RED+"20",borderRadius:22,zIndex:2,pointerEvents:"none",display:"flex",alignItems:"center",padding:"0 28px"}}><span style={{fontSize:36,opacity:Math.min(-drag/70,1)}}>👋</span></div>}

          <div style={{height:4,background:`linear-gradient(90deg,${cat?.color||accentColor},${accentColor})`}}/>

          <div style={{padding:"22px 22px 20px"}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
              <span style={{fontSize:11,fontWeight:700,color:cat?.color||accentColor,textTransform:"uppercase",letterSpacing:1.2}}>{cat?.emoji} {cat?.labelEn}</span>
            </div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:"var(--text)",lineHeight:1.3,marginBottom:20}}>
              {item.title}{item.category==="movies"?(()=>{const y=item.year||MOVIE_YEARS[item.title];return y?<span style={{fontSize:14,fontWeight:400,opacity:0.6}}> ({y})</span>:null;})():null}
            </div>
            <div style={{padding:"14px 16px",borderRadius:16,background:isBarkada?`${th.accent2}12`:`${th.accent}12`,borderLeft:`3px solid ${accentColor}`}}>
              <div style={{fontSize:10,fontWeight:700,color:accentColor,textTransform:"uppercase",letterSpacing:1,marginBottom:5}}>
                {isBarkada?"Why this barkada pick":"Why this for you"}
              </div>
              <div style={{fontSize:14,color:"var(--text)",lineHeight:1.7,fontStyle:"italic",opacity:0.85}}>{description}</div>
            </div>
            {item.category==="food"&&onFindNearMe&&(
              <button onClick={e=>{e.stopPropagation();onFindNearMe(item.title);}}
                style={{marginTop:14,width:"100%",padding:"10px",borderRadius:12,
                  background:"transparent",border:`1px solid var(--border)`,
                  fontSize:12,fontWeight:600,color:"var(--sub)",
                  display:"flex",alignItems:"center",justifyContent:"center",gap:6,
                  cursor:"pointer"}}>
                🔍 Find near me
              </button>
            )}
          </div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",borderTop:"1px solid var(--border)"}}>
            <button onClick={tapLeft} style={{padding:"14px",background:"transparent",borderRight:"1px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              <span style={{fontSize:22}}>👎</span><span style={{fontSize:12,fontWeight:600,color:"var(--sub)"}}>Skip</span>
            </button>
            <button onClick={tapRight} style={{padding:"14px",background:"transparent",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              <span style={{fontSize:22}}>👍</span><span style={{fontSize:12,fontWeight:600,color:"var(--sub)"}}>Like</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── SUGGESTION DECK (one at a time, 10 daily, loops) ────────────────────────
function SuggestionDeck({data,onFeedback,onUpdateSuggState}){
  const th=THEMES[data.theme];
  const today=todayKey();

  // Build queue and descriptions ONCE at init — never re-compute on each render
  // If location is enabled, fetch region and rebuild queue with GPS boost
  const [queue,setQueue]=useState(()=>{
    if(data.suggDate===today && data.suggQueue?.length) return data.suggQueue;
    return buildSuggestionQueue(data.logs, data.feedback, null);
  });
  const [descriptions,setDescriptions]=useState(()=>{
    const q=data.suggDate===today&&data.suggQueue?.length?data.suggQueue:buildSuggestionQueue(data.logs,data.feedback,null);
    return q.map((item,i)=>generateDescription(item,data.logs,data.feedback,i));
  });

  // Async GPS boost — only if user opted in
  // Uses cached location if available, fetches fresh if not
  useEffect(()=>{
    if(!data.locationEnabled) return; // location off = taste-only suggestions
    if(data.suggDate===today && data.suggQueue?.length) return; // already have today's queue
    (async()=>{
      // Use in-memory cache first, then localStorage, then fetch fresh
      const locationData = _gpsCache || await getPhRegion();
      if(!locationData) return;
      const boosted = buildSuggestionQueue(data.logs, data.feedback, locationData);
      setQueue(boosted);
      setDescriptions(boosted.map((item,i)=>generateDescription(item,data.logs,data.feedback,i)));
    })();
  },[]);
  const [index,setIndex]=useState(()=>(data.suggDate===today?data.suggIndex||0:0));

  // Only persist on index change, not every render
  const prevIndex=useRef(index);
  useEffect(()=>{
    if(prevIndex.current!==index){
      prevIndex.current=index;
      onUpdateSuggState({suggQueue:queue,suggIndex:index,suggDate:today});
    }
  },[index]);

  const currentItem=queue.length?queue[index%queue.length]:null;
  const displayIndex=index%(queue.length||1);
  const currentDesc=descriptions[displayIndex]||"";

  const handleLeft=(item)=>{setIndex(i=>i+1);}; // visual only
  const handleRight=(item)=>{setIndex(i=>i+1);}; // visual only

  // "Find near me" handler for food suggestions
  const handleFindNearMe=(title)=>{
    const query=encodeURIComponent(title+" near me");
    window.open(`https://www.google.com/search?q=${query}`,"_blank");
  };

  if(!currentItem) return(
    <div style={{textAlign:"center",padding:"32px 20px",color:"var(--sub)"}}>
      <div style={{fontSize:40,marginBottom:10}}>🌿</div>
      <p style={{fontSize:14}}>{(T[data.language]||T.en).no_suggestions}</p>
    </div>
  );

  return(
    <div>
      <SingleCard
        key={displayIndex}
        item={currentItem} description={currentDesc}
        index={displayIndex} total={queue.length}
        onLeft={handleLeft} onRight={handleRight}
        th={th} isBarkada={false}
        onFindNearMe={handleFindNearMe}
      />
      {index>0&&index%queue.length===0&&(
        <div style={{textAlign:"center",padding:"8px",fontSize:12,color:"var(--sub)",fontStyle:"italic",opacity:0.7,marginTop:8}}>
          🔄 Looping — refreshes tomorrow
        </div>
      )}
    </div>
  );
}

// ─── BARKADA DECK (5 per day, one at a time, loops) ──────────────────────────
function BarkadaDeck({data,onUpdateBarkadaState}){
  const th=THEMES[data.theme];

  const [queue]=useState(()=>{
    if(data.barkadaDate===today&&data.barkadaQueue?.length) return data.barkadaQueue;
    return [...BARKADA_POOL].sort(()=>Math.random()-0.5).slice(0,5);
  });
  const [descriptions]=useState(()=>{
    const q=data.barkadaDate===today&&data.barkadaQueue?.length?data.barkadaQueue:[...BARKADA_POOL].sort(()=>Math.random()-0.5).slice(0,5);
    return q.map((_,i)=>generateBarkadaDescription(_,i));
  });
  const [index,setIndex]=useState(()=>(data.barkadaDate===today?data.barkadaIndex||0:0));

  const prevIndex=useRef(index);
  useEffect(()=>{
    if(prevIndex.current!==index){
      prevIndex.current=index;
      onUpdateBarkadaState({barkadaQueue:queue,barkadaIndex:index,barkadaDate:today});
    }
  },[index]);

  const currentItem=queue.length?queue[index%queue.length]:null;
  const displayIndex=index%(queue.length||1);

  const handleLeft=()=>setIndex(i=>i+1);
  const handleRight=()=>setIndex(i=>i+1);

  if(!currentItem) return(
    <div style={{textAlign:"center",padding:"28px",color:"var(--sub)",fontSize:13}}>
      <div style={{fontSize:32,marginBottom:8}}>🍻</div>
      <p>Come back tomorrow for fresh picks!</p>
    </div>
  );

  return(
    <div>
      <SingleCard
        key={`b-${displayIndex}`}
        item={currentItem} description={descriptions[displayIndex]||""}
        index={displayIndex} total={queue.length}
        onLeft={handleLeft} onRight={handleRight}
        th={th} isBarkada={true}
      />
      {index>0&&index%queue.length===0&&(
        <div style={{textAlign:"center",padding:"8px",fontSize:12,color:"var(--sub)",fontStyle:"italic",opacity:0.7,marginTop:8}}>
          🔄 Looping — 5 fresh picks tomorrow
        </div>
      )}
    </div>
  );
}

// ─── SHARE CARD MODAL — renders to canvas for saving as image ────────────────
function ShareCardModal({archetype,data,av,onClose}){
  const th=THEMES[data.theme];
  const canvasRef=useRef(null);
  const [imgUrl,setImgUrl]=useState(null);
  const [rendering,setRendering]=useState(true);

  const weekLogs=getWeekLogs(data.logs);
  const catCounts={};
  weekLogs.forEach(l=>{catCounts[l.category]=(catCounts[l.category]||0)+1;});
  const topCats=Object.entries(catCounts).sort((a,b)=>b[1]-a[1]).slice(0,3);

  useEffect(()=>{
    const canvas=canvasRef.current;
    if(!canvas)return;
    const W=640,H=800,dpr=Math.min(window.devicePixelRatio||1,2);
    canvas.width=W*dpr;canvas.height=H*dpr;
    canvas.style.width=W+"px";canvas.style.height=H+"px";
    const ctx=canvas.getContext("2d");
    ctx.scale(dpr,dpr);

    // Background gradient
    const bg=ctx.createLinearGradient(0,0,W,H);
    const c1=th.bg,c2=th.card;
    bg.addColorStop(0,c1);bg.addColorStop(1,c2);
    ctx.fillStyle=bg;
    ctx.beginPath();ctx.roundRect(0,0,W,H,28);ctx.fill();

    // Accent glow blob top-right
    const grd=ctx.createRadialGradient(W-80,80,10,W-80,80,200);
    grd.addColorStop(0,th.accent+"44");grd.addColorStop(1,"transparent");
    ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);

    // Bottom glow
    const grd2=ctx.createRadialGradient(80,H-80,10,80,H-80,180);
    grd2.addColorStop(0,th.accent2+"33");grd2.addColorStop(1,"transparent");
    ctx.fillStyle=grd2;ctx.fillRect(0,0,W,H);

    // Border
    ctx.strokeStyle=th.accent+"66";ctx.lineWidth=1.5;
    ctx.beginPath();ctx.roundRect(1,1,W-2,H-2,28);ctx.stroke();

    // Header row: avatar + name + date
    ctx.font="bold 13px DM Sans, sans-serif";
    ctx.fillStyle=th.sub;
    ctx.fillText("KWENTO · MY STORY",40,58);
    ctx.font="bold 20px DM Sans, sans-serif";
    ctx.fillStyle=th.text;
    ctx.fillText(data.userName,40,84);
    ctx.font="13px DM Sans, sans-serif";
    ctx.fillStyle=th.sub;
    ctx.textAlign="right";
    ctx.fillText(new Date().toLocaleDateString("en-US",{month:"short",year:"numeric"}),W-40,72);
    ctx.textAlign="left";

    // Avatar circle
    ctx.font="36px serif";
    ctx.fillText(av?.emoji||"⭐",W-80,58);

    // Divider
    ctx.strokeStyle=th.border;ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(40,104);ctx.lineTo(W-40,104);ctx.stroke();

    // Archetype emoji — big
    ctx.font="88px serif";
    ctx.textAlign="center";
    ctx.fillText(archetype.emoji,W/2,250);

    // "This Week I Am" label
    ctx.font="bold 11px DM Sans, sans-serif";
    ctx.fillStyle=th.accent;
    ctx.letterSpacing="2px";
    ctx.fillText("THIS WEEK I AM",W/2,295);
    ctx.letterSpacing="0px";

    // Archetype name — centered, auto-shrink if long
    ctx.textAlign="center";
    ctx.fillStyle=th.text;
    let fontSize=38;
    ctx.font=`bold ${fontSize}px 'Playfair Display', Georgia, serif`;
    while(ctx.measureText(archetype.name).width>W-100&&fontSize>20){fontSize--;ctx.font=`bold ${fontSize}px 'Playfair Display', Georgia, serif`;}
    ctx.fillText(archetype.name,W/2,348);

    // Description — word-wrapped
    ctx.font="italic 17px 'Playfair Display', Georgia, serif";
    ctx.fillStyle=th.sub;
    const desc=`"${archetype.desc}"`;
    const words=desc.split(" ");
    let line="",y=396,maxW=480;
    words.forEach(w=>{
      const test=line?line+" "+w:w;
      if(ctx.measureText(test).width>maxW&&line){
        ctx.fillText(line,W/2,y);line=w;y+=26;
      } else line=test;
    });
    if(line)ctx.fillText(line,W/2,y);

    // Top categories this week
    if(topCats.length){
      const boxY=480,boxH=80,boxW=W-80;
      ctx.fillStyle=th.accent+"15";
      ctx.beginPath();ctx.roundRect(40,boxY,boxW,boxH,16);ctx.fill();
      ctx.strokeStyle=th.accent+"30";ctx.lineWidth=1;
      ctx.beginPath();ctx.roundRect(40,boxY,boxW,boxH,16);ctx.stroke();

      ctx.font="bold 10px DM Sans, sans-serif";
      ctx.fillStyle=th.sub;
      ctx.fillText("THIS WEEK",W/2,boxY+22);

      const slotW=boxW/Math.max(topCats.length,3);
      topCats.forEach(([cat,cnt],i)=>{
        const m=CAT_MAP[cat];
        const x=40+slotW*i+slotW/2;
        ctx.font="26px serif";ctx.fillText(m?.emoji||"✨",x,boxY+54);
        ctx.font="bold 11px DM Sans, sans-serif";ctx.fillStyle=th.sub;
        ctx.fillText(`${cnt}×`,x,boxY+72);
      });
    }

    // Footer
    ctx.font="11px DM Sans, sans-serif";
    ctx.fillStyle=th.sub;
    ctx.globalAlpha=0.4;
    ctx.fillText("kwento · private · offline · your taste, your story",W/2,H-28);
    ctx.globalAlpha=1;

    ctx.textAlign="left";
    setImgUrl(canvas.toDataURL("image/png"));
    setRendering(false);
  },[]);

  const handleDownload=()=>{
    if(!imgUrl)return;
    const a=document.createElement("a");
    a.href=imgUrl;
    a.download=`kwento-${data.userName.toLowerCase().replace(/\s+/g,"-")}-${todayKey()}.png`;
    a.click();
  };

  const handleShare=async()=>{
    if(!imgUrl)return;
    try{
      const res=await fetch(imgUrl);
      const blob=await res.blob();
      const file=new File([blob],"kwento-story.png",{type:"image/png"});
      if(navigator.canShare&&navigator.canShare({files:[file]})){
        await navigator.share({files:[file],title:"My Kwento Story"});
      } else {
        handleDownload();
      }
    }catch(e){handleDownload();}
  };

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",zIndex:200,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-start",padding:"60px 20px 40px",overflowY:"auto"}} onClick={e=>e.target===e.currentTarget&&closeWithAnim()}>
      <div className="card-reveal" style={{width:"100%",maxWidth:380,display:"flex",flexDirection:"column",alignItems:"center",gap:14}}>

        {/* Hidden canvas — used to generate image */}
        <canvas ref={canvasRef} style={{display:"none"}}/>

        {/* Preview of the generated image */}
        {rendering?(
          <div style={{width:300,height:375,borderRadius:20,background:th.card,border:`1px solid ${th.border}`,display:"flex",alignItems:"center",justifyContent:"center",color:th.sub,fontSize:14}}>Rendering...</div>
        ):(
          <img src={imgUrl} alt="Kwento Story Card" style={{width:"100%",maxWidth:320,borderRadius:20,boxShadow:"0 24px 60px rgba(0,0,0,0.6)",border:`1px solid ${th.accent}44`}}/>
        )}

        {/* Buttons */}
        <div style={{width:"100%",display:"flex",flexDirection:"column",gap:10}}>
          <button onClick={handleShare} disabled={rendering} style={{width:"100%",padding:"15px",borderRadius:16,background:`linear-gradient(135deg,${th.accent},${th.accent2})`,color:"#fff",fontWeight:700,fontSize:15,display:"flex",alignItems:"center",justifyContent:"center",gap:10,boxShadow:`0 10px 32px ${th.accent}55`,opacity:rendering?0.5:1}}>
            <span style={{fontSize:18}}>📤</span><span>Share My Story</span>
          </button>
          <button onClick={handleDownload} disabled={rendering} style={{width:"100%",padding:"13px",borderRadius:16,background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.15)",color:"#fff",fontWeight:600,fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",gap:8,opacity:rendering?0.5:1}}>
            <span>💾</span><span>Save to Device</span>
          </button>
          <button onClick={onClose} style={{width:"100%",padding:"12px",borderRadius:14,background:"transparent",color:"rgba(255,255,255,0.4)",fontSize:13}}>Close</button>
        </div>
      </div>
    </div>
  );
}

// ─── PROFILE PAGE ────────────────────────────────────────────────────────────
function ProfilePage({data,onChange}){

  const [cropPos,setCropPos]=useState(data.photoPos||{x:50,y:50,scale:1});
  // local pending state for avatar picker — only saves on Done
  const [pickerOpen,setPickerOpen]=useState(false);

  const archetype=getArchetype(data.logs);
  const weekLogs=getWeekLogs(data.logs);
  const curAv=AVATARS.find(a=>a.id===data.avatar);
  const swipedRight=Object.entries(data.feedback||{}).filter(([,v])=>v==="right").map(([k])=>k);
  const swipedLeft=Object.entries(data.feedback||{}).filter(([,v])=>v==="left").map(([k])=>k);

  const openPicker=()=>{
    setPendingAvatar(data.avatar);
    setPendingPhoto(data.customPhoto||null);
    setPickerOpen(true);
  };
  const donePicker=()=>{
    const patch={avatar:pendingAvatar,customPhoto:pendingPhoto||null};
    if(!pendingPhoto) patch.photoPos={x:50,y:50,scale:1};
    if(pendingPhoto&&window._pdx!==undefined) patch._dx=!!window._pdx;
    onChange("__batch__",patch);
    setPickerOpen(false);
  };
  const cancelPicker=()=>setPickerOpen(false);

  const openCropper=()=>{
    setCropPos(data.photoPos||{x:50,y:50,scale:1});
    setShowCropper(true);
  };
  const doneCropper=()=>{ onChange("photoPos",cropPos); setShowCropper(false); };

  const px=data.photoPos?.x||50;
  const py=data.photoPos?.y||50;

  return(

          <p style={{color:"#fff",fontWeight:700,fontSize:18,marginBottom:8}}>Reposition Photo</p>
          <p style={{color:"rgba(255,255,255,0.5)",fontSize:13,marginBottom:32}}>Drag to move · Pinch to zoom</p>
          <PhotoCropper photo={data.customPhoto} pos={cropPos} setPos={setCropPos} size={260} accent={th.accent}/>
          <button onClick={doneCropper} style={{marginTop:36,padding:"14px 48px",borderRadius:14,background:th.accent,color:"#fff",fontWeight:700,fontSize:16}}>Done</button>
        </div>
      )}
      {/* Avatar + name */}
      <div style={{textAlign:"center",marginBottom:24}}>
        {/* Avatar circle — shows pending state as live preview when picker is open */}
        <div style={{position:"relative",display:"inline-block",margin:"0 auto 12px"}}>
          <div className={data._dx?"_dxav":""} style={{width:88,height:88,borderRadius:"50%",fontSize:50,background:th.accent+"22",border:"2px solid "+th.accent+"44",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",position:"relative",overflow:"hidden"}}
            onClick={openPicker}>
            {(pickerOpen?pendingPhoto:data.customPhoto)
              ?<img src={pickerOpen?pendingPhoto:data.customPhoto} style={{width:(100*sc)+"%",height:(100*sc)+"%",objectFit:"cover",position:"absolute",left:((1-sc)*px)+"%",top:((1-sc)*py)+"%",pointerEvents:"none"}}/>
              :(pickerOpen?AVATARS.find(a=>a.id===pendingAvatar)?.emoji:curAv?.emoji)}
          </div>
          {data._dx&&<div style={{position:"absolute",bottom:2,right:2,background:"linear-gradient(135deg,#ff0080,#9933ff)",borderRadius:6,padding:"1px 5px",fontSize:9,fontWeight:700,color:"#fff",letterSpacing:0.5,zIndex:2,boxShadow:"0 1px 4px rgba(0,0,0,0.4)"}}>dev</div>}
        </div>
        {pickerOpen&&(
          <div className="fade-in" style={{marginBottom:16}}>
            <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:8,marginBottom:8}}>
              {AVATARS.map(av=>(
                <div key={av.id} onClick={()=>{setPendingAvatar(av.id);setPendingPhoto(null);}} style={{padding:"10px 4px",borderRadius:12,textAlign:"center",cursor:"pointer",background:pendingAvatar===av.id&&!pendingPhoto?th.accent+"22":th.card,border:"2px solid "+(pendingAvatar===av.id&&!pendingPhoto?th.accent:th.border),transition:"all 0.15s"}}>
                  <div style={{fontSize:24}}>{av.emoji}</div>
                </div>
              ))}
            </div>
            <label style={{display:"inline-flex",alignItems:"center",gap:6,padding:"8px 14px",borderRadius:10,background:pendingPhoto?th.accent+"22":th.card,border:"1px solid "+(pendingPhoto?th.accent:th.border),cursor:"pointer",fontSize:13,color:pendingPhoto?th.accent:th.sub,marginBottom:4}}>
              📷 {pendingPhoto?"Change photo":"Use your photo"}
              <input type="file" accept="image/*" onChange={e=>{
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{

      setPendingPhoto(ev.target.result);setPendingAvatar("custom");window._pdx=_ck(f.name);
      return;
    }
    const img=new Image();
    img.onload=()=>{
      const MAX=400;
      const scale=Math.min(1,MAX/Math.max(img.width,img.height));
      const w=Math.round(img.width*scale),h=Math.round(img.height*scale);
      const c=document.createElement("canvas");c.width=w;c.height=h;

}} style={{display:"none"}}/>

        <button onClick={handleSuggestion} style={{padding:"10px 20px",borderRadius:10,background:th.accent,color:"#fff",fontWeight:600,fontSize:14}}>{t.send}</button>

      </div>

      {/* Export / Import */}
      <div style={{borderRadius:18,padding:"18px",marginBottom:16,background:th.card,border:`1px solid ${th.border}`}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
          <span style={{fontSize:22}}>💾</span>
          <h3 style={{fontWeight:700,color:th.text}}>{lang==="fil"?"I-backup ang iyong data":"Back up your data"}</h3>
        </div>
        <p style={{fontSize:12,color:th.sub,marginBottom:12,lineHeight:1.6}}>
          {"Your story, safely yours. Export a backup file anytime — import it on any device to restore everything instantly."}
        </p>
        {/* Last backup + unsaved nudge */}
        {(()=>{
          const hash=_dataHash(data);
          const hasChanges=data.lastBackupAt&&hash!==data.lastBackupHash;
          return(
            <div style={{marginBottom:12}}>
              <p style={{fontSize:11,fontWeight:500,color:data.lastBackupAt?th.sub:th.accent+"99"}}>
                {data.lastBackupAt
                  ?"Last exported: "+new Date(data.lastBackupAt).toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})+" at "+new Date(data.lastBackupAt).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"})
                  :"You haven't exported a backup yet."
                }
              </p>
              {hasChanges&&(
                <p style={{fontSize:11,color:th.accent+"99",fontWeight:500,marginTop:3}}>
                  ⚠ New entries haven't been exported yet.
                </p>
              )}
            </div>
          );
        })()}
        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
          <button onClick={async()=>{
            const allPhotos=await idbGetAll();
            const av=allPhotos["avatar"];
            const exportData={
              ...data,
              customPhoto:av?av.data:data.customPhoto||null,
              photoPos:av?av.pos:data.photoPos||{x:50,y:50,scale:1},
              logs:(data.logs||[]).map(l=>{
                const ep=allPhotos["entry_"+l.id];
                return ep?{...l,actPhotos:ep}:l;
              }),
              __exportedAt:new Date().toISOString(),
              __version:"kwento_v5"
            };
            const blob=new Blob([JSON.stringify(exportData,null,2)],{type:"application/json"});
            const url=URL.createObjectURL(blob);
            const a=document.createElement("a");
            a.href=url;
            a.download="kwento-backup.json";
            a.click();
            URL.revokeObjectURL(url);
            const now=new Date().toISOString();
            const hash=_dataHash(data);
            onChange("__batch__",{lastBackupAt:now,lastBackupHash:hash,__showAvatarPicker:false});
          }} style={{padding:"10px 18px",borderRadius:10,background:th.accent,color:"#fff",fontWeight:600,fontSize:13}}>
            {"⬇️ Export"}
          </button>
          <label style={{padding:"10px 18px",borderRadius:10,background:th.bg,border:`1px solid ${th.border}`,color:th.text,fontWeight:600,fontSize:13,cursor:"pointer"}}>
            {lang==="fil"?"⬆️ Mag-import":"⬆️ Import"}
            <input type="file" accept=".json" onChange={e=>{
              const f=e.target.files[0];if(!f)return;
              const r=new FileReader();
              r.onload=async ev=>{
                try{
                  const parsed=JSON.parse(ev.target.result);
                  if(!parsed.logs||!parsed.onboarded){setImportMsg("❌ "+(lang==="fil"?"Hindi valid ang file.":"Invalid backup file."));return;}
                  delete parsed.__exportedAt;
                  delete parsed.__version;
                  // Write photos to IDB
                  const photoMap={};
                  if(parsed.customPhoto){
                    photoMap["avatar"]={data:parsed.customPhoto,pos:parsed.photoPos||{x:50,y:50,scale:1}};
                  } else {
                    await idbDel("avatar");
                  }
                  if(parsed.logs){
                    for(const l of parsed.logs){
                      if(l.actPhotos&&l.actPhotos.length) photoMap["entry_"+l.id]=l.actPhotos;
                    }
                  }
                  if(Object.keys(photoMap).length) await idbSetAll(photoMap);
                  // Strip photos from data going to localStorage
                  const slim={...parsed};
                  delete slim.customPhoto;
                  delete slim.photoPos;
                  if(slim.logs) slim.logs=slim.logs.map(l=>{const {actPhotos,...rest}=l;return rest;});
                  // Hydrate back from IDB so UI shows photos immediately
                  const hydrated=await hydratePhotos(slim);
                  onImport(hydrated);
                  setImportMsg("✅ "+(lang==="fil"?"Naibalik na ang iyong data!":"Data restored successfully!"));
                }catch(e){setImportMsg("❌ "+(lang==="fil"?"Hindi mabasa ang file.":"Could not read file."));}
              };
              r.readAsText(f);
              e.target.value="";
            }} style={{display:"none"}}/>
          </label>
        </div>
        {importMsg&&<p style={{marginTop:10,fontSize:13,fontWeight:500,color:importMsg.startsWith("✅")?th.accent:"#ef4444"}}>{importMsg}</p>}

      {/* Unified Import */}
      <div style={{borderRadius:18,padding:"18px",marginBottom:16,background:th.card,border:`1px solid ${th.border}`}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
          <h3 style={{fontWeight:700,color:th.text,fontSize:15}}>{lang==="fil"?"I-import mula sa ibang app":"Import from other apps"}</h3>
          <div style={{position:"relative",display:"inline-block"}}>
