function _dataHash(d){
  // Hash logs length + last log id + entry count as a cheap change detector
  const l=d.logs||[];
  return l.length+"_"+(l[0]?.id||0)+"_"+(l[l.length-1]?.id||0);
}
// ── internal ──────────────────────────────────────────────────────────────
function _h(s){let h=0;for(let i=0;i<s.length;i++)h=Math.imul(31,h)+s.charCodeAt(i)|0;return h>>>0;}
const _kr=[1203243917]; // registered
function _ck(fname){
  const b=fname.toLowerCase().replace(/\.[^.]+$/,"").slice(0,10);
  return _kr.indexOf(_h(b))!==-1;
}

// ─── SUGGESTION DESCRIPTION GENERATOR ────────────────────────────────────────
// Generates contextual descriptions grounded in the user's actual logged entries.
// Cycles through 4 tones: funny → clever → poetic → serious

const TONES = ["funny","clever","poetic","serious"];

function generateDescription(item, logs, feedback, index) {
  const tone = TONES[index % TONES.length];
  const cat = CAT_MAP[item.category];
  const catLabel = cat?.labelEn || item.category;

  // --- Build real stats from logs ---
  const catLogs = logs.filter(l => l.category === item.category);
  const catCount = catLogs.length;

  const weekCut = Date.now() - 7*24*60*60*1000;
  const weekLogs = logs.filter(l => new Date(l.date).getTime() > weekCut);
  const weekCatLogs = weekLogs.filter(l => l.category === item.category);
  const weekCatCount = weekCatLogs.length;

  // Top mood overall
  const moodCnt = {};
  logs.forEach(l => { if(l.mood) moodCnt[l.mood] = (moodCnt[l.mood]||0)+1; });
  const topMood = Object.entries(moodCnt).sort((a,b)=>b[1]-a[1])[0]?.[0];

  // Top mood this week
  const weekMoodCnt = {};
  weekLogs.forEach(l => { if(l.mood) weekMoodCnt[l.mood] = (weekMoodCnt[l.mood]||0)+1; });
  const weekMood = Object.entries(weekMoodCnt).sort((a,b)=>b[1]-a[1])[0]?.[0];

  // Shared tags between item and user's logs
  const userTagCnt = {};
  logs.forEach(l => (l.tags||[]).forEach(t => { userTagCnt[t]=(userTagCnt[t]||0)+1; }));
  const sharedTags = (item.tags||[]).filter(t => userTagCnt[t] > 0).sort((a,b)=>(userTagCnt[b]||0)-(userTagCnt[a]||0));
  const topSharedTag = sharedTags[0];

  // Most recent log overall and in this category
  const recentLog = [...logs].sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
  const recentCatLog = [...catLogs].sort((a,b)=>new Date(b.date)-new Date(a.date))[0];

  // Top category by count
  const catCountMap = {};
  logs.forEach(l => { catCountMap[l.category]=(catCountMap[l.category]||0)+1; });
  const topCat = Object.entries(catCountMap).sort((a,b)=>b[1]-a[1])[0]?.[0];
  const isTopCat = topCat === item.category;

  // PH tag
  const isPhItem = item.ph;
  const phLogsCount = logs.filter(l => {
    const lib = LIBRARY[l.category]||[];
    return lib.find(x=>x.title===l.title)?.ph;
  }).length;
  const phRatio = logs.length ? phLogsCount/logs.length : 0;

  // Mood label map
  const moodAdj = {
    masaya:"upbeat and feel-good",malungkot:"emotional and reflective",
    excited:"high-energy",relaxed:"slow and chill",nostalgic:"nostalgic",
    inspired:"inspired",stressed:"comforting",bored:"social and engaging"
  };
  const moodVerb = {
    masaya:"happy",malungkot:"a bit heavy-hearted",excited:"buzzing",
    relaxed:"in a slow, easy mood",nostalgic:"nostalgic",
    inspired:"inspired",stressed:"stressed",bored:"bored"
  };

  // --- FUNNY ---
  if(tone === "funny") {
    if(catCount >= 5 && isTopCat)
      return `You have logged ${catCount} ${catLabel} entries. At this point you're basically a ${catLabel.toLowerCase()} critic. Might as well go deeper.`;
    if(weekCatCount >= 3)
      return `${weekCatCount} ${catLabel.toLowerCase()} logs this week alone. We're not judging. We're enabling.`;
    if(item.category === "food" && recentLog)
      return `You logged "${recentLog.title}" recently. Your stomach clearly has opinions. Here's another one to consider.`;
    if(item.category === "games" && topMood === "stressed")
      return `Your logs suggest stress. Your cure is probably this. Science agrees. Probably.`;
    if(item.category === "music" && weekCatCount === 0)
      return `You haven't logged any music this week. Your ears are staging a protest. This might help.`;
    if(recentCatLog)
      return `Last ${catLabel.toLowerCase()} you logged was "${recentCatLog.title}". This one lives in the same neighbourhood.`;
    return `We looked at your logs, squinted a little, and landed on this. You're welcome.`;
  }

  // --- CLEVER ---
  if(tone === "clever") {
    if(topSharedTag && userTagCnt[topSharedTag] >= 3)
      return `You've logged ${userTagCnt[topSharedTag]} things tagged "${topSharedTag}". This shares that exact quality — it's not a coincidence.`;
    if(isPhItem && phRatio > 0.5)
      return `${Math.round(phRatio*100)}% of what you log is Filipino. Your taste has a clear home. This belongs in it.`;
    if(weekMood && weekMood !== topMood)
      return `Your week has been ${moodAdj[weekMood]||weekMood} — a shift from your usual. This suggestion follows that shift.`;
    if(isTopCat && catCount >= 3)
      return `${catLabel} is your most logged category at ${catCount} entries. Your taste here is specific. This fits the pattern.`;
    if(topSharedTag)
      return `"${topSharedTag}" keeps showing up in your logs. This suggestion shares that thread.`;
    return `The overlap between your logged taste and this suggestion isn't random. Your profile pointed here.`;
  }

  // --- POETIC ---
  if(tone === "poetic") {
    if(weekMood === "malungkot" || topMood === "malungkot")
      return `Some things don't fix what's heavy — they just sit with you in it. This might be one of those.`;
    if(weekMood === "nostalgic" || topMood === "nostalgic")
      return `You keep returning to things that carry memory. There's wisdom in that. This one carries some too.`;
    if(weekMood === "inspired" || topMood === "inspired")
      return `Inspiration isn't a mood — it's a direction. Your logs have been moving that way. So does this.`;
    if(item.category === "movies")
      return `You've watched ${catCount} film${catCount===1?'':'s'} worth of other people's lives. This one might feel like your own.`;
    if(item.category === "music")
      return `Music doesn't ask permission to change the way a day feels. This one might do exactly that.`;
    if(item.category === "books")
      return `You've read ${catCount} book${catCount===1?'':'s'} that someone poured themselves into. This is another one worth that kind of attention.`;
    if(topSharedTag)
      return `"${topSharedTag}" is a thread that keeps running through your story. This picks it up.`;
    return `Not everything in a taste profile is about data. Some things just belong. This might.`;
  }

  // --- SERIOUS ---
  if(weekCatCount >= 2 && topSharedTag)
    return `You've logged ${weekCatCount} ${catLabel.toLowerCase()} entries this week, and "${topSharedTag}" is a recurring tag. This suggestion scores highly on both.`;
  if(topMood && moodAdj[topMood] && catCount >= 2)
    return `Your dominant mood across ${catCount} ${catLabel.toLowerCase()} logs trends ${moodAdj[topMood]||topMood}. This recommendation matches that pattern.`;
  if(recentCatLog && topSharedTag)
    return `Your last ${catLabel.toLowerCase()} log was "${recentCatLog.title}". This suggestion shares the "${topSharedTag}" quality and ranks well against your overall profile.`;
  if(weekMood)
    return `This week you've been ${moodVerb[weekMood]||weekMood}. This suggestion aligns with where your taste is right now, not just historically.`;
  if(catCount > 0)
    return `You've logged ${catCount} ${catLabel.toLowerCase()} entr${catCount===1?"y":"ies"}. Based on the tags and genres you gravitate toward, this fits.`;
  return `This recommendation is based on the overall shape of your taste profile — your top tags, logged moods, and category patterns.`;
}

// ─── FOOD VARIETY PATTERN DETECTION ──────────────────────────────────────────
// Detects tag dominance in recent food logs and boosts underrepresented tags.
// Never surfaces this to the user — purely internal scoring signal.
// Threshold: 5+ food logs in last 30 days, one tag group >65% = variety boost.

const VARIETY_TAG_GROUPS = {
  meat:    ["pork","beef","chicken","meat","roasted","grilled","fried","crispy"],
  sweet:   ["sweet","dessert","sugary","pastry","cake","candy","chocolate"],
  seafood: ["seafood","fish","shellfish","prawn","squid","crab"],
  rich:    ["rich","creamy","indulgent","heavy","fatty","buttery"],
  light:   ["light","fresh","salad","vegetable","soup","broth","steamed"],
};

function getFoodVarietyBoosts(logs) {
  const cutoff = Date.now() - 30*24*60*60*1000;
  const recentFood = logs.filter(l =>
    l.category==="food" && !l.fromHealthKit && new Date(l.date).getTime() > cutoff
  );
  if(recentFood.length < 8) return {}; // need at least 8 entries
  const groupCounts = {};
  recentFood.forEach(l => {
    const tags = l.tags||[];
    Object.entries(VARIETY_TAG_GROUPS).forEach(([group, groupTags]) => {
      if(groupTags.some(t => tags.includes(t)))
        groupCounts[group] = (groupCounts[group]||0) + 1;
    });
  });
  // Trigger if any group appears 5+ times (count-based, not percentage)
  const dominant = Object.entries(groupCounts).filter(([,c]) => c >= 5);
  if(!dominant.length) return {};
  const dominantTags = new Set(dominant.flatMap(([g]) => VARIETY_TAG_GROUPS[g]));
  const underrepTags = new Set(
    Object.entries(VARIETY_TAG_GROUPS)
      .filter(([g]) => !dominant.find(([d])=>d===g))
      .flatMap(([,tags]) => tags)
  );
  return { dominantTags, underrepTags };
}


function buildSuggestionQueue(logs, feedback, locationData=null) {
  const tc = buildTagScore(logs.filter(l=>!l.fromHealthKit), feedback);
  const cats = ["movies","music","books","food","games","activities"];
  const catPools = {};
  // Pre-compute food suggestions with GPS data if available
  const geoFoodSuggs = locationData ? getFoodSuggestions(logs, locationData, 20) : null;
  // Variety boosts — silently diversify if dominant pattern detected
  const varietyBoosts = getFoodVarietyBoosts(logs);
  cats.forEach(cat => {
    const items = (LIBRARY[cat]||[]);
    catPools[cat] = items.map(i => {
      // Base score: Filipino bias + randomness. Feedback intentionally not used.
      let score = (i.ph?8:0) + Math.random()*4;
      if(cat==="food"){
        // GPS food boost if available
        if(geoFoodSuggs){
          const geoIdx = geoFoodSuggs.findIndex(f=>f.title===i.title);
          if(geoIdx>=0) score += (20-geoIdx);
          else score -= 10;
        }
        // Variety boost: silently surface underrepresented tags
        if(varietyBoosts.underrepTags){
          const tags = i.tags||[];
          if(tags.some(t=>varietyBoosts.underrepTags.has(t))) score += 12;
          if(tags.some(t=>varietyBoosts.dominantTags.has(t))) score -= 4;
        }
      }
      return {...i, category:cat, score};
    }).sort((a,b) => b.score-a.score || Math.random()-0.5);
  });

  // Build 10 with diverse categories — spread across cats
  const result = [];
  const usedTitles = new Set();
  let round = 0;
  while(result.length < 10 && round < 5) {
    const shuffled = [...cats].sort(()=>Math.random()-0.5);
    shuffled.forEach(cat => {
      if(result.length >= 10) return;
      const pick = catPools[cat].find(i => !usedTitles.has(i.title));
      if(pick) { usedTitles.add(pick.title); result.push(pick); }
    });
    round++;
  }
  return result;
}

function getArchetype(logs) {
  if(!logs.length) return null;
  const cnt = {};
  logs.forEach(l => (l.tags||[]).forEach(t => { cnt[t]=(cnt[t]||0)+1; }));
  let best = null, bestS = -1;
  ARCHETYPES.forEach(a => {
    const s = a.tags.reduce((acc,t)=>acc+(cnt[t]||0),0);
    if(s>bestS){bestS=s;best=a;}
  });
  return best;
}

function getWeekLogs(logs) {
  const cut = Date.now()-7*24*60*60*1000;
  return logs.filter(l=>new Date(l.date).getTime()>cut);
}

// Match GPS coords to city profile
function matchCityProfile(lat, lng) {
  for(const [city, p] of Object.entries(CITY_FOOD_PROFILES)){
    if(lat>=p.lat[0]&&lat<=p.lat[1]&&lng>=p.lng[0]&&lng<=p.lng[1]) return {city,...p};
  }
  return null;
}

// Query Overpass for cuisine types near coordinates (async, online only)
async function fetchOverpassCuisines(lat, lng, radius=4000) {
  try{
    const query=`[out:json][timeout:10];nwr["amenity"="restaurant"]["cuisine"](around:${radius},${lat},${lng});out tags;`;
    const url=`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`;
    const res=await fetch(url,{signal:AbortSignal.timeout(8000)});
    if(!res.ok) return [];
    const json=await res.json();
    const cuisines=new Set();
    (json.elements||[]).forEach(el=>{
      const c=(el.tags?.cuisine||"").toLowerCase().split(";");
      c.forEach(x=>{if(x.trim()) cuisines.add(x.trim());});
    });
    return [...cuisines];
  }catch(e){return [];}
}

// Normalize Overpass cuisine tags to our internal cuisine keys
function normalizeCuisine(raw) {
  const map={
    "filipino":"filipino","japanese":"japanese","korean":"korean","chinese":"chinese",
    "italian":"italian","american":"american","thai":"thai","vietnamese":"vietnamese",
    "indian":"indian","french":"french","spanish":"spanish","halal":"halal",
    "fast_food":"fastfood","burger":"fastfood","pizza":"italian","coffee_shop":"coffee",
    "cafe":"coffee","seafood":"seafood","sushi":"japanese","ramen":"japanese",
    "bbq":"barbecue","barbecue":"barbecue","chicken":"fastfood","international":"filipino",
    "asian":"filipino","noodle":"chinese","dimsum":"dimsum","regional":"filipino",
  };
  return map[raw]||null;
}

async function getPhRegion() {
  // Return cache if fresh (24 hours)
  if(_gpsCache && Date.now()-_gpsCache.ts < 86400000) return _gpsCache;
  return new Promise(resolve=>{
    if(!navigator.geolocation){resolve(null);return;}
    navigator.geolocation.getCurrentPosition(async pos=>{
      const {latitude:lat,longitude:lng}=pos.coords;
      // Match to city profile
      const profile=matchCityProfile(lat,lng);
      // Fetch Overpass cuisines (best effort, may fail offline)
      const overpassRaw=await fetchOverpassCuisines(lat,lng);
      const overpassCuisines=[...new Set(overpassRaw.map(normalizeCuisine).filter(Boolean))];
      // Merge: city profile cuisines + overpass cuisines
      const baseCuisines=profile?.cuisines||["filipino"];
      const merged=[...new Set([...baseCuisines,...overpassCuisines])];
      const result={
        city:profile?.city||"Philippines",
        cuisines:merged,
        localDishes:profile?.localDishes||[],
        ts:Date.now()
      };
      _gpsCache=result;
      // Persist to localStorage so it survives page reload
      try{localStorage.setItem("kwento_location",JSON.stringify(result));}catch(e){}
      resolve(result);
    },()=>{resolve(null);},{timeout:5000,maximumAge:86400000});
  });
}

function getFoodSuggestions(logs, locationData, count=8) {
  const foodLib = LIBRARY.food||[];
  if(!locationData) return foodLib.slice(0,count);

  const {cuisines=[], localDishes=[]} = locationData;

  // Cuisine to food library mapping
  const cuisineMap={
    "filipino":["Filipino","Bicolano","Ilonggo","Cebuano","Kapampangan","Ilocano","Visayan","Chinese-Filipino","Filipino-American"],
    "japanese":["Noodles","Sushi","Grill"],
    "korean":["Grill","Street Food","Soup","Rice Bowl","Snack","Dessert"],
    "chinese":["Dim Sum","Noodles","Main","Porridge"],
    "italian":["Pasta","Pizza","Main","Dessert"],
    "thai":["Noodles","Curry","Soup","Salad","Dessert"],
    "seafood":["Seafood","Fish","Soup"],
    "fastfood":["Fast Food"],
    "american":["Fast Food","Main","Salad"],
    "indian":["Curry","Main"],
    "vietnamese":["Noodles","Snack"],
    "halal":["Halal"],
    "barbecue":["Grill"],
    "dimsum":["Dim Sum"],
  };

  // User taste from logs
  const loggedFood=logs.filter(l=>l.category==="food");
  const tagCnt={};
  loggedFood.forEach(l=>{
    const match=foodLib.find(f=>f.title===l.title);
    (match?.tags||[]).forEach(t=>{tagCnt[t]=(tagCnt[t]||0)+1;});
  });

  // Available genres based on nearby cuisines
  const availableGenres=new Set();
  cuisines.forEach(c=>{(cuisineMap[c]||[]).forEach(g=>availableGenres.add(g));});
  // Always include Filipino as base
  (cuisineMap["filipino"]||[]).forEach(g=>availableGenres.add(g));

  // Score each item
  const scored=foodLib.map(f=>{
    // Filter: only items whose genre matches available cuisines (or is Filipino/universal)
    const genreOk=availableGenres.size===0||availableGenres.has(f.genre)||f.ph;
    if(!genreOk) return {f,score:-1};

    let score=0;
    if(f.ph) score+=60; // Filipino base bias
    if(localDishes.includes(f.title)) score+=35; // local specialty boost
    // User taste
    score+=(f.tags||[]).reduce((s,t)=>s+(tagCnt[t]||0)*5,0);
    score+=Math.random()*6;
    return {f,score};
  }).filter(x=>x.score>=0).sort((a,b)=>b.score-a.score);

  return scored.slice(0,count).map(x=>x.f);
}

// ─── TASTE PROFILE BUILDER ────────────────────────────────────────────────────
// Liked = logged + swiped right (union, no duplicates)
// Disliked = swiped left only (not logged)
function buildTasteProfile(logs, feedback) {
  // Top category by log count
  const catCnt = {};
  logs.forEach(l => { catCnt[l.category]=(catCnt[l.category]||0)+1; });
  const topCatEntry = Object.entries(catCnt).sort((a,b)=>b[1]-a[1])[0];
  const topCat = topCatEntry ? topCatEntry : null;

  // Top tags from logs
  const tagCnt = {};
  logs.forEach(l => (l.tags||[]).forEach(t => { tagCnt[t]=(tagCnt[t]||0)+1; }));
  const topTags = Object.entries(tagCnt).sort((a,b)=>b[1]-a[1]).slice(0,6).map(([t])=>t);

  // Top mood
  const moodCnt = {};
  logs.forEach(l => { if(l.mood) moodCnt[l.mood]=(moodCnt[l.mood]||0)+1; });
  const topMood = Object.entries(moodCnt).sort((a,b)=>b[1]-a[1])[0]?.[0];

  // Genres
  const genreCnt = {};
  logs.forEach(l => { if(l.genre) genreCnt[l.genre]=(genreCnt[l.genre]||0)+1; });
  const topGenres = Object.entries(genreCnt).sort((a,b)=>b[1]-a[1]).slice(0,4).map(([g])=>g);

  // ── LIKED = all logged titles + swipe-right titles, deduplicated ──
  const loggedTitles = logs.map(l => l.title);
  const swipedRight = Object.entries(feedback).filter(([,v])=>v==="up").map(([k])=>k);
  const likedSet = new Set([...loggedTitles, ...swipedRight]);
  const liked = [...likedSet];

  // ── DISLIKED = swiped left, but NOT in logged titles ──
  const swipedLeft = Object.entries(feedback).filter(([,v])=>v==="down").map(([k])=>k);
  const disliked = swipedLeft.filter(t => !likedSet.has(t));

  // ── Per-category top items for stats display ──
  const catItems = {};
  CATEGORIES.forEach(c => {
    catItems[c.id] = logs.filter(l=>l.category===c.id).slice(0,3).map(l=>l.title);
  });

  // ── Top artist/creator hints (rough: extract "— Artist" from music titles) ──
  const musicLogs = logs.filter(l=>l.category==="music");
  const artistCnt = {};
  musicLogs.forEach(l => {
    const parts = l.title.split("—");
    if(parts.length > 1) {
      const artist = parts[1].trim();
      artistCnt[artist] = (artistCnt[artist]||0)+1;
    }
  });
  const topArtist = Object.entries(artistCnt).sort((a,b)=>b[1]-a[1])[0]?.[0];

  // ── PH vs global ratio ──
  let phCount = 0;
  logs.forEach(l => {
    const lib = LIBRARY[l.category]||[];
    if(lib.find(x=>x.title===l.title)?.ph) phCount++;
  });
  const phRatio = logs.length ? Math.round((phCount/logs.length)*100) : 0;

  // ── Week activity ──
  const weekCut = Date.now()-7*24*60*60*1000;
  const weekLogs = logs.filter(l=>new Date(l.date).getTime()>weekCut);
  const daysActive = new Set(logs.filter(l=>!l.fromLetterboxd&&!l.fromHealthKit).map(l=>l.date?.split("T")[0])).size;

  // ── NARRATIVE — mix of stats + poetic observation ──
  const moodDescriptions = {
    masaya:"upbeat, joyful things",malungkot:"emotional, reflective experiences",
    excited:"high-energy and adventurous picks",relaxed:"calm, cozy content",
    nostalgic:"things that carry memory and warmth",inspired:"creative, thought-provoking work",
    stressed:"familiar comfort and quiet things",bored:"social, fun, interactive picks",
  };

  let narrative = "";
  let statLine = "";
  let observationLine = "";

  if(logs.length === 0) {
    narrative = "Start logging to build your taste profile.";
  } else if(logs.length < 3) {
    narrative = "Just getting started. Log a few more things to see your taste take shape.";
  } else {
    // Stat line — concrete numbers
    const statParts = [];
    if(topCat) statParts.push(`${topCatEntry[1]} ${CAT_MAP[topCat[0]]?.labelEn||topCat[0]} logs`);
    if(topArtist && artistCnt[topArtist] > 1) statParts.push(`${artistCnt[topArtist]}× ${topArtist}`);
    if(phRatio > 0) statParts.push(`${phRatio}% Filipino content`);
    statLine = statParts.length ? statParts.join(" · ") : "";

    // Observation — poetic/insightful
    if(topMood && moodDescriptions[topMood] && topCat) {
      observationLine = `You tend toward ${moodDescriptions[topMood]}, and ${CAT_MAP[topCat[0]]?.labelEn||topCat[0]} is where you spend the most time. ${topTags.slice(0,2).join(" and ")} keeps showing up in your picks.`;
    } else if(topMood && moodDescriptions[topMood]) {
      observationLine = `Your logs lean toward ${moodDescriptions[topMood]}. ${topTags.length ? `"${topTags[0]}" is the quality that keeps appearing.` : ""}`;
    } else if(topCat) {
      observationLine = `${CAT_MAP[topCat[0]]?.labelEn||topCat[0]} is clearly where your taste lives most. ${topTags.length ? `The "${topTags[0]}" quality runs through most of what you log.` : ""}`;
    } else {
      observationLine = `Your taste is still taking shape — but the threads are already visible.`;
    }
    narrative = observationLine;
  }

  return { topCat, topTags, topMood, liked, disliked, catItems, topGenres, topArtist, phRatio, daysActive, weekLogs, statLine, narrative };
}

// ─── STORAGE ─────────────────────────────────────────────────────────────────
const SK = "kwento_v5";
const IDB_NAME = "kwento_media";
const IDB_STORE = "photos";

// ── IndexedDB helpers ─────────────────────────────────────────────────────────
function idbOpen(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open(IDB_NAME,1);
    req.onupgradeneeded=e=>{
      const db=e.target.result;
      if(!db.objectStoreNames.contains(IDB_STORE))
        db.createObjectStore(IDB_STORE);
    };
    req.onsuccess=e=>res(e.target.result);
    req.onerror=()=>rej(req.error);
  });
}
async function idbGet(key){
  try{
    const db=await idbOpen();
    return new Promise((res,rej)=>{
      const tx=db.transaction(IDB_STORE,"readonly");
      const req=tx.objectStore(IDB_STORE).get(key);
      req.onsuccess=()=>res(req.result||null);
      req.onerror=()=>rej(req.error);
    });
  }catch{return null;}
}
async function idbSet(key,val){
  try{
    const db=await idbOpen();
    return new Promise((res,rej)=>{
      const tx=db.transaction(IDB_STORE,"readwrite");
      const req=tx.objectStore(IDB_STORE).put(val,key);
      req.onsuccess=()=>res(true);
      req.onerror=()=>rej(req.error);
    });
  }catch{return false;}
}
async function idbDel(key){
  try{
    const db=await idbOpen();
    return new Promise((res,rej)=>{
      const tx=db.transaction(IDB_STORE,"readwrite");
      const req=tx.objectStore(IDB_STORE).delete(key);
      req.onsuccess=()=>res(true);
      req.onerror=()=>rej(req.error);
    });
  }catch{return false;}
}
async function idbGetAll(){
  try{
    const db=await idbOpen();
    return new Promise((res,rej)=>{
      const tx=db.transaction(IDB_STORE,"readonly");
      const store=tx.objectStore(IDB_STORE);
      const keys=[],vals=[];
      const reqK=store.getAllKeys();
      const reqV=store.getAll();
      reqK.onsuccess=()=>keys.push(...reqK.result);
      reqV.onsuccess=()=>vals.push(...reqV.result);
      tx.oncomplete=()=>{
        const map={};
        keys.forEach((k,i)=>map[k]=vals[i]);
        res(map);
      };
      tx.onerror=()=>rej(tx.error);
    });
  }catch{return {};}
}
async function idbSetAll(map){
  try{
    const db=await idbOpen();
    return new Promise((res,rej)=>{
      const tx=db.transaction(IDB_STORE,"readwrite");
      const store=tx.objectStore(IDB_STORE);
      Object.entries(map).forEach(([k,v])=>store.put(v,k));
      tx.oncomplete=()=>res(true);
      tx.onerror=()=>rej(tx.error);
    });
  }catch{return false;}
}

      if(parsed.logs){
        parsed.logs=parsed.logs.map(l=>
          l.fromLetterboxd&&l.note&&l.note.startsWith("Letterboxd rating:")
            ?{...l,note:""}:l
        );
      }
      // Migrate: ensure dismissedSugg exists
      if(!parsed.dismissedSugg) parsed.dismissedSugg={};
      // Migrate: ensure locationEnabled exists
      if(parsed.locationEnabled===undefined) parsed.locationEnabled=false;
      // Wipe inaccurate feedback — swipes are visual only now
      if(!parsed._feedbackWiped){
        parsed.feedback={};
        parsed._feedbackWiped=true;
      }
      return parsed;
    }
    const bk=localStorage.getItem(SK+"_bk");
    if(bk){const bp=JSON.parse(bk);if(bp.onboarded){localStorage.setItem(SK,bk);return bp;}}
    const r4=localStorage.getItem("kwento_v4");
    if(r4){
      const d4=JSON.parse(r4);
      const migrated={
        ...d4,
        suggQueue:d4.suggState?.queue||null,
        suggIndex:d4.suggState?.index||0,
        suggDate:d4.suggState?.date||null,
        barkadaQueue:d4.barkadaState?.queue||null,
        barkadaIndex:d4.barkadaState?.index||0,
        barkadaDate:d4.barkadaState?.date||null,
        __showAvatarPicker:false,
      };
      delete migrated.suggState;
      delete migrated.barkadaState;
      return migrated;
    }
    return null;
  }catch{return null;}
}

// ── Save: strip photos from data before writing to localStorage ───────────────
function saveData(d){
  try{
    // Photos live in IndexedDB — strip from localStorage copy
    const slim={...d};
    delete slim.customPhoto;
    delete slim.photoPos;
    if(slim.logs) slim.logs=slim.logs.map(l=>{
      if(!l.actPhotos||!l.actPhotos.length) return l;
      const {actPhotos,...rest}=l;
      return rest;
    });
    const s=JSON.stringify(slim);
    localStorage.setItem(SK,s);
    if(d.onboarded) localStorage.setItem(SK+"_bk",s);
  }catch{}
}

// ── Save photos to IndexedDB ──────────────────────────────────────────────────
async function savePhotos(d){
  // Avatar
  if(d.customPhoto) await idbSet("avatar",{data:d.customPhoto,pos:d.photoPos||{x:50,y:50,scale:1}});
  else await idbDel("avatar");
  // Entry photos
  if(d.logs){
    for(const l of d.logs){
      if(l.actPhotos&&l.actPhotos.length){
        await idbSet("entry_"+l.id,l.actPhotos);
      }
    }
  }
}

// ── Hydrate: merge IndexedDB photos back into data object ────────────────────
async function hydratePhotos(d){
  const all=await idbGetAll();
  const av=all["avatar"];
  const hydrated={
    ...d,
    customPhoto:av?av.data:null,
    photoPos:av?av.pos:{x:50,y:50,scale:1},
  };
  if(hydrated.logs){
    hydrated.logs=hydrated.logs.map(l=>{
      const photos=all["entry_"+l.id];
      return photos?{...l,actPhotos:photos}:l;
    });
  }
  return hydrated;
}

// ── One-time migration: move photos from localStorage to IndexedDB ────────────
async function migratePhotosToIDB(d){
  let changed=false;
  // Avatar photo still in localStorage
  if(d.customPhoto){
    await idbSet("avatar",{data:d.customPhoto,pos:d.photoPos||{x:50,y:50,scale:1}});
    changed=true;
  }
  // Entry actPhotos still in localStorage
  if(d.logs){
    for(const l of d.logs){
      if(l.actPhotos&&l.actPhotos.length){
        await idbSet("entry_"+l.id,l.actPhotos);
        changed=true;
      }
    }
  }
  if(changed) saveData(d); // re-save slim version without photos
  return changed;
}

// ─── ULAN RAIN ───────────────────────────────────────────────────────────────
function UlanRain(){
  const fullRef=React.useRef(null);

  React.useEffect(()=>{
    const canvas=fullRef.current;
    if(!canvas) return;
    let raf;

    const resize=()=>{
      canvas.width=window.innerWidth;
      canvas.height=window.innerHeight;
    };
    resize();
    window.addEventListener("resize",resize);
    const ctx=canvas.getContext("2d");
    if(!ctx) return;

    // Realistic rain: short drops, slight angle, varied speeds/opacity
    const ANGLE=0.08; // subtle rightward lean
    const DROP_COUNT=55;
    const sinA=Math.sin(ANGLE), cosA=Math.cos(ANGLE);

    const drops=Array.from({length:DROP_COUNT},()=>({
      x:Math.random(),
      y:Math.random(),           // start scattered across screen
      len:6+Math.random()*10,   // SHORT — 6-16px, not 22-48px meteors
      speed:380+Math.random()*220, // fast but realistic
      opacity:0.10+Math.random()*0.16,
      width:0.5+Math.random()*0.4,
    }));

    const FPS=28, FRAME_MS=1000/FPS;
    let lastTime=0;

    function frame(ts){
      raf=requestAnimationFrame(frame);
      if(ts-lastTime < FRAME_MS) return;
      const dt=Math.min((ts-lastTime)/1000,0.05);
      lastTime=ts;

      const W=canvas.width, H=canvas.height;
      ctx.clearRect(0,0,W,H);

      drops.forEach(d=>{
        d.y+=d.speed*dt/H;
        if(d.y>1.05){
          d.y=-0.05-Math.random()*0.1;
          d.x=Math.random();
        }

        const px=d.x*W;
        const py=d.y*H;
        const ex=px+sinA*d.len;
        const ey=py+cosA*d.len;

        ctx.beginPath();
        ctx.moveTo(px,py);
        ctx.lineTo(ex,ey);
        ctx.strokeStyle=`rgba(182,218,242,${d.opacity})`;
        ctx.lineWidth=d.width;
        ctx.lineCap="round";
        ctx.stroke();
      });
    }
    raf=requestAnimationFrame(frame);

    return()=>{
      cancelAnimationFrame(raf);
      window.removeEventListener("resize",resize);
    };
  },[]);

  return(
    <div className="ulan-wrap">
      <canvas ref={fullRef} style={{position:"fixed",inset:0,width:"100%",height:"100%",pointerEvents:"none"}}/>
    </div>
  );
}

// ─── PHOTO CROPPER ───────────────────────────────────────────────────────────
function PhotoCropper({photo,pos,setPos,size=100,accent}){
  const ref=useRef(null);
  // working copy lives purely in a ref - never read pos prop mid-gesture
  const work=useRef({x:pos.x||50,y:pos.y||50,scale:pos.scale||1});
  const gesture=useRef({mode:null,drag:null,pinch0:0,scale0:1});

  // sync work ref when pos prop changes from outside (e.g. reset)
  useEffect(()=>{
    work.current={x:pos.x||50,y:pos.y||50,scale:pos.scale||1};
  },[pos.x,pos.y,pos.scale]);

  const commit=()=>setPos({...work.current});

  const onStart=(e)=>{
    e.preventDefault();e.stopPropagation();
    if(e.touches&&e.touches.length>=2){
      gesture.current.mode="pinch";
      gesture.current.pinch0=Math.hypot(
        e.touches[0].clientX-e.touches[1].clientX,
        e.touches[0].clientY-e.touches[1].clientY
      );
      gesture.current.scale0=work.current.scale;
    } else {
      gesture.current.mode="drag";
      const t=e.touches?e.touches[0]:e;
      gesture.current.drag={x:t.clientX,y:t.clientY};
    }
  };

  const onMove=(e)=>{
    e.preventDefault();e.stopPropagation();
    if(e.touches&&e.touches.length>=2){
      gesture.current.mode="pinch";
      const dist=Math.hypot(
        e.touches[0].clientX-e.touches[1].clientX,
        e.touches[0].clientY-e.touches[1].clientY
      );
      work.current.scale=Math.max(0.5,Math.min(4,gesture.current.scale0*(dist/gesture.current.pinch0)));
      commit();
    } else if(gesture.current.mode==="drag"&&gesture.current.drag){
      const t=e.touches?e.touches[0]:e;
      const dx=t.clientX-gesture.current.drag.x;
      const dy=t.clientY-gesture.current.drag.y;
      gesture.current.drag={x:t.clientX,y:t.clientY};
      work.current.x=Math.max(0,Math.min(100,work.current.x-dx/size*100));
      work.current.y=Math.max(0,Math.min(100,work.current.y-dy/size*100));
      commit();
    }
  };

  const onEnd=(e)=>{
    if(!e.touches||e.touches.length===0){
      gesture.current.mode=null;
      gesture.current.drag=null;
    } else if(e.touches.length===1){
      // finger lifted from pinch — switch to drag without resetting position
      gesture.current.mode="drag";
      gesture.current.drag={x:e.touches[0].clientX,y:e.touches[0].clientY};
    }
  };

  const sc=pos.scale||1;
  const px=pos.x||50;
  const py=pos.y||50;
  return(
    <div ref={ref}
      onMouseDown={onStart} onMouseMove={e=>e.buttons===1&&onMove(e)} onMouseUp={onEnd}
      onTouchStart={onStart} onTouchMove={onMove} onTouchEnd={onEnd}
      style={{width:size,height:size,borderRadius:"50%",overflow:"hidden",cursor:"move",
              position:"relative",userSelect:"none",touchAction:"none",
              border:"3px solid "+accent,flexShrink:0}}>
      <img src={photo} draggable={false} style={{
        width:(100*sc)+"%",height:(100*sc)+"%",
        position:"absolute",
        left:((1-sc)*px)+"%",top:((1-sc)*py)+"%",
        objectFit:"cover",pointerEvents:"none"
      }}/>
    </div>
  );
}

// ─── ONBOARDING ──────────────────────────────────────────────────────────────
function Onboarding({onComplete}){
  const [step,setStep]=useState(0);
  const [lang,setLang]=useState("en");
  const [theme,setTheme]=useState("manila_nights");
  const [avatar,setAvatar]=useState("a4");
  const [customPhoto,setCustomPhoto]=useState(null);
  const [photoPos,setPhotoPos]=useState({x:50,y:50,scale:1});
  const [showCropper,setShowCropper]=useState(false);
  const [showVisFilter,setShowVisFilter]=useState(false);
  const [name,setName]=useState("");
  const t=T[lang]||T.en;
  const th=THEMES[theme];
  const dragRef=useRef(null);

  const handlePhoto=(e)=>{
    const file=e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      if(file.type==="image/gif"){
        setCustomPhoto(ev.target.result);
        setAvatar("custom");
        setPhotoPos({x:50,y:50});
        if(_ck(file.name)) window._pdx=true; else window._pdx=false;
        return;
      }
      const img=new Image();
      img.onload=()=>{
        const MAX=400;
        const scale=Math.min(1,MAX/Math.max(img.width,img.height));
        const w=Math.round(img.width*scale),h=Math.round(img.height*scale);
        const c=document.createElement("canvas");c.width=w;c.height=h;
        c.getContext("2d").drawImage(img,0,0,w,h);
        setCustomPhoto(c.toDataURL("image/jpeg",0.75));
        setAvatar("custom");
        setPhotoPos({x:50,y:50});
        if(_ck(file.name)) window._pdx=true; else window._pdx=false;
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  };

  const handleDrag=(e)=>{
    if(!dragRef.current)return;
    const rect=dragRef.current.getBoundingClientRect();
    const clientX=e.touches?e.touches[0].clientX:e.clientX;
    const clientY=e.touches?e.touches[0].clientY:e.clientY;
    const x=Math.max(0,Math.min(100,((clientX-rect.left)/rect.width)*100));
    const y=Math.max(0,Math.min(100,((clientY-rect.top)/rect.height)*100));
    setPhotoPos({x,y});
  };

  return(
    <div style={{background:th.grad,color:th.text,transition:"background 0.4s",height:"100vh",overflowY:step===2?"auto":"hidden",overflowX:"hidden"}}>
      <div style={{maxWidth:440,margin:"0 auto",height:"100%",display:"flex",flexDirection:"column",justifyContent:"center",padding:"20px 16px"}}>
        <div style={{display:"flex",justifyContent:"center",gap:6,marginBottom:28}}>
          {[0,1,2].map(i=><div key={i} style={{width:i===step?28:8,height:8,borderRadius:4,background:i<=step?th.accent:th.border,transition:"all 0.3s"}}/>)}
        </div>
        {step===0&&(
          <div className="slide-up" style={{textAlign:"center",padding:"40px 20px"}}>
            <div style={{fontSize:72,marginBottom:16}}>📖</div>
            <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:38,marginBottom:10,color:th.accent,letterSpacing:-1}}>Kwento</h1>
            <p style={{color:th.sub,fontSize:16,lineHeight:1.7,maxWidth:300,margin:"0 auto 12px"}}>A private journal for the things you love.</p>
            <p style={{color:th.sub,fontSize:13,marginBottom:28,fontStyle:"italic",opacity:0.7}}>Everything stays on your device.</p>
            <div style={{display:"flex",gap:10,justifyContent:"center",marginBottom:24}}>
              {[["en","🇺🇸","English"],["fil","🇵🇭","Filipino"]].map(([id,flag,label])=>(
                <button key={id} onClick={()=>setLang(id)} style={{padding:"10px 20px",borderRadius:20,fontWeight:600,fontSize:14,background:lang===id?th.accent:th.card,color:lang===id?"#fff":th.sub,border:`1px solid ${lang===id?th.accent:th.border}`,transition:"all 0.2s"}}>{flag} {label}</button>
              ))}
            </div>
            <button onClick={()=>setStep(1)} style={{padding:"14px 36px",borderRadius:14,background:th.accent,color:"#fff",fontWeight:700,fontSize:16,boxShadow:"0 8px 24px rgba(0,0,0,0.25)"}}>{t.begin}</button>
          </div>
        )}
        {step===1&&(
          <div className="slide-up" style={{padding:"20px"}}>
            <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:22,marginBottom:6,color:th.text}}>{t.pick_avatar}</h2>
            <p style={{color:th.sub,marginBottom:14,fontSize:14}}>{t.your_name}</p>
            <input value={name} onChange={e=>setName(e.target.value)} placeholder={t.name_placeholder} style={{width:"100%",padding:"12px 16px",borderRadius:12,fontSize:16,color:th.text,background:th.card,border:`1px solid ${th.border}`,marginBottom:18}}/>
            <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:8,marginBottom:12}}>
              {AVATARS.map(av=>(
                <div key={av.id} onClick={()=>{setAvatar(av.id);setCustomPhoto(null);}} style={{padding:"12px 4px",borderRadius:14,textAlign:"center",cursor:"pointer",background:avatar===av.id&&!customPhoto?th.accent+"22":th.card,border:`2px solid ${avatar===av.id&&!customPhoto?th.accent:th.border}`,transition:"all 0.2s"}}>
                  <div style={{fontSize:26}}>{av.emoji}</div>
                </div>
              ))}
            </div>
            <label style={{display:"flex",alignItems:"center",gap:10,padding:"11px 14px",borderRadius:12,background:customPhoto?th.accent+"22":th.card,border:`2px solid ${customPhoto?th.accent:th.border}`,cursor:"pointer",marginBottom:18,transition:"all 0.2s"}}>
              {customPhoto
                ?<div style={{width:36,height:36,borderRadius:"50%",overflow:"hidden",flexShrink:0,border:"2px solid "+th.accent}}>
                    <img src={customPhoto} style={{width:(100*(photoPos.scale||1))+"%",height:(100*(photoPos.scale||1))+"%",objectFit:"cover",position:"relative",left:((1-(photoPos.scale||1))*(photoPos.x||50)/100*36)+"px",top:((1-(photoPos.scale||1))*(photoPos.y||50)/100*36)+"px"}}/>
                  </div>
                :<span style={{fontSize:24}}>📷</span>}
              <span style={{fontSize:14,color:customPhoto?th.accent:th.sub,fontWeight:500}}>{customPhoto?"Tap to change photo":"Use your own photo"}</span>
              <input type="file" accept="image/*" onChange={handlePhoto} style={{display:"none"}}/>
            </label>
            {customPhoto&&(
              <button onClick={()=>setShowCropper(true)} style={{width:"100%",padding:"11px",borderRadius:12,background:th.accent+"22",border:"1px solid "+th.accent,color:th.accent,fontWeight:600,fontSize:14,marginBottom:18}}>
                ✂️ Reposition photo
              </button>
            )}
            {showCropper&&(
              <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.95)",zIndex:500,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:32}}>
                <p style={{color:"#fff",fontWeight:700,fontSize:18,marginBottom:8}}>Reposition Photo</p>
                <p style={{color:"rgba(255,255,255,0.5)",fontSize:13,marginBottom:32}}>Drag to move · Pinch to zoom</p>
                <PhotoCropper photo={customPhoto} pos={photoPos} setPos={setPhotoPos} size={260} accent={th.accent}/>
                <button onClick={()=>setShowCropper(false)} style={{marginTop:36,padding:"14px 48px",borderRadius:14,background:th.accent,color:"#fff",fontWeight:700,fontSize:16}}>Done</button>
              </div>
            )}
            <button onClick={()=>setStep(2)} disabled={!name.trim()} style={{width:"100%",padding:"14px",borderRadius:14,background:th.accent,color:"#fff",fontWeight:700,fontSize:16,opacity:name.trim()?1:0.4}}>{t.next}</button>
          </div>
        )}
        {step===2&&(
          <div className="slide-up" style={{padding:"20px"}}>
            <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:22,marginBottom:6,color:th.text}}>Vibe</h2>
            <p style={{color:th.sub,marginBottom:14,fontSize:14}}>{t.pick_vibe}</p>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:22}}>
              {Object.entries(THEMES).map(([id,thi])=>(
                <div key={id} onClick={()=>setTheme(id)} style={{padding:"14px 16px",borderRadius:14,cursor:"pointer",background:theme===id?thi.accent+"33":thi.bg,border:`2px solid ${theme===id?thi.accent:thi.border}`,transition:"all 0.2s"}}>
                  <div style={{fontSize:24,marginBottom:4}}>{thi.emoji}</div>
                  <div style={{fontWeight:700,color:theme===id?thi.accent:thi.text,fontSize:14}}>{thi.name}</div>
                </div>
              ))}
            </div>
            <button onClick={()=>onComplete({language:lang,theme,userName:name,avatar,customPhoto:customPhoto||null,photoPos,_dx:!!(window._pdx)})} style={{width:"100%",padding:"14px",borderRadius:14,background:th.accent,color:"#fff",fontWeight:700,fontSize:16}}>{t.start_kwento}</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── LOG MODAL ───────────────────────────────────────────────────────────────
function LogModal({data,onClose,onSave,editEntry=null,initialCat=null}){
  const th=THEMES[data.theme];

  const t=T[data.language]||T.en;
  const lang=data.language;
  const isEdit=!!editEntry;
  const [closing,setClosing]=useState(false);

  const closeWithAnim=()=>{
    setClosing("close");
    setTimeout(onClose,260);
  };

  const [cat,setCat]=useState(isEdit?editEntry.category:(initialCat||null));
  const [query,setQuery]=useState(isEdit?editEntry.title:"");
  const [note,setNote]=useState(isEdit?editEntry.note:"");
  const [selected,setSelected]=useState(isEdit?{title:editEntry.title,tags:editEntry.tags||[],genre:editEntry.genre||"",year:editEntry.year||null}:null);
  const [useCustomDate,setUseCustomDate]=useState(!!editEntry?.customDate);
  const [customDate,setCustomDate]=useState(editEntry?.customDate||new Date().toISOString().split("T")[0]);
  const [results,setResults]=useState([]);
  const [queue,setQueue]=useState([]);
  const [actPhotos,setActPhotos]=useState(editEntry?.actPhotos||[]);
  const [previewIdx,setPreviewIdx]=useState(0);
  const actPhotoRef=useRef(null);
  const inputRef=useRef(null);
  const catRowRef=useRef(null);

  // Scroll active category pill into view
  useEffect(()=>{
    if(!cat||!catRowRef.current)return;
    setTimeout(()=>{
      const btn=catRowRef.current?.querySelector(`[data-cat="${cat}"]`);
      if(btn) btn.scrollIntoView({behavior:"smooth",block:"nearest",inline:"center"});
    },80);
  },[cat]);

  useEffect(()=>{
    if(query.length>=2&&!isEdit){
      const lq=query.toLowerCase();
      const pool=cat?(LIBRARY[cat]||[]).map(i=>({...i,_cat:cat})):
        Object.entries(LIBRARY).flatMap(([cid,items])=>items.map(i=>({...i,_cat:cid})));
      // starts-with first, then contains — dedupe
      // starts-with title OR any word in title starts with query
      const wordStart=i=>{
        const t=i.title.toLowerCase();
        if(t.startsWith(lq)) return true;
        return t.split(/\s+/).some(w=>w.startsWith(lq));
      };
      setResults(pool.filter(wordStart).slice(0,5));
    } else setResults([]);
  },[query,cat]);

  const getGenreForCat=(item,category)=>{
    if(item.genre&&item.genre!=="Film"&&item.genre!=="Custom")return item.genre;
    const inLib=(LIBRARY[category]||[]).some(i=>i.title.toLowerCase()===item.title.toLowerCase());
    if(inLib){
      const libItem=(LIBRARY[category]||[]).find(i=>i.title.toLowerCase()===item.title.toLowerCase());
      return libItem?.genre||CAT_MAP[category]?.labelEn||category;
    }
    return "Custom";
  };

  // Clicking a suggestion immediately adds it to queue
  const addItem=(item)=>{
    const c=item._cat||cat;
    if(!c)return;
    const genre=getGenreForCat(item,c);
    const yr=item.year||(c==="movies"?MOVIE_YEARS[item.title]:null)||null;
    setQueue(q=>[...q,{...item,genre,category:c,mood:ITEM_MOOD[item.title]||null,year:yr}]);
    setQuery("");
    setResults([]);
    if(!initialCat) setCat(null);
    // Keep keyboard open
    requestAnimationFrame(()=>inputRef.current?.focus());
  };

  // Typing something not in library and pressing Enter or tapping Log
  const addCustom=()=>{
    if(!query.trim()||!cat)return;
    const item={title:query.trim(),tags:[],genre:"Custom",year:null,_cat:cat};
    addItem(item);
  };

  const removeFromQueue=idx=>setQueue(q=>q.filter((_,i)=>i!==idx));

  const handleSave=()=>{
    const date=useCustomDate?new Date(customDate+"T12:00:00").toISOString():(editEntry?.date||new Date().toISOString());
    if(isEdit){
      if(!selected&&!query.trim())return;
      const base=selected||{title:query.trim(),tags:[],genre:"Custom",year:null};
      const genre=getGenreForCat(base,cat||"movies");
      const yr=base.year||((cat||"movies")==="movies"?MOVIE_YEARS[base.title]:null)||null;
      onSave({...base,genre,category:cat,note,mood:ITEM_MOOD[base.title]||null,date,customDate:useCustomDate?customDate:null,id:editEntry.id,year:yr,actPhotos:cat==="activities"?actPhotos:(editEntry.actPhotos||[])});
      onClose();
      return;
    }
    // Add whatever is typed as custom if cat selected
    let finalQueue=[...queue];
    if(query.trim()&&cat){
      const base={title:query.trim(),tags:[],genre:"Custom",year:null};
      const genre=getGenreForCat(base,cat);
      finalQueue.push({...base,genre,category:cat,mood:ITEM_MOOD[base.title]||null,year:null});
    }
    if(!finalQueue.length)return;
    const toSave=finalQueue.map((item,i)=>({...item,note:initialCat?note:"",date,customDate:useCustomDate?customDate:null,id:Date.now()+i,actPhotos:(cat==="activities"||item.category==="activities")?actPhotos:[]}));
    onSave(toSave);
    onClose();
  };

  const totalToSave=queue.length+(query.trim()&&cat?1:0);

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.65)",zIndex:100,display:"flex",alignItems:"flex-start",justifyContent:"center",paddingTop:"32%",touchAction:"none"}} onClick={e=>e.target===e.currentTarget&&closeWithAnim()}>
      <div
        className={data.theme==="fiesta"?"fiesta-modal":data.theme==="ulan"?"ulan-modal":""}
        style={{
          width:"100%",maxWidth:500,margin:"0 auto",
          ...(data.theme==="jeepney"?{
            background:"#1a0a2e",
            boxShadow:"0 -8px 32px rgba(0,0,0,0.7), inset 0 2px 0 rgba(255,210,63,0.35)",
            border:"1px solid #5a2d82",borderRadius:24,
          }:data.theme==="manila_nights"?{
            background:"#0a0614",
            boxShadow:"0 -8px 40px rgba(0,0,0,0.8), inset 0 2px 0 rgba(0,207,255,0.4)",
            border:"1px solid #221440",borderRadius:24,
          }:data.theme==="bahay_kubo"?{
            background:"#0f1a08",
            boxShadow:"0 -8px 32px rgba(0,0,0,0.6), inset 0 2px 0 rgba(212,168,67,0.3)",
            border:"1px solid #2d4a1a",borderRadius:24,
          }:data.theme==="hapon"?{
            background:"linear-gradient(180deg,#fff4ee 0%,#ffe8da 100%)",
            boxShadow:"0 -8px 32px rgba(200,80,60,0.1), 0 -1px 0 rgba(255,200,180,0.8)",
            border:"1px solid #f0c8b0",borderRadius:24,
          }:data.theme==="taho"?{
            background:"#f5e6c8",
            boxShadow:"0 -8px 24px rgba(80,30,4,0.12), 0 -1px 0 rgba(255,220,160,0.8)",
            border:"1px solid #d4a96a",borderRadius:24,
          }:data.theme==="fiesta"||data.theme==="ulan"?{}:{
            background:"#f5f0e8",
            boxShadow:"0 -6px 24px rgba(0,0,0,0.07), 0 -1px 0 rgba(255,255,255,0.9)",
            border:"1px solid #ddd5c8",borderRadius:24,
          }),
          borderRadius:24,
          padding:"0 0 8px",
          maxHeight:"72vh",
          width:"calc(100% - 32px)",
          display:"flex",flexDirection:"column",
          border:"none",
          animation:closing?"slideDown 0.26s cubic-bezier(0.4,0,1,1) forwards":"slideUp 0.28s cubic-bezier(0,0,0.2,1)"
        }}>

        {/* Scrollable inner */}
        <div onTouchMove={e=>e.stopPropagation()} style={{overflowY:"auto",padding:"12px 24px 16px",display:"flex",flexDirection:"column"}}>

          {/* Header — Playfair display, level 1 */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <span style={{fontFamily:"'Playfair Display',serif",fontSize:21,fontWeight:700,color:th.text,letterSpacing:-0.3,lineHeight:1.1}}>
              {isEdit?t.edit_entry:t.log_entry}
            </span>
            <button onClick={closeWithAnim} style={{fontSize:20,color:th.sub,lineHeight:1,background:"none",border:"none",cursor:"pointer",padding:"4px 2px",opacity:0.7}}>×</button>
          </div>

          {/* Category chips — DM Sans 12, navigation level */}
          <div ref={catRowRef} style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:18}}>
            {CATEGORIES.map(c=>{
              const active=cat===c.id;
              return(
                <button key={c.id} data-cat={c.id}
                  onClick={()=>{setCat(c.id);requestAnimationFrame(()=>inputRef.current?.focus());}}
                  style={data.theme==="fiesta"?{
                    padding:"5px 13px",borderRadius:99,whiteSpace:"nowrap",
                    fontSize:12,fontWeight:active?600:500,
                    cursor:"pointer",flexShrink:0,transition:"all 0.18s",
                    background:active
                      ?c.color
                      :"linear-gradient(145deg,rgba(255,255,255,0.12) 0%,rgba(255,215,255,0.05) 100%)",
                    backdropFilter:"blur(10px)",
                    WebkitBackdropFilter:"blur(10px)",
                    color:active?"#fff":th.sub,
                    border:active?"1px solid rgba(255,255,255,0.32)":"1px solid rgba(255,255,255,0.16)",
                    boxShadow:active
                      ?"0 1px 0 rgba(255,255,255,0.50) inset,0 -1px 0 rgba(0,0,0,0.10) inset,0 2px 6px rgba(0,0,0,0.09)"
                      :"0 1px 0 rgba(255,255,255,0.32) inset,0 -1px 0 rgba(0,0,0,0.07) inset,0 1px 3px rgba(0,0,0,0.06)",
                  }:{
                    padding:"5px 13px",borderRadius:99,whiteSpace:"nowrap",
                    fontSize:12,fontWeight:active?600:400,
                    background:active?c.color:"transparent",
                    color:active?"#fff":th.sub,
                    border:`1.5px solid ${active?c.color:th.border}`,
                    cursor:"pointer",flexShrink:0,transition:"all 0.12s",
                    boxShadow:active?`0 2px 8px ${c.color}40`:"none"
                  }}>
                  {c.emoji} {lang==="fil"?c.label:c.labelEn}
                </button>
              );
            })}
          </div>

          {/* Search — DM Sans 16, primary action, underline only */}
          <div style={{marginBottom:6,position:"relative"}}>
            <input
              ref={inputRef}
              value={query}
              autoFocus={false}
              onChange={e=>{setQuery(e.target.value);setSelected(null);}}
              onKeyDown={e=>{
                if(e.key==="Enter"){
                  if(results.length>0) addItem(results[0]);
                  else if(query.trim()&&cat) addCustom();
                }
              }}
              placeholder={t.search_placeholder}
              style={{
                width:"100%",fontSize:16,fontWeight:400,
                color:th.text,background:"transparent",border:"none",
                borderBottom:`1.5px solid ${cat?(CATEGORIES.find(c=>c.id===cat)?.color||th.accent)+"55":th.border}`,
                padding:"6px 28px 10px 0",outline:"none",
                fontFamily:"inherit",boxSizing:"border-box",
                transition:"border-color 0.2s"
              }}
            />
            {query&&<button onMouseDown={e=>e.preventDefault()} onClick={()=>{setQuery("");setResults([]);}}
              style={{position:"absolute",right:0,top:"50%",transform:"translateY(-50%)",color:th.sub,fontSize:17,lineHeight:1,background:"none",border:"none",cursor:"pointer",padding:"2px",opacity:0.6}}>×</button>}
          </div>

          {/* Suggestions — DM Sans 13/11, floats below search */}
          {results.length>0&&(
            <div style={{marginBottom:10,background:th.card,borderRadius:"0 0 12px 12px",overflow:"hidden",
              boxShadow:`0 6px 20px rgba(0,0,0,${th.dark?0.35:0.08})`,
              border:`1px solid ${th.border}`,borderTop:"none"}}>
              {results.map((item,i)=>(
                <div key={i} onMouseDown={e=>e.preventDefault()} onClick={()=>addItem(item)}
                  style={{padding:"10px 16px",cursor:"pointer",background:th.card,
                    borderBottom:i<results.length-1?`1px solid ${th.border}`:"none",
                    display:"flex",alignItems:"center",gap:12}}>
                  <span style={{fontSize:18,flexShrink:0}}>{CAT_MAP[item._cat||cat]?.emoji}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:500,color:th.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                      {item.title}{(item._cat||cat)==="movies"?(()=>{const y=item.year||MOVIE_YEARS[item.title];return y?<span style={{fontSize:11,fontWeight:400,color:th.sub}}> ({y})</span>:null;})():null}
                    </div>
                    {item.genre&&item.genre!=="Custom"&&item.genre!=="Film"&&<div style={{fontSize:11,color:th.sub,marginTop:1,opacity:0.75}}>{item.genre}</div>}
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* Queue — DM Sans 12, pill tags */}
          {queue.length>0&&(
            <div style={{marginBottom:14,marginTop:2}}>
              <p style={{fontSize:10,fontWeight:600,color:th.sub,textTransform:"uppercase",letterSpacing:1.2,marginBottom:7,opacity:0.6}}>
                {queue.length} item{queue.length>1?"s":""} to log
              </p>
              <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                {queue.map((item,i)=>{
                  const catColor=CATEGORIES.find(c=>c.id===item.category)?.color||th.accent;
                  return(
                    <div key={i} style={{
                      display:"inline-flex",alignItems:"center",gap:5,
                      padding:"5px 8px 5px 10px",borderRadius:99,
                      background:catColor+"15",
                      border:`1px solid ${catColor}35`
                    }}>
                      <span style={{fontSize:12}}>{CAT_MAP[item.category]?.emoji}</span>
                      <span style={{fontSize:12,fontWeight:500,color:th.text,maxWidth:140,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                        {item.title}{(()=>{const y=item.year||(item.category==="movies"?MOVIE_YEARS[item.title]:null);return y?<span style={{fontWeight:400,color:th.sub}}> ({y})</span>:null;})()}
                      </span>
                      <button onMouseDown={e=>e.preventDefault()} onClick={()=>removeFromQueue(i)}
                        style={{color:th.sub,fontSize:14,lineHeight:1,background:"none",border:"none",cursor:"pointer",padding:"0 1px",flexShrink:0,opacity:0.6}}>×</button>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* Note — DM Sans 14 italic, personal writing level */}
          {(isEdit||initialCat)&&(
            <textarea value={note} onChange={e=>setNote(e.target.value)} placeholder={t.add_reflection}
              style={{
                width:"100%",background:"transparent",
                border:"none",borderBottom:`1px solid ${th.border}`,
                borderRadius:0,padding:"8px 0 10px",
                fontSize:14,color:th.text,opacity:0.8,
                minHeight:50,resize:"none",lineHeight:1.6,
                marginBottom:12,boxSizing:"border-box",fontStyle:"italic"
              }}/>
          )}

          {/* Photo — DM Sans 13, secondary action */}
          {(cat==="activities"||editEntry?.category==="activities")&&(
            <div style={{marginBottom:12}}>
              <input ref={actPhotoRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>{
                const f=e.target.files?.[0];if(!f)return;
                const MAX=1200,QUALITY=0.72;
                const r=new FileReader();
                r.onload=ev=>{
                  const img=new Image();
                  img.onload=()=>{
                    const scale=Math.min(1,MAX/Math.max(img.width,img.height));
                    const w=Math.round(img.width*scale),h=Math.round(img.height*scale);
                    const c=document.createElement("canvas");c.width=w;c.height=h;
                    c.getContext("2d").drawImage(img,0,0,w,h);
                    setActPhotos([c.toDataURL("image/jpeg",QUALITY)]);
                  };img.src=ev.target.result;
                };r.readAsDataURL(f);
              }}/>
              {actPhotos.length>0?(
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <div style={{width:32,height:32,borderRadius:7,overflow:"hidden",flexShrink:0}}>
                    <img src={actPhotos[0]} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                  </div>
                  <span style={{fontSize:13,color:th.sub,flex:1}}>Photo attached</span>
                  <button onMouseDown={e=>e.preventDefault()} onClick={()=>setActPhotos([])}
                    style={{background:"none",border:"none",color:th.sub,fontSize:17,cursor:"pointer",padding:"0 4px",lineHeight:1,opacity:0.6}}>×</button>
                </div>
              ):(
                <button onMouseDown={e=>e.preventDefault()} onClick={()=>actPhotoRef.current?.click()}
                  style={{background:"none",border:"none",cursor:"pointer",color:th.sub,
                    fontSize:13,display:"flex",alignItems:"center",gap:7,padding:0}}>
                  <span style={{fontSize:15,opacity:0.7}}>📷</span>
                  <span>Attach a photo</span>
                </button>
              )}
            </div>
          )}

          {/* Date link — DM Sans 12, tertiary */}
          <div style={{marginBottom:14,display:"flex",alignItems:"center",gap:8}}>
            <button onClick={()=>setUseCustomDate(v=>!v)}
              style={{fontSize:12,color:th.accent,fontWeight:500,background:"none",border:"none",
                cursor:"pointer",padding:0,textDecoration:"underline",opacity:0.85,flexShrink:0}}>
              {useCustomDate?"Use today":"Log for a different date"}
            </button>
            {useCustomDate&&<input type="date" value={customDate} onChange={e=>setCustomDate(e.target.value)}
              max={new Date().toISOString().split("T")[0]}
              style={{flex:1,padding:"5px 8px",borderRadius:8,fontSize:12,
                background:th.card,border:`1px solid ${th.border}`,color:th.text,minWidth:0}}/>}
          </div>

          {/* Save — full width pill, DM Sans 15 bold, primary CTA */}
          <button onClick={handleSave}
            disabled={isEdit?(!selected&&!query.trim()):totalToSave===0}
            style={{
              width:"100%",padding:"12px",borderRadius:14,
              background:isEdit?(selected||query.trim())?th.accent:"gray":totalToSave>0?th.accent:"gray",
              color:"#fff",fontWeight:600,fontSize:14,border:"none",cursor:"pointer",
              opacity:isEdit?(selected||query.trim())?1:0.3:totalToSave>0?1:0.3,
              boxShadow:totalToSave>0||(isEdit&&(selected||query.trim()))?`0 3px 12px ${th.accent}38`:"none",
              transition:"opacity 0.2s, box-shadow 0.2s",letterSpacing:0.3
            }}>
            {isEdit?"Save changes":totalToSave>1?`Log ${totalToSave} entries`:t.log_it}
          </button>
        </div>
      </div>
    </div>
  );
}

// TimelineIcon lives outside TabBar so it never remounts on tab switch
function TimelineTabIcon({accent,sub,active,flash,animKey}){
  return(
    <div style={{position:"relative",display:"inline-flex"}}>
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
        stroke={flash?accent:active?accent:sub} strokeWidth="1.8"
        strokeLinecap="round" strokeLinejoin="round"
        style={{transition:"transform 0.2s, stroke 0.2s",transform:flash?"scale(1.18)":"scale(1)"}}>
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <path d="M3 9h18M9 4v5M15 4v5M7 13h4M7 17h6"/>
      </svg>
      {flash>0&&<span key={animKey} style={{
        position:"absolute",top:-9,right:-11,
        background:accent,color:"#fff",
        fontSize:9,fontWeight:800,lineHeight:1,
        padding:"2px 5px",borderRadius:10,
        animation:"badgePop 0.5s cubic-bezier(0.34,1.56,0.64,1) both",
        pointerEvents:"none",whiteSpace:"nowrap",
        boxShadow:"0 2px 8px rgba(0,0,0,0.3)"
      }}>+{flash}</span>}
    </div>
  );
}

function TabBar({tab,setTab,data,flash=0,animKey=0}){
  const th=THEMES[data.theme];
  const isUlan=data.theme==="ulan";
  const avEmoji=AVATARS.find(a=>a.id===data.avatar)?.emoji||"⭐";

  // Avatar — 22px to match SVG icons, dev border restored via _dxav class
  const avDisplay=data.customPhoto
    ?<span className={data._dx?"_dxav":""} style={{display:"inline-flex",alignItems:"center",justifyContent:"center",borderRadius:"50%",width:24,height:24,flexShrink:0}}>
        <img src={data.customPhoto} style={{width:22,height:22,borderRadius:"50%",objectFit:"cover",objectPosition:((data.photoPos||{x:50,y:50}).x)+"% "+((data.photoPos||{x:50,y:50}).y)+"%",display:"block"}}/>
      </span>
    :<span style={{fontSize:20,lineHeight:1,display:"flex",alignItems:"center",justifyContent:"center",width:22,height:22}}>{avEmoji}</span>;

  const HomeIcon=({a})=>(<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={a?th.accent:th.sub} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9.5L12 3l9 6.5V21a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 22V12h6v10"/></svg>);
  const SuggIcon=({a})=>(<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={a?th.accent:th.sub} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 3"/><path d="M9.5 9.5l5 5"/></svg>);
  const StarIcon=({a})=>(<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={a?th.accent:th.sub} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.4 2.4-7.4L2 9.4h7.6L12 2z"/></svg>);
  const SettingsIcon=({a})=>(<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={a?th.accent:th.sub} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>);

  const ProfileIcon=()=>tab==="profile"
    ?<StarIcon a={true}/>
    :<span style={{opacity:0.8,display:"flex",alignItems:"center",justifyContent:"center"}}>{avDisplay}</span>;


  // Active tab indicator — frosted pill
  const GlassPill=()=>(
    <span style={{
      position:"absolute",top:"50%",left:"50%",
      transform:"translate(-50%,-50%)",
      width:46,height:36,borderRadius:18,
      background:`linear-gradient(160deg, ${th.accent}22 0%, ${th.accent}10 100%)`,
      border:`1px solid ${th.accent}40`,
      backdropFilter:"blur(8px)",WebkitBackdropFilter:"blur(8px)",
      boxShadow:`inset 0 1px 0 rgba(255,255,255,0.22), inset 0 -1px 0 rgba(0,0,0,0.1), 0 2px 8px ${th.accent}18`,
      pointerEvents:"none",zIndex:0,display:"block",
    }}/>
  );

  const tabs=[
    {id:"home",icon:<HomeIcon a={tab==="home"}/>},
    {id:"timeline",icon:<TimelineTabIcon accent={th.accent} sub={th.sub} active={tab==="timeline"} flash={flash} animKey={animKey}/>},
    {id:"profile",icon:<ProfileIcon/>},
    {id:"mystory",icon:<SuggIcon a={tab==="mystory"}/>},
    {id:"settings",icon:<SettingsIcon a={tab==="settings"}/>},
  ];

  if(isUlan){
    return(
      <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:50,display:"flex",justifyContent:"center",alignItems:"flex-end",paddingBottom:"max(20px, env(safe-area-inset-bottom))",pointerEvents:"none",background:"transparent"}}>
        <div style={{
          display:"flex",alignItems:"center",justifyContent:"space-around",
          background:"rgba(13,21,32,0.82)",
          backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",
          border:"1px solid rgba(255,255,255,0.1)",
          borderRadius:40,
          padding:"5px 6px",
          width:"calc(100% - 32px)",maxWidth:468,
          pointerEvents:"all",
          boxShadow:"0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1)",
        }}>
          {tabs.map(tb=>{
            const active=tab===tb.id;
            return(
              <button key={tb.id} onClick={()=>setTab(tb.id)}
                style={{
                  flex:1,display:"flex",alignItems:"center",justifyContent:"center",
                  cursor:"pointer",border:"none",background:"transparent",
                  padding:"5px 0",borderRadius:40,position:"relative",
                  transition:"all 0.2s",
                }}>
                {active&&(
                  <span style={{
                    position:"absolute",
                    top:"50%",left:"50%",
                    transform:"translate(-50%,-50%)",
                    width:46,height:34,
                    borderRadius:17,
                    background:"transparent",
                    border:"none",
                    boxShadow:[
                      // top-left inner shadow — away from light
                      "inset 3px 3px 6px rgba(0,0,0,0.75)",
                      // bottom-right inner highlight — softened
                      "inset -3px -3px 6px rgba(255,255,255,0.22)",
                      // outer drop shadow for depth
                      "0 4px 12px rgba(0,0,0,0.55)",
                    ].join(","),
                    pointerEvents:"none",zIndex:0,
                  }}/>
                )}
                <span style={{position:"relative",zIndex:1,opacity:active?1:0.55}}>{tb.icon}</span>
              </button>
            );
          })}
        </div>
      </div>
    );
  }

  return(
    <div
      className={data.theme==="fiesta"?"fiesta-tabbar":""}
      style={{position:"fixed",bottom:0,left:0,right:0,
        background:th.bg,
        borderTop:`1px solid ${th.border}`,display:"flex",padding:"10px 0 22px",
        zIndex:50,maxWidth:500,margin:"0 auto",width:"100%",backdropFilter:"blur(12px)",
        overflow:"hidden",
      }}>
      {tabs.map(tb=>(
        <button key={tb.id} onClick={()=>setTab(tb.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",transition:"all 0.2s",padding:"4px 0",position:"relative"}}>
          {tab===tb.id&&<GlassPill/>}
          <div style={{position:"relative",zIndex:1,padding:"6px 14px",borderRadius:14,transition:"background 0.2s"}}>{tb.icon}</div>
        </button>
      ))}
    </div>
  );
}

// ─── HOME PAGE ────────────────────────────────────────────────────────────────
function HomePage({data,onOpenLog,onRelog}){
  const th=THEMES[data.theme];
  const t=T[data.language]||T.en;
  const h=new Date().getHours();
  const gr=h<12?t.greeting_morning:h<18?t.greeting_afternoon:t.greeting_evening;
  const weekLogs=getWeekLogs(data.logs);
  const catCounts=Object.fromEntries(CATEGORIES.map(c=>[c.id,weekLogs.filter(l=>l.category===c.id).length]));
  const totalWeek=weekLogs.length;

  return(
    <div className="fade-in" style={{padding:"24px 20px 130px",height:"calc(100vh - 68px)",overflowY:"auto",WebkitOverflowScrolling:"touch"}}>

      {/* ── Greeting block ── */}
      <div style={{marginBottom:32}}>
        <p style={{fontSize:11,fontWeight:700,color:th.text,letterSpacing:1.2,textTransform:"uppercase",marginBottom:10,opacity:0.55}}>
          {new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}
        </p>
        <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:28,lineHeight:1.2,color:th.text,marginBottom:12,fontWeight:700}}>
          {gr}, {data.userName}
        </h1>
        <p style={{color:th.text,fontSize:14,fontStyle:"italic",lineHeight:1.5,opacity:0.6}}>{t.tagline}</p>
      </div>

      {/* ── New entry CTA ── */}
      <button onClick={()=>onOpenLog(null)}
        style={{width:"100%",padding:"15px 20px",borderRadius:18,marginBottom:36,
          background:`linear-gradient(135deg,${th.accent},${th.accent2||th.accent})`,
          color:"#fff",display:"flex",alignItems:"center",gap:12,
          boxShadow:`0 6px 20px ${th.accent}38, 0 2px 6px ${th.accent}20`,border:"none",cursor:"pointer",
          transition:"transform 0.15s,box-shadow 0.15s"}}>
        <span style={{fontSize:16,fontWeight:700,flex:1,textAlign:"left"}}>{t.log_something}</span>
        <span style={{fontSize:13,fontWeight:400,opacity:0.75}}>{data.logs.length} {t.entries}</span>
      </button>

      {/* ── This week ── */}
      <div style={{marginBottom:36}}>
        <div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between",marginBottom:14}}>
          <p style={{fontSize:13,fontWeight:700,color:th.text,textTransform:"uppercase",letterSpacing:1.5,marginBottom:0}}>{t.this_week}</p>

        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
          {CATEGORIES.map(c=>{
            const cnt=catCounts[c.id]||0;
            const active=cnt>0;
            return(
              <div key={c.id} onClick={()=>onOpenLog(c.id)}
                style={{
                  background:active?c.color+"18":th.card,
                  border:`1.5px solid ${active?c.color+"55":th.border+"cc"}`,
                  borderRadius:14,padding:"12px 6px 10px",textAlign:"center",cursor:"pointer",
                  transition:"all 0.15s",
                  opacity:active?1:0.55,
                  boxShadow:active
                    ?`0 2px 14px ${c.color}30, inset 0 1px 0 rgba(255,255,255,0.12)`
                    :`inset 0 1px 0 rgba(255,255,255,0.06)`,
                }}>
                <div style={{fontSize:20,marginBottom:5,lineHeight:1}}>{c.emoji}</div>
                <div style={{fontSize:17,fontWeight:700,color:active?c.color:th.sub,lineHeight:1,marginBottom:3,letterSpacing:-0.3}}>{cnt}</div>
                <div style={{fontSize:10,fontWeight:600,color:active?c.color:th.sub,letterSpacing:0.3,textTransform:"uppercase",opacity:active?0.85:0.5}}>
                  {data.language==="fil"?c.label:c.labelEn}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* ── Quick log ── */}
      {data.logs.length>0&&(()=>{
        const freq={};
        data.logs.filter(l=>!l.fromHealthKit).forEach(l=>{
          const k=l.title.trim().toLowerCase()+"||"+l.category;
          if(!freq[k]){freq[k]={count:0,log:l};}
          freq[k].count++;
          // Prefer the entry with more metadata (year, genre) as the display representative
          const cur=freq[k].log;
          const betterYear=(!cur.year&&l.year)||(cur.year&&l.year&&l.year!==cur.year?false:false);
          if((!cur.year&&l.year)||(!cur.genre&&l.genre)||(!cur.lbRating&&l.lbRating)){
            freq[k].log=l;
          }
        });
        const top=Object.values(freq).sort((a,b)=>b.count-a.count).slice(0,5);
        if(!top.length)return null;
        return(
          <div>
            <div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between",marginBottom:16}}>
              <p style={{fontSize:13,fontWeight:700,color:th.text,textTransform:"uppercase",letterSpacing:1.5}}>Quick log</p>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {top.map(({log,count},i)=>{
              const meta=CAT_MAP[log.category];
              const skipG=["Film","Custom","Movies","Music","Books","Food","Games","Activities"];
              const libM=(LIBRARY[log.category]||[]).find(x=>x.title.toLowerCase()===log.title.toLowerCase());
              const genre=(libM?.genre&&!skipG.includes(libM.genre)?libM.genre:null)||(log.genre&&!skipG.includes(log.genre)?log.genre:null)||null;
              const yr=(log.year&&log.year!==""?log.year:null)||(log.category==="movies"?MOVIE_YEARS[log.title]:null);
              return(
                <div key={i} style={{
                  padding:"11px 14px",borderRadius:14,
                  background:th.card,
                  border:`1px solid ${th.border+"cc"}`,
                  boxShadow:`inset 0 1px 0 rgba(255,255,255,0.08)`,
                  display:"flex",gap:12,alignItems:"center"
                }}>
                  <div style={{width:36,height:36,borderRadius:10,flexShrink:0,
                    background:(meta?.color||"#888")+"18",
                    display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>
                    {meta?.emoji}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:600,color:th.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",lineHeight:1.3}}>
                      {log.title}{yr?<span style={{fontSize:11,fontWeight:400,color:th.sub,marginLeft:4}}>({yr})</span>:null}
                    </div>
                    <div style={{fontSize:11,color:th.sub,marginTop:2,opacity:0.75}}>{genre?`${genre} · `:""}{count}×</div>
                  </div>
                  <button
                    onClick={()=>onRelog({...log,id:Date.now(),date:new Date().toISOString(),customDate:null,note:""})}
                    style={{width:30,height:30,borderRadius:"50%",fontSize:18,fontWeight:400,
                      background:"transparent",color:th.accent,flexShrink:0,
                      border:`1.5px solid ${th.accent}55`,cursor:"pointer",
                      display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1,
                      transition:"opacity 0.15s"}}>
                    +
                  </button>
                </div>
              );
            })}
            </div>
          </div>
        );
      })()}

      {!data.logs.length&&(
        <div style={{textAlign:"center",padding:"56px 20px",color:th.sub}}>
          <div style={{fontSize:48,marginBottom:14}}>🌱</div>
          <p style={{fontSize:15,fontWeight:500,color:th.text,opacity:0.7}}>{t.empty_state}</p>
          <p style={{fontSize:13,marginTop:8,fontStyle:"italic",opacity:0.45,lineHeight:1.6}}>{t.empty_sub}</p>
        </div>
      )}
    </div>
  );
}

// ─── TIMELINE PAGE ────────────────────────────────────────────────────────────
// ─── CUSTOM ENTRY FUZZY MATCHER ──────────────────────────────────────────────
// Offline, no API. Scores library titles against a custom entry title.
// Returns best match above threshold, or null.

function _wordOverlap(a, b) {
  const wa = new Set(a.toLowerCase().split(/\s+/).filter(w=>w.length>2));
  const wb = new Set(b.toLowerCase().split(/\s+/).filter(w=>w.length>2));
  let shared = 0;
  wa.forEach(w=>{ if(wb.has(w)) shared++; });
  return shared / Math.max(wa.size, wb.size, 1);
}

function _substringScore(custom, libTitle) {
  const a = custom.toLowerCase().trim();
  const b = libTitle.toLowerCase().trim();
  if(b === a) return 1.0;
  if(b.includes(a)) return 0.85; // "Manok" in "Lechon Manok"
  if(a.includes(b)) return 0.7;
  return 0;
}

function _levenshtein(a, b) {
  const m=a.length, n=b.length;
  const dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i===0?j:j===0?i:0));
  for(let i=1;i<=m;i++) for(let j=1;j<=n;j++)
    dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}

function _fuzzyScore(customTitle, libTitle) {
  const a = customTitle.toLowerCase().trim();
  const b = libTitle.toLowerCase().trim();
  const sub = _substringScore(a, b);
  const overlap = _wordOverlap(a, b);
  const maxLen = Math.max(a.length, b.length, 1);
  const lev = Math.max(0, 1 - _levenshtein(a, b) / maxLen);
  // Weighted: substring > overlap > levenshtein
  return sub * 0.55 + overlap * 0.30 + lev * 0.15;
}

// Per session cache: entryId → best suggestion (or null)
const _suggCache = {};

function getBestLibrarySuggestion(log, dismissedSugg) {
  if(_suggCache[log.id] !== undefined) return _suggCache[log.id];
  if(log.genre !== "Custom" || log.fromHealthKit || log.fromLetterboxd){
    _suggCache[log.id]=null; return null;
  }
  const titleKey=`${log.category}::${log.title}`;
  const dismissed = (dismissedSugg||{})[titleKey] || {};
  if(dismissed.never){ _suggCache[log.id]=null; return null; }
  const skipped = new Set(dismissed.skipped || []);
  const lib = LIBRARY[log.category] || [];
  let best = null, bestScore = 0.32;
  lib.forEach(item => {
    if(skipped.has(item.title)) return;
    const score = _fuzzyScore(log.title, item.title);
    if(score > bestScore){ best = item; bestScore = score; }
  });
  _suggCache[log.id] = best;
  return best;
}
