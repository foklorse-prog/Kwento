            {showImportInfo&&<>
              <div onClick={()=>setShowImportInfo(false)} style={{position:"fixed",inset:0,zIndex:88,background:"transparent"}}/>
              <div style={{position:"absolute",right:0,bottom:26,width:190,padding:"10px 12px",borderRadius:10,background:th.card,border:`1px solid ${th.border}`,boxShadow:"0 -4px 16px rgba(0,0,0,0.15)",zIndex:89}}>
                <div style={{fontSize:11,color:th.sub,lineHeight:1.9}}>
                  <div style={{marginBottom:5}}><span style={{color:th.text,fontWeight:600}}>Letterboxd</span><br/>diary.csv</div>
                  <div><span style={{color:th.text,fontWeight:600}}>Apple Health</span><br/>export.zip or export.xml</div>
                </div>
              </div>
            </>}
          </div>
        </div>
        <p style={{fontSize:12,color:th.sub,marginBottom:14,lineHeight:1.5}}>{lang==="fil"?"I-tap ang button at piliin ang na-export mong file.":"Tap the button and pick a file you've already exported from another app."}</p>
        <label style={{display:"inline-flex",alignItems:"center",gap:6,padding:"10px 18px",borderRadius:10,background:importLoading?th.border:th.accent,color:"#fff",fontWeight:600,fontSize:13,cursor:importLoading?"default":"pointer",opacity:importLoading?0.7:1}}>
          {importLoading?"⏳ "+( lang==="fil"?"Nag-iimport...":"Importing..."):"📥 "+(lang==="fil"?"I-import ang file":"Import file")}
          <input type="file" accept=".csv,.xml,.zip" disabled={importLoading} onChange={async e=>{
            const f=e.target.files[0]; if(!f)return;
            setImportLoading(true); setLbMsg("");
            try{
              let csvText=null, xmlText=null;
              const fname=f.name.toLowerCase();
              const isZip=fname.endsWith(".zip")||f.type==="application/zip"||f.type==="application/x-zip-compressed";

              if(isZip){
                // ⚠️ WARNING: DO NOT move JSZip to a <script> tag in <head>.
                // Doing so breaks the SW cache fingerprint and causes Safari to
                // hardcache old app versions. Must stay here, loaded on demand.
                if(!window.JSZip){
                  await new Promise((res,rej)=>{const s=document.createElement("script");s.src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js";s.onload=res;s.onerror=rej;document.head.appendChild(s);});
                }
                const buf=await f.arrayBuffer();
                const zip=await JSZip.loadAsync(buf);
                const files=Object.keys(zip.files);
                const csvFile=files.find(n=>n.toLowerCase().endsWith("diary.csv"));
                const xmlFile=files.find(n=>n.toLowerCase().endsWith("export.xml"));
                if(csvFile) csvText=await zip.files[csvFile].async("text");
                else if(xmlFile) xmlText=await zip.files[xmlFile].async("text");
                else{setLbMsg("❌ "+(lang==="fil"?"Walang nahanap na diary.csv o export.xml sa zip.":"No diary.csv or export.xml found in the zip."));setImportLoading(false);return;}
              } else if(fname.endsWith(".csv")){
                csvText=await f.text();
              } else if(fname.endsWith(".xml")){
                xmlText=await f.text();
              } else {
                setLbMsg("❌ "+(lang==="fil"?"Hindi kilalang file.":"Unrecognized file type."));
                setImportLoading(false); return;
              }

              const existingLogs=data.logs||[];

              if(csvText){
                // --- Letterboxd diary.csv ---
                const lines=csvText.trim().split("\n");
                const headers=lines[0].split(",").map(h=>h.trim().replace(/^"|"$/g,"").toLowerCase());
                const col=name=>headers.indexOf(name);
                const nameIdx=col("name"), yearIdx=col("year"), ratingIdx=col("rating");
                const watchedIdx=col("watched date"), rewatchIdx=col("rewatch"), tagIdx=col("tags");
                if(nameIdx===-1){setLbMsg("❌ "+(lang==="fil"?"Hindi ito diary.csv ng Letterboxd.":"This doesn't look like a Letterboxd diary.csv."));setImportLoading(false);return;}
                const parseRow=row=>{
                  const cols=[]; let cur=""; let inQ=false;
                  for(let i=0;i<row.length;i++){
                    const ch=row[i];
                    if(ch==='"'){inQ=!inQ;}
                    else if(ch===","&&!inQ){cols.push(cur.trim());cur="";}
                    else cur+=ch;
                  }
                  cols.push(cur.trim()); return cols;
                };
                // Build dedup set from ALL existing movie entries (Letterboxd or manual) using normalized title+year+watchedDate
                const existing=new Set(existingLogs.filter(l=>l.category==="movies").map(l=>{
                  const t=(l.title||"").toLowerCase().trim();
                  const y=(l.year||"").toString().trim();
                  const d=(l.customDate||(l.date||"").split("T")[0]||"").trim();
                  return `${t}|${y}|${d}`;
                }));
                const newEntries=[];
                for(let i=1;i<lines.length;i++){
                  if(!lines[i].trim())continue;
                  const cols=parseRow(lines[i]);
                  const title=(cols[nameIdx]||"").replace(/^"|"$/g,"").trim(); if(!title)continue;
                  const year=(cols[yearIdx]||"").replace(/^"|"$/g,"").trim();
                  const ratingRaw=parseFloat((cols[ratingIdx]||"").replace(/^"|"$/g,""));
                  const watchedDate=(cols[watchedIdx]||"").replace(/^"|"$/g,"").trim();
                  const rewatch=((cols[rewatchIdx]||"").replace(/^"|"$/g,"").toLowerCase()==="yes");
                  const tagsRaw=(tagIdx>=0?(cols[tagIdx]||""):"").replace(/^"|"$/g,"").trim();
                  const tags=tagsRaw?tagsRaw.split(",").map(t=>t.trim()).filter(Boolean):[];
                  if(rewatch)tags.push("rewatch");
                  const dedupKey=`${title.toLowerCase().trim()}|${year.trim()}|${watchedDate.trim()}`;
                  if(existing.has(dedupKey))continue;
                  const date=watchedDate?new Date(watchedDate+"T12:00:00").toISOString():new Date().toISOString();
                  newEntries.push({id:Date.now()*10000+Math.floor(Math.random()*9999),title,year:year||null,category:"movies",tags,genre:null,note:"",mood:null,date,customDate:watchedDate||null,fromLetterboxd:true,lbRating:!isNaN(ratingRaw)?ratingRaw:null});
                }
                if(!newEntries.length){setLbMsg("⚠️ "+(lang==="fil"?"Wala nang bagong entry.":"Nothing new to import."));setImportLoading(false);return;}
                onChange("logs",[...existingLogs,...newEntries]);
                if(onImportSuccess)onImportSuccess(newEntries.length);
                setLbMsg("✅ "+newEntries.length+(lang==="fil"?" pelikula ang na-import!":" movies imported!"));

              } else if(xmlText){
                // --- Apple Health export.xml — steps only ---
                const parser=new DOMParser();
                const doc=parser.parseFromString(xmlText,"application/xml");
                const records=Array.from(doc.querySelectorAll('Record[type="HKQuantityTypeIdentifierStepCount"]'));
                if(!records.length){setLbMsg("❌ "+(lang==="fil"?"Walang steps data sa file na ito.":"No step count data found in this file."));setImportLoading(false);return;}
                // Cutoff: 90 days ago
                const cutoff=new Date(); cutoff.setDate(cutoff.getDate()-90);
                // Sum steps by day
                const byDay={};
                records.forEach(r=>{
                  const raw=r.getAttribute("startDate")||"";
                  // Apple date: "2024-03-10 08:23:11 +0800" — Safari needs ISO format
                  const iso=raw.replace(/^(\d{4}-\d{2}-\d{2}) (\d{2}:\d{2}:\d{2}) ([+-]\d{2})(\d{2})$/,"$1T$2$3:$4");
                  const start=new Date(iso||raw);
                  if(isNaN(start)||start<cutoff)return;
                  const day=raw.slice(0,10); // YYYY-MM-DD straight from string, no timezone shift
                  const val=parseFloat(r.getAttribute("value")||"0");
                  byDay[day]=(byDay[day]||0)+val;
                });
                // Build dedup set: steps entries by date
                const existingStepDates=new Set(existingLogs.filter(l=>l.fromHealthKit&&l.category==="activities").map(l=>(l.customDate||l.date||"").split("T")[0]));
                const newEntries=[]; let updated=0;
                Object.entries(byDay).sort().forEach(([day,steps],i)=>{
                  const count=Math.round(steps);
                  if(existingStepDates.has(day)){
                    // Update if count changed
                    updated++;
                    return;
                  }
                  newEntries.push({id:Date.now()*10000+Math.floor(Math.random()*9999),title:`Steps – ${count.toLocaleString()}`,category:"activities",tags:["health","steps"],genre:null,note:"",mood:null,date:new Date(day+"T12:00:00").toISOString(),customDate:day,fromHealthKit:true,stepCount:count});
                });
                if(!newEntries.length){setLbMsg("⚠️ "+(lang==="fil"?"Wala nang bagong steps data.":"No new step data to import."));setImportLoading(false);return;}
                onChange("logs",[...existingLogs,...newEntries]);
                if(onImportSuccess)onImportSuccess(newEntries.length);
                setLbMsg("✅ "+newEntries.length+(lang==="fil"?" araw ng steps ang na-import!":" days of steps imported!"));
              }
            }catch(err){console.error(err);setLbMsg("❌ "+(lang==="fil"?"Hindi mabasa ang file.":"Could not read the file."));}
            setImportLoading(false);
            e.target.value="";
          }} style={{display:"none"}}/>
        </label>
        {lbMsg&&<p style={{marginTop:10,fontSize:13,fontWeight:500,color:lbMsg.startsWith("✅")?th.accent:lbMsg.startsWith("⚠️")?"#f59e0b":"#ef4444"}}>{lbMsg}</p>}
      </div>

      {/* Reset */}
      <div style={{marginBottom:24}}>
        {!confirmReset?(
          <button onClick={()=>setConfirmReset(true)} style={{color:"#ef4444",fontSize:13,border:"1px solid #ef444444",padding:"10px 20px",borderRadius:10}}>{t.reset_data}</button>
        ):(
          <div style={{padding:16,borderRadius:12,background:"#ef444422",border:"1px solid #ef4444"}}>
            <p style={{color:"#ef4444",fontSize:14,marginBottom:12}}>⚠️ {t.confirm_reset}</p>
            <div style={{display:"flex",gap:10}}>
              <button onClick={onReset} style={{background:"#ef4444",color:"#fff",padding:"8px 16px",borderRadius:8,fontWeight:700}}>{t.yes_reset}</button>
              <button onClick={()=>setConfirmReset(false)} style={{color:th.text,border:`1px solid ${th.border}`,padding:"8px 16px",borderRadius:8}}>{t.cancel}</button>
            </div>
          </div>
        )}
      </div>


      <div style={{textAlign:"center",paddingBottom:8}}>
        <span style={{fontSize:11,color:th.sub}}>{t.made_with} · <button onClick={()=>onShowPatch()} style={{fontSize:11,color:th.accent,fontWeight:600,textDecoration:"underline",background:"none",border:"none",cursor:"pointer",padding:0}}>v5.11</button></span>
      </div>
    </div>
  );
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────────

// ─── PULL TO REFRESH ─────────────────────────────────────────────────────────

function App(){
  const [data,setData]=useState(()=>loadData()||defaultData());
  const [tab,setTab]=useState(()=>{ const r=localStorage.getItem("kwento_restore_tab"); if(r){localStorage.removeItem("kwento_restore_tab"); return r;} return "home"; });
  // Hydrate photos from IndexedDB on first load + one-time migration
  const [photosReady,setPhotosReady]=useState(false);
  useEffect(()=>{
    (async()=>{
      const d=loadData()||defaultData();
      // One-time migration: move any photos still in localStorage → IDB
      await migratePhotosToIDB(d);
      // Hydrate IDB photos into state
      const hydrated=await hydratePhotos(d);
      setData(prev=>({...prev,...hydrated}));
      setPhotosReady(true);
    })();
  },[]);
  const switchTab=t=>{setTab(t);window.scrollTo({top:0,behavior:"instant"});if(t==="timeline")setTimelineUnread(0);};
  const [showLog,setShowLog]=useState(false);
  const [editEntry,setEditEntry]=useState(null);
  const [timelineUnread,setTimelineUnread]=useState(0);
  const [showPatch,setShowPatch]=useState(false);
  const [badgeAnimKey,setBadgeAnimKey]=useState(0);
  const handleRelog=entry=>{handleLog(entry);setTimelineUnread(n=>n+1);setBadgeAnimKey(k=>k+1);};
  const [logCat,setLogCat]=useState(null);

  const anyModalOpen=showLog||showPatch;

  useEffect(()=>{
    if(!photosReady) return; // don't save until hydration is done
    saveData(data);
    savePhotos(data);
  },[data]);
  // Autosave every 5 minutes as safety net
  useEffect(()=>{
    const id=setInterval(()=>{saveData(data);savePhotos(data);},5*60*1000);
    return()=>clearInterval(id);
  },[data]);

  // Auto-enrich custom entries when library has matching title+category
  useEffect(()=>{
    const enriched=data.logs.map(log=>{
      if(log.genre!=="Custom")return log;
      const lib=LIBRARY[log.category]||[];
      const match=lib.find(item=>item.title.toLowerCase()===log.title.toLowerCase());
      if(!match)return log;
      return {...log,genre:match.genre,tags:match.tags,enriched:true};
    });
    const changed=enriched.some((l,i)=>l!==data.logs[i]);
    if(changed)setData(d=>({...d,logs:enriched}));
  },[]);

  // Listen for service worker update messages
  const [updateReady, setUpdateReady] = useState(false);
  useEffect(()=>{
    if(!navigator.serviceWorker) return;
    const onMsg = e => {
      if(e.data === "UPDATE_READY"){
        setUpdateReady(true);
        setPtrPhase("idle");
        setPtrY(0);
      } else if(e.data === "UP_TO_DATE" || e.data === "OFFLINE"){
        setPtrPhase("idle");
        setPtrY(0);
      }
    };
    navigator.serviceWorker.addEventListener("message", onMsg);
    // On launch: check for update after SW is ready
    const launchCheck = setTimeout(()=>{
      if(navigator.serviceWorker.controller){
        navigator.serviceWorker.controller.postMessage("CHECK_UPDATE");
      }
    }, 1500);
    return () => {
      navigator.serviceWorker.removeEventListener("message", onMsg);
      clearTimeout(launchCheck);
    };
  }, []);


  // ── Pull to Refresh ──
  const ptrStartY = useRef(null);
  const ptrLockedAtTop = useRef(false);
  const [ptrY, setPtrY] = useState(0);
  const [ptrPhase, setPtrPhase] = useState("idle"); // idle|pulling|ready|refreshing
  const PTR_THRESHOLD = 72;
  const ptrInnerRef = useRef(null);
  const ptrWrapRef = useRef(null);

  useEffect(()=>{
    const wrap = ptrWrapRef.current;
    if(!wrap) return;

    const getScroller = () => {
      // The active scrollable page is the first overflowY:auto child of inner
      const inner = ptrInnerRef.current;
      if(!inner) return null;
      // Find the scrollable child - each page renders its own scroll container
      // We check the direct children for scrollTop capability
      return inner;
    };

    const onTouchStart = e => {
      if(tab === "settings") return; // no PTR on settings
      const inner = ptrInnerRef.current;
      if(!inner) return;
      // Find deepest scrollable container that is scrolled
      // Simple: check if any ancestor up to inner has scrollTop > 0
      let el = e.target;
      let scrolled = false;
      while(el && el !== wrap){
        if(el.scrollTop > 0){ scrolled = true; break; }
        el = el.parentElement;
      }
      if(scrolled){ ptrLockedAtTop.current = false; return; }
      ptrLockedAtTop.current = true;
      ptrStartY.current = e.touches[0].clientY;
    };

    const onTouchMove = e => {
      if(!ptrLockedAtTop.current) return;
      const dy = e.touches[0].clientY - (ptrStartY.current||0);
      if(dy <= 0){
        if(ptrY > 0){ setPtrY(0); setPtrPhase("idle"); }
        return;
      }
      // Check again if page has scrolled since start
      let el = e.target;
      while(el && el !== wrap){
        if(el.scrollTop > 0){ ptrLockedAtTop.current=false; setPtrY(0); setPtrPhase("idle"); return; }
        el = el.parentElement;
      }
      e.preventDefault();
      const clamped = Math.min(dy * 0.4, PTR_THRESHOLD + 24);
      setPtrY(clamped);
      setPtrPhase(clamped >= PTR_THRESHOLD ? "ready" : "pulling");
    };

    const onTouchEnd = () => {
      if(!ptrLockedAtTop.current) return;
      ptrLockedAtTop.current = false;
      ptrStartY.current = null;
      if(ptrY >= PTR_THRESHOLD){
        setPtrPhase("refreshing");
        setPtrY(PTR_THRESHOLD);
        // Re-read localStorage then re-hydrate IDB photos — never lose photo data on PTR
        localStorage.setItem("kwento_restore_tab", tab);
        (async()=>{
          try{
            const fresh=localStorage.getItem("kwento_v5");
            if(fresh){
              const parsed=JSON.parse(fresh);
              const hydrated=await hydratePhotos(parsed);
              setData(d=>({...d,...hydrated}));
            }
          }catch(e){}
        })();
        if(navigator.serviceWorker && navigator.serviceWorker.controller){
          navigator.serviceWorker.controller.postMessage("CHECK_UPDATE");
        } else {
          // No SW — just snap back after refresh
          setTimeout(()=>{setPtrPhase("done");setPtrY(0);},600);
        }
      } else {
        setPtrPhase("idle");
        setPtrY(0);
      }
    };

    wrap.addEventListener("touchstart", onTouchStart, {passive:true});
    wrap.addEventListener("touchmove", onTouchMove, {passive:false});
    wrap.addEventListener("touchend", onTouchEnd);
    return ()=>{
      wrap.removeEventListener("touchstart", onTouchStart);
      wrap.removeEventListener("touchmove", onTouchMove);
      wrap.removeEventListener("touchend", onTouchEnd);
    };
  }, [tab, ptrY]);

  const ptrProgress = Math.min(ptrY / PTR_THRESHOLD, 1);

  const ptrIsRefreshing = ptrPhase === "refreshing";
  const ptrIsReady = ptrPhase === "ready";
  const ptrTranslate = ptrIsRefreshing ? PTR_THRESHOLD : ptrY;

  const update=patch=>setData(d=>({...d,...patch}));
  const handleOnboard=({language,theme,userName,avatar,customPhoto,photoPos})=>update({onboarded:true,language,theme,userName,avatar,customPhoto:customPhoto||null,photoPos:photoPos||{x:50,y:50,scale:1}});
  const handleLog=entries=>{
    const arr=Array.isArray(entries)?entries:[entries];
    if(editEntry&&arr.length===1){
      update({logs:data.logs.map(l=>l.id===arr[0].id?arr[0]:l)});
    } else {
      // Use functional update so all entries are prepended at once
      setData(d=>({...d,logs:[...arr,...d.logs]}));
    }
    setEditEntry(null);
  };
  const handleDelete=id=>update({logs:data.logs.filter(l=>l.id!==id)});
  const handleEdit=entry=>{setEditEntry(entry);setShowLog(true);};
  const handleFeedback=(title,val)=>{}; // swipes are visual only for now
  const handleSeedSave=item=>{
    const exists=(data.tasteSeed||[]).find(x=>x.title===item.title);
    if(!exists)update({tasteSeed:[...(data.tasteSeed||[]),item]});
  };
  const handleSetting=(key,val)=>{
    if(key==="__showAvatarPicker") setData(d=>({...d,__showAvatarPicker:val}));
    else if(key==="__batch__") update({...val,__showAvatarPicker:false});
    else update({[key]:val,__showAvatarPicker:false});
  };
  const handleReset=async()=>{
    await idbDel("avatar");
    // Clear all entry photos from IDB
    const all=await idbGetAll();
    for(const k of Object.keys(all)){
      if(k.startsWith("entry_")) await idbDel(k);
    }
    const fresh=defaultData();
    fresh.onboarded=true;fresh.theme=data.theme;fresh.language=data.language;
    fresh.userName=data.userName;fresh.avatar=data.avatar;
    setData(fresh);
  };
  const handleUpdateSuggState=patch=>setData(d=>({...d,...patch}));
  const handleUpdateBarkadaState=patch=>setData(d=>({...d,...patch}));

  const th=THEMES[data.theme];

  return(
    <>
      <style>{CSS}</style>
      <div style={{background:th.grad,color:th.text,height:"100vh",minHeight:"-webkit-fill-available","--bg":th.bg,"--card":th.card,"--accent":th.accent,"--accent2":th.accent2,"--text":th.text,"--sub":th.sub,"--border":th.border,overflow:"hidden",paddingBottom:"env(safe-area-inset-bottom)"}}>
        <div ref={ptrWrapRef} style={{maxWidth:500,margin:"0 auto",height:"100%",position:"relative",overflow:"hidden"}}>
          {!data.onboarded?(
            <Onboarding onComplete={handleOnboard}/>
          ):(
            <>
              {/* PTR indicator - fixed behind page */}
              {(ptrPhase!=="idle"||ptrPhase==="done"||ptrY>0)&&(
                <div style={{position:"absolute",top:0,left:0,right:0,height:PTR_THRESHOLD,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-end",paddingBottom:10,zIndex:1,pointerEvents:"none"}}>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,opacity:Math.max(ptrProgress,ptrIsRefreshing?1:0.3)}}>
                    {ptrIsRefreshing?(
                      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" style={{animation:"ptr-spin 0.7s linear infinite"}}>
                        <circle cx="12" cy="12" r="9" stroke="rgba(255,255,255,0.2)" strokeWidth="2.5"/>
                        <path d="M12 3 a9 9 0 0 1 9 9" stroke="#fff" strokeWidth="2.5" strokeLinecap="round"/>
                      </svg>
                    ):(
                      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" style={{transform:`rotate(${ptrIsReady?180:Math.round(ptrProgress*150)}deg)`,transition:"transform 0.15s"}}>
                        <circle cx="12" cy="12" r="9" stroke="rgba(255,255,255,0.2)" strokeWidth="2"/>
                        <path d="M12 7v10M7.5 13.5L12 18l4.5-4.5" stroke="#fff" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
                      </svg>
                    )}
                    <span style={{fontSize:10,fontWeight:600,color:"rgba(255,255,255,0.6)",letterSpacing:0.4,fontFamily:"'DM Sans',sans-serif"}}>
                      {ptrIsRefreshing?"Checking for updates…":ptrIsReady?"Release to check":"Pull to refresh"}
                    </span>
                  </div>
                </div>
              )}
              {/* Update ready banner — persistent, tap to reload */}
              {updateReady&&(
                <div onClick={()=>window.location.reload()}
                  style={{position:"absolute",top:16,left:"50%",transform:"translateX(-50%)",zIndex:200,
                    background:"rgba(20,20,20,0.93)",backdropFilter:"blur(10px)",
                    color:"#fff",padding:"10px 20px",borderRadius:20,
                    fontSize:13,fontWeight:600,whiteSpace:"nowrap",
                    boxShadow:"0 4px 20px rgba(0,0,0,0.35)",
                    cursor:"pointer",animation:"popIn 0.2s ease",
                    display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:15}}>↻</span> New version — tap to reload
                </div>
              )}
              {/* Page content slides down over indicator */}
              <div ref={ptrInnerRef} style={{position:"absolute",top:0,left:0,right:0,bottom:0,transform:`translateY(${ptrTranslate}px)`,transition:ptrIsRefreshing?"transform 0.2s ease":"none",zIndex:2,overflow:anyModalOpen?"hidden":"visible"}}>
              {tab==="home"&&<HomePage onRelog={handleRelog} data={data} onOpenLog={(cat)=>{setEditEntry(null);setShowLog(true);setLogCat(cat||null);}}/>}
              {tab==="timeline"&&<TimelinePage data={data} onOpenLog={()=>{setEditEntry(null);setShowLog(true);setLogCat(null);}} onDelete={handleDelete} onRestore={log=>{
                const restored=[...data.logs,log].sort((a,b)=>{const dt=new Date(b.date)-new Date(a.date);return dt!==0?dt:b.id-a.id;});
                update({logs:restored});
              }} onSave={entry=>setData(d=>({...d,logs:d.logs.map(l=>l.id===entry.id?entry:l)}))} onUpdateData={patch=>setData(prev=>{const next={...prev,...patch};saveData(next);return next;})}/>}
              {tab==="mystory"&&<MyStoryPage data={data} onFeedback={handleFeedback} onUpdateSuggState={handleUpdateSuggState} onUpdateBarkadaState={handleUpdateBarkadaState}/>}
              {tab==="profile"&&<ProfilePage data={data} onChange={handleSetting}/>}
              {tab==="settings"&&<SettingsPage data={data} onChange={handleSetting} onReset={handleReset} onImport={d=>{setData({...d,__showAvatarPicker:false});}} onShowPatch={()=>setShowPatch(true)} onImportSuccess={cnt=>{setTimelineUnread(n=>n+cnt);setBadgeAnimKey(k=>k+1);}}/>}
              </div>
              <TabBar tab={tab} setTab={switchTab} data={data} flash={timelineUnread} animKey={badgeAnimKey}/>
              {showPatch&&(
                <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:300,display:"flex",alignItems:"flex-end",touchAction:"none",backdropFilter:"blur(4px)"}} onClick={()=>setShowPatch(false)}>
                  <div className={`slide-up ${data.theme==="fiesta"?"fiesta-modal":data.theme==="ulan"?"ulan-modal":""}`} onClick={e=>e.stopPropagation()} onTouchMove={e=>e.stopPropagation()} style={{
                    width:"100%",maxWidth:500,margin:"0 auto",
                    borderTopLeftRadius:24,borderTopRightRadius:24,
                    padding:"24px 20px 48px",maxHeight:"70vh",overflowY:"auto",borderBottom:"none",
                    ...(data.theme==="jeepney"?{
                      background:"#1a0a2e",
                      boxShadow:"0 -8px 32px rgba(0,0,0,0.7), inset 0 2px 0 rgba(255,210,63,0.35)",
                      border:"1px solid #5a2d82",
                    }:data.theme==="manila_nights"?{
                      background:"#0a0614",
                      boxShadow:"0 -8px 40px rgba(0,0,0,0.8), inset 0 2px 0 rgba(0,207,255,0.4)",
                      border:"1px solid #221440",
                    }:data.theme==="bahay_kubo"?{
                      background:"#0f1a08",
                      boxShadow:"0 -8px 32px rgba(0,0,0,0.6), inset 0 2px 0 rgba(212,168,67,0.3)",
                      border:"1px solid #2d4a1a",
                    }:data.theme==="hapon"?{
                      background:"linear-gradient(180deg,#fff4ee 0%,#ffe8da 100%)",
                      boxShadow:"0 -8px 32px rgba(200,80,60,0.1), 0 -1px 0 rgba(255,200,180,0.8)",
                      border:"1px solid #f0c8b0",
                    }:data.theme==="taho"?{
                      background:"#f5e6c8",
                      boxShadow:"0 -8px 24px rgba(80,30,4,0.12), 0 -1px 0 rgba(255,220,160,0.8)",
                      border:"1px solid #d4a96a",
                    }:data.theme==="fiesta"||data.theme==="ulan"?{}:{
                      background:"#f5f0e8",
                      boxShadow:"0 -6px 24px rgba(0,0,0,0.07), 0 -1px 0 rgba(255,255,255,0.9)",
                      border:"1px solid #ddd5c8",
                    })
                  }}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                      <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:THEMES[data.theme].text}}>What's new</h3>
                      <button onClick={()=>setShowPatch(false)} style={{fontSize:24,color:THEMES[data.theme].sub,lineHeight:1}}>×</button>
                    </div>
                    <div style={{display:"flex",gap:10,alignItems:"baseline",marginBottom:16}}>
                      <span style={{fontSize:14,fontWeight:700,color:THEMES[data.theme].accent}}>v5.11</span>
                      <span style={{fontSize:11,color:THEMES[data.theme].sub}}>Mar 12, 2026</span>
                    </div>
                    {[
                      {v:"v5.11",date:"Mar 12, 2026",notes:[
                        "Tap any timeline entry to expand it — see your note, photos, and details in place",
                        "Edit directly from the expanded card — title, note, category, date, and photo removal, no modal needed",
                        "Title field suggests from the library as you type, just like when logging",
                        "Fixed a bug where editing one entry could update all entries with the same title",
                        "Steps entries are simpler now — just the title and swipe to delete",
                        "App checks for updates on every launch — a tap-to-reload banner appears if a new version is ready",
                        "Profile and Suggestions tabs have switched positions",
                        "Profile tab now shows your avatar when you're elsewhere, and a star when you're on it",
                        "Ulan theme gets a floating bubble menu navigation bar",
                      ]},
                    ].map((rel,ri)=>(
                      <div key={ri}>
                        {rel.notes.map((n,i)=>(
                          <div key={i} style={{display:"flex",gap:10,marginBottom:10}}>
                            <span style={{color:THEMES[data.theme].accent,flexShrink:0,fontWeight:700}}>·</span>
                            <span style={{fontSize:13,color:THEMES[data.theme].sub,lineHeight:1.5}}>{n}</span>
                          </div>
                        ))}
                      </div>
                    ))}
                  </div>
                </div>
              )}
              {showLog&&<LogModal data={data} onClose={()=>{setShowLog(false);setEditEntry(null);setLogCat(null);}} onSave={(entries)=>{handleLog(entries);const cnt=Array.isArray(entries)?entries.length:1;setTimelineUnread(n=>n+cnt);setBadgeAnimKey(k=>k+1);}} editEntry={editEntry} initialCat={logCat}/>}
              <ThemeAnimations theme={data.theme} modalOpen={showLog} animationsOff={data.animationsOff||false}/>
            </>
          )}
        </div>
      </div>
    </>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
