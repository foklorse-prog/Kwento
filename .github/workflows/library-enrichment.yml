name: Library Enrich

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run enrichment
        env:
          OMDB_API_KEY: ${{ secrets.OMDB_API_KEY }}
        run: node scripts/enrich_library.js

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/library.json data/candidates.txt
          git commit -m "chore: auto-enrich library from candidates"
          git push
