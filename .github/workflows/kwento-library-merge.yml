name: Merge Library Candidates
on:
  issues:
    types: [opened, edited, labeled]

permissions:
  contents: write
  issues: write

jobs:
  merge:
    if: contains(github.event.issue.labels.*.name, 'library-candidate')
    runs-on: ubuntu-latest
    steps:
      - name: Merge candidates into library.json
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const path = "data/library.json";
            const issue = context.payload.issue;

            const body = issue.body || "";
            const match = body.match(/```json\\s*([\\s\\S]*?)```/i);
            if (!match) {
              core.setFailed("No JSON block found in issue body.");
              return;
            }
            const payload = JSON.parse(match[1]);
            const items = payload.items || [];
            if (!Array.isArray(items) || items.length === 0) {
              core.setFailed("No items to merge.");
              return;
            }

            let file;
            try {
              file = await github.rest.repos.getContent({ owner, repo, path });
            } catch (e) {
              file = null;
            }
            let library = { version: 1, updatedAt: null, items: [] };
            if (file && file.data && file.data.content) {
              const raw = Buffer.from(file.data.content, "base64").toString("utf8");
              library = JSON.parse(raw);
              if (!Array.isArray(library.items)) library.items = [];
            }

            const byKey = new Map(library.items.map(i => [(i.imdbID || i.title || "").toLowerCase(), i]));
            let added = 0;
            for (const it of items) {
              const key = (it.imdbID || it.title || "").toLowerCase();
              if (!key) continue;
              if (!byKey.has(key)) {
                byKey.set(key, it);
                added++;
              } else {
                byKey.set(key, { ...byKey.get(key), ...it });
              }
            }

            library.items = Array.from(byKey.values());
            library.updatedAt = new Date().toISOString();

            const content = Buffer.from(JSON.stringify(library, null, 2)).toString("base64");
            const sha = file && file.data ? file.data.sha : undefined;

            await github.rest.repos.createOrUpdateFileContents({
              owner, repo, path,
              message: `Merge ${items.length} library candidates`,
              content,
              sha,
            });

            await github.rest.issues.createComment({
              owner, repo, issue_number: issue.number,
              body: `Merged ${items.length} candidates into ${path}. Added new: ${added}.`
            });

            await github.rest.issues.update({
              owner, repo, issue_number: issue.number, state: "closed"
            });
