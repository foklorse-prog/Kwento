name: Merge Library Candidates
on:
  issues:
    types: [opened, edited, labeled]

permissions:
  contents: write
  issues: write

concurrency:
  group: library-merge
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  merge:
    if: contains(github.event.issue.labels.*.name, 'library-candidate') || contains(github.event.issue.labels.*.name, 'library-remove')
    runs-on: ubuntu-latest
    steps:
      - name: Merge candidates into library.json
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const path = "data/library.json";
            const issue = context.payload.issue;
            const labels = (issue.labels || []).map(l => l.name);
            const isRemove = labels.includes("library-remove");

            const body = issue.body || "";
            let jsonText = null;
            const match = body.match(/```json\s*([\s\S]*?)```/i);
            if (match) jsonText = match[1];
            if (!jsonText) {
              const braceStart = body.indexOf("{");
              const braceEnd = body.lastIndexOf("}");
              if (braceStart !== -1 && braceEnd !== -1 && braceEnd > braceStart) {
                jsonText = body.slice(braceStart, braceEnd + 1);
              }
            }
            if (!jsonText) {
              core.warning("No JSON block found in issue body; skipping.");
              return;
            }
            let payload;
            try {
              payload = JSON.parse(jsonText);
            } catch (e) {
              core.warning("Invalid JSON payload; skipping.");
              return;
            }

            const maxAttempts = 5;
            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              let file;
              try {
                file = await github.rest.repos.getContent({ owner, repo, path });
              } catch (e) {
                file = null;
              }
              let library = { version: 1, updatedAt: null, items: [] };
              if (file && file.data && file.data.content) {
                const raw = Buffer.from(file.data.content, "base64").toString("utf8");
                library = JSON.parse(raw);
                if (!Array.isArray(library.items)) library.items = [];
              }

              const byKey = new Map(library.items.map(i => [(i.imdbID || i.title || "").toLowerCase(), i]));

              if (isRemove) {
                const removeList = payload.remove || payload.items || [];
                if (!Array.isArray(removeList) || removeList.length === 0) {
                  core.warning("No items to remove.");
                  return;
                }
                let removed = 0;
                for (const it of removeList) {
                  const key = (it.imdbID || it.title || "").toLowerCase();
                  if (!key) continue;
                  if (byKey.has(key)) {
                    byKey.delete(key);
                    removed++;
                  }
                }
                library.items = Array.from(byKey.values());
                library.updatedAt = new Date().toISOString();

                const content = Buffer.from(JSON.stringify(library, null, 2)).toString("base64");
                const sha = file && file.data ? file.data.sha : undefined;

                try {
                  await github.rest.repos.createOrUpdateFileContents({
                    owner, repo, path,
                    message: `Remove ${removed} library items`,
                    content,
                    sha,
                  });
                } catch (e) {
                  if (e.status === 409 || (e.message||"").includes("does not match")) {
                    if (attempt < maxAttempts) continue;
                  }
                  throw e;
                }

                await github.rest.issues.createComment({
                  owner, repo, issue_number: issue.number,
                  body: `Removed ${removed} items from ${path}.`
                });

                await github.rest.issues.update({
                  owner, repo, issue_number: issue.number, state: "closed"
                });
                return;
              }

              const items = payload.items || [];
              if (!Array.isArray(items) || items.length === 0) {
                core.warning("No items to merge.");
                return;
              }

              let added = 0;
              for (const it of items) {
                const key = (it.imdbID || it.title || "").toLowerCase();
                if (!key) continue;
                if (!byKey.has(key)) {
                  byKey.set(key, it);
                  added++;
                } else {
                  byKey.set(key, { ...byKey.get(key), ...it });
                }
              }

              library.items = Array.from(byKey.values());
              library.updatedAt = new Date().toISOString();

              const content = Buffer.from(JSON.stringify(library, null, 2)).toString("base64");
              const sha = file && file.data ? file.data.sha : undefined;

              try {
                await github.rest.repos.createOrUpdateFileContents({
                  owner, repo, path,
                  message: `Merge ${items.length} library candidates`,
                  content,
                  sha,
                });
              } catch (e) {
                if (e.status === 409 || (e.message||"").includes("does not match")) {
                  if (attempt < maxAttempts) continue;
                }
                throw e;
              }

              await github.rest.issues.createComment({
                owner, repo, issue_number: issue.number,
                body: `Merged ${items.length} candidates into ${path}. Added new: ${added}.`
              });

              await github.rest.issues.update({
                owner, repo, issue_number: issue.number, state: "closed"
              });
              return;
            }

            core.setFailed("Failed to update library.json after multiple attempts.");
